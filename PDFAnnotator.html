<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Annotator - 無限階層注釈版</title>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- Marked (Markdown Parser) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- KaTeX -->
    <link href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out forwards;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide-in-right {
            animation: slideInRight 0.3s ease-out forwards;
        }

        #pdf-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: auto;
            background: #f0f0f0;
        }

        .pdf-page-wrapper {
            position: relative;
            margin: 20px auto;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 900px;
        }

        .pdf-canvas {
            display: block;
            width: 100%;
            height: auto;
        }

        .annotation-overlay {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }

        .annotation-rect {
            position: absolute;
            border: 2px solid rgba(59, 130, 246, 0.5);
            background-color: rgba(59, 130, 246, 0.1);
            cursor: pointer;
            transition: all 0.2s;
        }

        .annotation-rect:hover {
            border-color: rgba(59, 130, 246, 0.8);
            background-color: rgba(59, 130, 246, 0.2);
        }

        .annotation-rect.active {
            border-color: rgba(234, 179, 8, 1);
            background-color: rgba(234, 179, 8, 0.2);
        }

        .markdown-body {
            color: #334155;
            font-size: 0.95rem;
            line-height: 1.8;
        }
        .markdown-body h1 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.75em; color: #0f172a; }
        .markdown-body h2 { font-size: 1.25rem; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.75em; color: #1e293b; }
        .markdown-body p { margin-bottom: 1.2em; }
        .markdown-body code { background-color: #f1f5f9; color: #ef4444; padding: 0.2em 0.4em; border-radius: 0.25rem; }
        .markdown-body pre { background-color: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1.2em; }
        .markdown-body pre code { background-color: transparent; color: inherit; padding: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const generateId = () => Math.random().toString(36).substr(2, 9);

        // LocalStorage ヘルパー
        const Storage = {
            getProjectList() {
                try {
                    return JSON.parse(localStorage.getItem('pdf-annotator-projects') || '[]');
                } catch(e) { return []; }
            },
            saveProjectList(list) {
                localStorage.setItem('pdf-annotator-projects', JSON.stringify(list));
            },
            getProjectData(id) {
                try {
                    return JSON.parse(localStorage.getItem('pdf-annotator-data-' + id) || 'null');
                } catch(e) { return null; }
            },
            saveProjectData(id, data) {
                localStorage.setItem('pdf-annotator-data-' + id, JSON.stringify(data));
            },
            deleteProjectData(id) {
                localStorage.removeItem('pdf-annotator-data-' + id);
            }
        };

        // Markdown Viewer
        const MarkdownViewer = ({ content }) => {
            const contentRef = useRef(null);

            useEffect(() => {
                if (contentRef.current && content) {
                    let html = marked.parse(content);
                    contentRef.current.innerHTML = html;

                    try {
                        renderMathInElement(contentRef.current, {
                            delimiters: [
                                {left: '$$', right: '$$', display: true},
                                {left: '$', right: '$', display: false},
                                {left: '\\(', right: '\\)', display: false},
                                {left: '\\[', right: '\\]', display: true}
                            ],
                            throwOnError: false
                        });
                    } catch (e) {}
                }
            }, [content]);

            return <div ref={contentRef} className="markdown-body"></div>;
        };

        // Annotation Form
        const AnnotationForm = ({ mode, initialData, onSave, onCancel }) => {
            const [title, setTitle] = useState(initialData?.title || '');
            const [content, setContent] = useState(initialData?.content || '');

            return (
                <div className="flex flex-col h-full bg-slate-50 animate-slide-in-right">
                    <div className="p-4 border-b border-gray-200 bg-white flex items-center justify-between shrink-0 shadow-sm">
                        <h3 className="font-bold text-gray-700">{mode === 'add' ? '注釈を追加' : '注釈を編集'}</h3>
                        <button onClick={onCancel} className="text-gray-400 hover:text-gray-600">
                            <i className="ph-bold ph-x text-lg"></i>
                        </button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 flex flex-col gap-6">
                        <div>
                            <label className="block text-sm font-bold text-gray-600 mb-2">タイトル</label>
                            <input
                                type="text"
                                value={title}
                                onChange={e => setTitle(e.target.value)}
                                className="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                                placeholder="注釈のタイトル"
                            />
                        </div>
                        <div className="flex-1 flex flex-col">
                            <label className="block text-sm font-bold text-gray-600 mb-2">本文 (Markdown & LaTeX対応)</label>
                            <textarea
                                value={content}
                                onChange={e => setContent(e.target.value)}
                                className="flex-1 w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none resize-none font-mono text-sm"
                                placeholder="マークダウン形式で記述できます"
                            ></textarea>
                        </div>
                    </div>

                    <div className="p-4 border-t border-gray-200 bg-white flex justify-end gap-3 shrink-0">
                        <button onClick={onCancel} className="px-6 py-2.5 rounded-lg font-bold text-gray-600 hover:bg-gray-100">
                            キャンセル
                        </button>
                        <button
                            onClick={() => onSave(title, content)}
                            disabled={!title.trim() || !content.trim()}
                            className="px-6 py-2.5 rounded-lg font-bold text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-50"
                        >
                            保存
                        </button>
                    </div>
                </div>
            );
        };

        // Main App
        const App = () => {
            const [appMode, setAppMode] = useState('home');
            const [projectList, setProjectList] = useState([]);
            const [currentProject, setCurrentProject] = useState(null);
            const [pdfDoc, setPdfDoc] = useState(null);
            const [currentPage, setCurrentPage] = useState(1);
            const [scale, setScale] = useState(1.5);
            const [isSelecting, setIsSelecting] = useState(false);
            const [panes, setPanes] = useState([]);
            const [annotations, setAnnotations] = useState([]);
            const containerRef = useRef(null);

            useEffect(() => {
                setProjectList(Storage.getProjectList());
            }, []);

            useEffect(() => {
                if (annotations.length > 0) {
                    Storage.saveProjectData(currentProject?.id, { annotations });
                }
            }, [annotations, currentProject?.id]);

            const openProject = (id) => {
                const project = projectList.find(p => p.id === id);
                if (!project) return;
                setCurrentProject(project);
                const data = Storage.getProjectData(id);
                setAnnotations(data?.annotations || []);
                setAppMode('viewer');
                setPanes([]);
            };

            const createNewProject = () => {
                setCurrentProject(null);
                setAppMode('upload');
            };

            const deleteProject = (id) => {
                Storage.deleteProjectData(id);
                setProjectList(prev => {
                    const updated = prev.filter(p => p.id !== id);
                    Storage.saveProjectList(updated);
                    return updated;
                });
            };

            const handlePdfUpload = async (file) => {
                const pdf = await pdfjsLib.getDocument(URL.createObjectURL(file)).promise;
                const id = generateId();
                const now = Date.now();
                const project = {
                    id,
                    name: file.name,
                    createdAt: now,
                    updatedAt: now,
                    pageCount: pdf.numPages
                };
                setCurrentProject(project);
                setPdfDoc(pdf);
                setCurrentPage(1);
                setAnnotations([]);
                Storage.saveProjectList([...projectList, project]);
                setProjectList([...projectList, project]);
                setAppMode('viewer');
            };

            const goHome = () => {
                setAppMode('home');
                setPdfDoc(null);
                setCurrentProject(null);
                setCurrentPage(1);
                setPanes([]);
            };

            const renderHomeScreen = () => (
                <div className="flex-1 overflow-y-auto bg-gray-50">
                    <div className="max-w-4xl mx-auto px-6 py-10 animate-fade-in-up">
                        <div className="flex items-center justify-between mb-8">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800">PDF 注釈</h2>
                                <p className="text-gray-500 text-sm mt-1">{projectList.length} 個のプロジェクト</p>
                            </div>
                            <button
                                onClick={createNewProject}
                                className="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-bold text-sm hover:bg-blue-700 flex items-center gap-2"
                            >
                                <i className="ph-bold ph-plus"></i> 新規作成
                            </button>
                        </div>

                        {projectList.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-20 text-gray-400">
                                <div className="w-24 h-24 bg-blue-100 text-blue-300 rounded-full flex items-center justify-center mb-6">
                                    <i className="ph-fill ph-file-pdf text-5xl"></i>
                                </div>
                                <h3 className="text-xl font-bold text-gray-400 mb-2">プロジェクトがありません</h3>
                                <p className="text-sm text-gray-400 max-w-sm text-center">PDF ファイルをアップロードして、注釈付けを始めましょう。</p>
                            </div>
                        ) : (
                            <div className="grid gap-4">
                                {projectList.map(project => (
                                    <div
                                        key={project.id}
                                        onClick={() => openProject(project.id)}
                                        className="bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-md hover:border-blue-300 transition-all cursor-pointer group p-5"
                                    >
                                        <div className="flex items-start justify-between">
                                            <div className="flex-1 min-w-0">
                                                <h3 className="font-bold text-gray-800 text-lg truncate group-hover:text-blue-600">
                                                    {project.name}
                                                </h3>
                                                <p className="text-sm text-gray-500 mt-1">ページ数: {project.pageCount}</p>
                                            </div>
                                            <button
                                                onClick={(e) => {
                                                    e.stopPropagation();
                                                    if(confirm('削除しますか？')) deleteProject(project.id);
                                                }}
                                                className="w-9 h-9 flex items-center justify-center rounded-full text-gray-400 hover:text-red-600 hover:bg-red-100"
                                            >
                                                <i className="ph ph-trash text-lg"></i>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );

            const renderUploadScreen = () => (
                <div className="flex-1 flex items-center justify-center bg-gray-50 p-6">
                    <div className="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 animate-fade-in-up">
                        <div className="flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mx-auto mb-6">
                            <i className="ph-fill ph-file-pdf text-3xl text-blue-600"></i>
                        </div>
                        <h2 className="text-2xl font-bold text-center text-gray-800 mb-2">PDF をアップロード</h2>
                        <p className="text-center text-gray-500 mb-8">PDF ファイルを選択して注釈を開始します</p>

                        <input
                            type="file"
                            accept=".pdf"
                            onChange={(e) => {
                                if (e.target.files?.[0]) {
                                    handlePdfUpload(e.target.files[0]);
                                }
                            }}
                            className="block w-full px-4 py-3 border border-gray-300 rounded-lg cursor-pointer hover:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />

                        <button
                            onClick={() => setAppMode('home')}
                            className="mt-6 w-full px-6 py-2.5 text-gray-600 border border-gray-300 rounded-lg font-bold hover:bg-gray-50"
                        >
                            キャンセル
                        </button>
                    </div>
                </div>
            );

            const renderViewerScreen = () => (
                <div className="flex-1 flex overflow-hidden">
                    {/* PDF Viewer */}
                    <div className="flex-1 flex flex-col bg-gray-100">
                        <div className="p-4 border-b border-gray-200 bg-white flex items-center justify-between shrink-0">
                            <div className="flex items-center gap-4">
                                <button
                                    onClick={goHome}
                                    className="text-gray-600 hover:text-blue-600 flex items-center gap-2"
                                >
                                    <i className="ph-bold ph-arrow-left"></i> ホーム
                                </button>
                                <h2 className="font-bold text-gray-800 truncate">{currentProject?.name}</h2>
                            </div>
                            <div className="flex items-center gap-2">
                                <button
                                    onClick={() => setCurrentPage(Math.max(1, currentPage - 1))}
                                    disabled={currentPage === 1}
                                    className="px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50"
                                >
                                    <i className="ph-bold ph-caret-left"></i>
                                </button>
                                <span className="px-3 py-1.5">ページ {currentPage} / {currentProject?.pageCount}</span>
                                <button
                                    onClick={() => setCurrentPage(Math.min(currentProject?.pageCount || 1, currentPage + 1))}
                                    disabled={currentPage === currentProject?.pageCount}
                                    className="px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50"
                                >
                                    <i className="ph-bold ph-caret-right"></i>
                                </button>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto" ref={containerRef} id="pdf-container">
                            {pdfDoc && <PDFPage doc={pdfDoc} page={currentPage} scale={scale} annotations={annotations.filter(a => a.page === currentPage)} onAnnotationClick={(rect) => setPanes([{ mode: 'add', rect }])} />}
                        </div>
                    </div>

                    {/* Annotation Panel */}
                    {panes.length > 0 && panes[0].mode === 'add' && (
                        <div className="w-96 border-l border-gray-200 bg-white">
                            <AnnotationForm
                                mode="add"
                                onSave={(title, content) => {
                                    setAnnotations(prev => [...prev, { id: generateId(), page: currentPage, title, content, timestamp: Date.now() }]);
                                    setPanes([]);
                                }}
                                onCancel={() => setPanes([])}
                            />
                        </div>
                    )}
                </div>
            );

            return (
                <div className="flex flex-col h-screen w-full bg-gray-50 overflow-hidden font-sans text-gray-900">
                    <header className="h-14 bg-slate-900 text-white flex items-center px-6 shrink-0 z-30 shadow-md">
                        <h1 className="font-bold text-lg cursor-pointer hover:text-blue-300" onClick={goHome}>
                            PDF Annotator <span className="text-slate-400 text-sm ml-2">| 無限階層注釈版</span>
                        </h1>
                    </header>

                    {appMode === 'home' && renderHomeScreen()}
                    {appMode === 'upload' && renderUploadScreen()}
                    {appMode === 'viewer' && renderViewerScreen()}
                </div>
            );
        };

        // PDF Page Renderer
        const PDFPage = ({ doc, page, scale, annotations, onAnnotationClick }) => {
            const canvasRef = useRef(null);
            const containerRef = useRef(null);
            const [pageHeight, setPageHeight] = useState(0);

            useEffect(() => {
                const renderPage = async () => {
                    const pdfPage = await doc.getPage(page);
                    const viewport = pdfPage.getViewport({ scale });
                    const canvas = canvasRef.current;

                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    setPageHeight(viewport.height);

                    await pdfPage.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                };

                renderPage();
            }, [doc, page, scale]);

            return (
                <div className="pdf-page-wrapper">
                    <div ref={containerRef} style={{ position: 'relative', width: '100%', display: 'inline-block' }}>
                        <canvas ref={canvasRef} className="pdf-canvas"></canvas>
                        <svg
                            style={{
                                position: 'absolute',
                                top: 0,
                                left: 0,
                                width: '100%',
                                height: pageHeight || 'auto',
                                cursor: 'pointer'
                            }}
                        >
                            {annotations.map(anno => (
                                <rect
                                    key={anno.id}
                                    x={anno.rect?.x || 0}
                                    y={anno.rect?.y || 0}
                                    width={anno.rect?.width || 0}
                                    height={anno.rect?.height || 0}
                                    fill="rgba(59, 130, 246, 0.1)"
                                    stroke="rgba(59, 130, 246, 0.5)"
                                    strokeWidth="2"
                                    onClick={() => {}}
                                    style={{ cursor: 'pointer' }}
                                />
                            ))}
                        </svg>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
