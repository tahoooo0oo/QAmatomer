<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&Aツリー - 多重構造まとめツール</title>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Marked (Markdown Parser) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- KaTeX (Math Rendering) -->
    <link href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        /* カスタムアニメーション */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out forwards;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide-in-right {
            animation: slideInRight 0.3s ease-out forwards;
        }

        /* 横スクロールコンテナとスクロールバー */
        .horizontal-scroll-container {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            width: 100%;
            height: 100%;
        }
        .horizontal-scroll-container::-webkit-scrollbar { height: 10px; }
        .horizontal-scroll-container::-webkit-scrollbar-track { background: #f1f5f9; }
        .horizontal-scroll-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Markdown 表示用スタイル */
        .markdown-body { color: #334155; font-size: 0.95rem; line-height: 1.8; }
        .markdown-body h1 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.75em; color: #0f172a; }
        .markdown-body h2 { font-size: 1.25rem; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.75em; color: #1e293b; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3em; }
        .markdown-body h3 { font-size: 1.125rem; font-weight: 600; margin-top: 1.25em; margin-bottom: 0.5em; color: #334155; }
        .markdown-body p { margin-bottom: 1.2em; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body a { color: #2563eb; text-decoration: underline; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1.2em; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1.2em; }
        .markdown-body li { margin-bottom: 0.3em; }
        .markdown-body blockquote { border-left: 4px solid #cbd5e1; color: #64748b; font-style: italic; margin-bottom: 1.2em; background: #f8fafc; padding: 0.5em 1em; border-radius: 0 0.5rem 0.5rem 0; }
        .markdown-body code { background-color: #f1f5f9; color: #ef4444; padding: 0.2em 0.4em; border-radius: 0.25rem; font-size: 0.875em; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .markdown-body pre { background-color: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1.2em; }
        .markdown-body pre code { background-color: transparent; color: inherit; padding: 0; font-size: 0.875em; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1.2em; }
        .markdown-body th, .markdown-body td { border: 1px solid #e2e8f0; padding: 0.5rem; text-align: left; }
        .markdown-body th { background-color: #f8fafc; font-weight: 600; }

        /* KaTeX 表示調整 */
        .katex-display { margin: 1em 0; overflow-x: auto; overflow-y: hidden; padding-bottom: 0.2em; }

        /* 注釈ハイライト */
        .annotation-mark {
            background-color: rgba(253, 224, 71, 0.4); border-bottom: 2px dotted #eab308;
            color: inherit; cursor: pointer; border-radius: 2px; padding: 2px 0;
            transition: all 0.2s; position: relative;
            box-decoration-break: clone; -webkit-box-decoration-break: clone;
        }
        .annotation-mark:hover { background-color: rgba(253, 224, 71, 0.7); }
        .annotation-mark.active { background-color: rgba(250, 204, 21, 0.6); border-bottom: 2px solid #ca8a04; box-shadow: 0 0 0 2px rgba(250, 204, 21, 0.3); }

        /* 注釈リストアイテム */
        .anno-list-item { padding: 6px 12px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s ease; }
        .anno-list-item:hover { background: rgba(59,130,246,0.08); }
        .anno-list-item.active { background: rgba(59,130,246,0.12); border-left-color: #3b82f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

        const { useState, useEffect, useRef } = React;
        const generateId = () => Math.random().toString(36).substr(2, 9);

        // テキスト選択からquoteを取得（KaTeX対応）
        const getQuoteFromSelection = (range) => {
            const fragment = range.cloneContents();
            const tempDiv = document.createElement('div');
            tempDiv.appendChild(fragment);
            tempDiv.querySelectorAll('.katex-display').forEach(el => {
                const ann = el.querySelector('annotation[encoding="application/x-tex"]');
                if (ann) el.replaceWith('$$' + ann.textContent.trim() + '$$');
            });
            tempDiv.querySelectorAll('.katex').forEach(el => {
                const ann = el.querySelector('annotation[encoding="application/x-tex"]');
                if (ann) el.replaceWith('$' + ann.textContent.trim() + '$');
            });
            return tempDiv.textContent.trim();
        };

        // --- LocalStorage ヘルパー ---
        const Storage = {
            getProjectList() {
                try { return JSON.parse(localStorage.getItem('annotator-qa-project-list') || '[]'); }
                catch(e) { return []; }
            },
            saveProjectList(list) {
                localStorage.setItem('annotator-qa-project-list', JSON.stringify(list));
            },
            getProjectData(id) {
                try {
                    const data = JSON.parse(localStorage.getItem('annotator-qa-project-' + id) || 'null');
                    if (data && !data.annotations) data.annotations = [];
                    return data;
                } catch(e) { return null; }
            },
            saveProjectData(id, data) {
                localStorage.setItem('annotator-qa-project-' + id, JSON.stringify(data));
            },
            deleteProjectData(id) {
                localStorage.removeItem('annotator-qa-project-' + id);
            }
        };

        // --- MarkdownViewer (注釈ハイライト対応) ---
        const MarkdownViewer = ({ content, className = "markdown-body", annotations = [], onMarkClick, onMarkHover, activeAnnotationId }) => {
            const contentRef = useRef(null);
            const callbacksRef = useRef({ onMarkClick, onMarkHover });
            useEffect(() => { callbacksRef.current = { onMarkClick, onMarkHover }; }, [onMarkClick, onMarkHover]);
            const annotationsStr = JSON.stringify(annotations.map(a => ({ id: a.id, quote: a.quote, title: a.title })));

            // マークダウン+数式レンダリング
            useEffect(() => {
                if (!contentRef.current || !content) {
                    if (contentRef.current) contentRef.current.innerHTML = '';
                    return;
                }
                const mathBlocks = [];
                let pt = content;
                pt = pt.replace(/\$\$([\s\S]+?)\$\$/g, (m, p1) => { const id = `MATHBLOCK${mathBlocks.length}END`; mathBlocks.push({ id, content: `$$${p1}$$` }); return id; });
                pt = pt.replace(/\\\[([\s\S]+?)\\\]/g, (m, p1) => { const id = `MATHBLOCK${mathBlocks.length}END`; mathBlocks.push({ id, content: `\\[${p1}\\]` }); return id; });
                pt = pt.replace(/\$((?:\\.|[^$\n])+?)\$/g, (m, p1) => { const id = `MATHINLINE${mathBlocks.length}END`; mathBlocks.push({ id, content: `$${p1}$` }); return id; });
                pt = pt.replace(/\\\(([\s\S]+?)\\\)/g, (m, p1) => { const id = `MATHINLINE${mathBlocks.length}END`; mathBlocks.push({ id, content: `\\(${p1}\\)` }); return id; });
                let html = marked.parse(pt);
                mathBlocks.forEach(block => { html = html.replace(block.id, block.content); });
                contentRef.current.innerHTML = html;
                try {
                    renderMathInElement(contentRef.current, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false},
                            {left: '\\(', right: '\\)', display: false},
                            {left: '\\[', right: '\\]', display: true}
                        ],
                        throwOnError: false
                    });
                } catch(e) {}
            }, [content]);

            // コピー時のKaTeX処理
            useEffect(() => {
                const el = contentRef.current; if (!el) return;
                const handleCopy = (e) => {
                    const sel = window.getSelection(); if (!sel.rangeCount) return;
                    const frag = sel.getRangeAt(0).cloneContents();
                    const tmp = document.createElement('div'); tmp.appendChild(frag);
                    if (!tmp.querySelector('.katex')) return;
                    tmp.querySelectorAll('.katex-display').forEach(k => { const a = k.querySelector('annotation[encoding="application/x-tex"]'); if (a) k.replaceWith(`\n$$${a.textContent.trim()}$$\n`); });
                    tmp.querySelectorAll('.katex').forEach(k => { const a = k.querySelector('annotation[encoding="application/x-tex"]'); if (a) k.replaceWith(`$${a.textContent.trim()}$`); });
                    e.preventDefault(); e.clipboardData.setData('text/plain', tmp.textContent);
                };
                el.addEventListener('copy', handleCopy);
                return () => el.removeEventListener('copy', handleCopy);
            }, []);

            // 注釈ハイライト適用
            useEffect(() => {
                const root = contentRef.current; if (!root) return;
                root.querySelectorAll('.annotation-mark').forEach(mark => {
                    const p = mark.parentNode;
                    while (mark.firstChild) p.insertBefore(mark.firstChild, mark);
                    p.removeChild(mark);
                });
                root.normalize();
                const parsed = JSON.parse(annotationsStr);
                if (!parsed || parsed.length === 0) return;

                const segments = []; let vOff = 0;
                const walk = (node) => {
                    if (node.nodeType === 3) { const t = node.textContent; if (t.length > 0) { segments.push({ type:'text', node, text:t, vStart:vOff, vEnd:vOff+t.length }); vOff += t.length; } return; }
                    if (node.nodeType !== 1) return;
                    if (node.classList.contains('katex-display')) { const a = node.querySelector('annotation[encoding="application/x-tex"]'); if (a) { const t = '$$'+a.textContent.trim()+'$$'; segments.push({ type:'katex-display', node, text:t, vStart:vOff, vEnd:vOff+t.length }); vOff += t.length; } return; }
                    if (node.classList.contains('katex')) { const a = node.querySelector('annotation[encoding="application/x-tex"]'); if (a) { const t = '$'+a.textContent.trim()+'$'; segments.push({ type:'katex', node, text:t, vStart:vOff, vEnd:vOff+t.length }); vOff += t.length; } return; }
                    for (const c of Array.from(node.childNodes)) walk(c);
                };
                walk(root);

                const vText = segments.map(s => s.text).join('');
                const matches = [];
                for (const a of parsed) {
                    if (!a.quote) continue;
                    const idx = vText.indexOf(a.quote);
                    if (idx === -1) continue;
                    matches.push({ id: a.id, title: a.title, start: idx, end: idx + a.quote.length });
                }
                if (matches.length === 0) return;

                const setupEv = (el, cov) => {
                    el.onmouseenter = () => { if (callbacksRef.current.onMarkHover) { const r = el.getBoundingClientRect(); const t = cov.map(m=>m.title).filter(Boolean); callbacksRef.current.onMarkHover(true, t.length>1?t.join(' / '):(t[0]||'注釈'), r); } };
                    el.onmouseleave = () => { if (callbacksRef.current.onMarkHover) callbacksRef.current.onMarkHover(false); };
                    el.onclick = (e) => { e.preventDefault(); e.stopPropagation(); window.getSelection().removeAllRanges(); if (callbacksRef.current.onMarkHover) callbacksRef.current.onMarkHover(false); if (callbacksRef.current.onMarkClick) callbacksRef.current.onMarkClick(cov[0].id); };
                };

                for (let i = segments.length-1; i >= 0; i--) {
                    const seg = segments[i];
                    const ol = matches.filter(m => m.start < seg.vEnd && m.end > seg.vStart);
                    if (ol.length === 0) continue;
                    if (seg.type === 'katex' || seg.type === 'katex-display') {
                        const w = document.createElement('span');
                        w.className = 'annotation-mark' + (ol.some(m=>m.id===activeAnnotationId)?' active':'');
                        if (seg.type === 'katex-display') w.style.display = 'block';
                        setupEv(w, ol); seg.node.parentNode.insertBefore(w, seg.node); w.appendChild(seg.node);
                    } else if (seg.type === 'text') {
                        const txt = seg.node.textContent;
                        const bds = new Set([0, txt.length]);
                        for (const m of ol) { bds.add(Math.max(0, m.start-seg.vStart)); bds.add(Math.min(txt.length, m.end-seg.vStart)); }
                        const sorted = Array.from(bds).sort((a,b)=>a-b);
                        const frag = document.createDocumentFragment();
                        for (let j = 0; j < sorted.length-1; j++) {
                            const s = sorted[j], e = sorted[j+1]; const sub = txt.substring(s, e); if (!sub) continue;
                            const vs = seg.vStart+s, ve = seg.vStart+e;
                            const cov = ol.filter(m => m.start<=vs && m.end>=ve);
                            if (cov.length > 0) {
                                const sp = document.createElement('span');
                                sp.className = 'annotation-mark' + (cov.some(m=>m.id===activeAnnotationId)?' active':'');
                                sp.dataset.annoId = cov[0].id; sp.textContent = sub; setupEv(sp, cov); frag.appendChild(sp);
                            } else frag.appendChild(document.createTextNode(sub));
                        }
                        seg.node.parentNode.replaceChild(frag, seg.node);
                    }
                }
                return () => { if (callbacksRef.current.onMarkHover) callbacksRef.current.onMarkHover(false); };
            }, [content, annotationsStr, activeAnnotationId]);

            return <div ref={contentRef} className={className}></div>;
        };


        // --- ホーム画面 ---
        const HomeScreen = ({ projects, onOpen, onCreateNew, onDelete, onExportSingle, onExportAll, onImport }) => {
            const fileInputRef = useRef(null);
            const handleFileChange = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => { try { onImport(JSON.parse(event.target.result)); } catch(err) { alert('ファイルの読み込みに失敗しました。正しいJSONファイルを選択してください。'); } };
                reader.readAsText(file); e.target.value = '';
            };
            return (
                <div className="flex-1 overflow-y-auto bg-gray-50">
                    <div className="max-w-4xl mx-auto px-6 py-10 animate-fade-in-up">
                        <div className="flex items-center justify-between mb-8">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800">保存済みのQ&Aツリー</h2>
                                <p className="text-gray-500 text-sm mt-1">{projects.length} 件のまとめ</p>
                            </div>
                            <div className="flex items-center gap-3">
                                <button onClick={() => fileInputRef.current?.click()} className="px-4 py-2.5 text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 font-medium text-sm flex items-center gap-2 transition-colors">
                                    <i className="ph-bold ph-upload-simple"></i> インポート
                                </button>
                                <input ref={fileInputRef} type="file" accept=".json" onChange={handleFileChange} className="hidden" />
                                {projects.length > 0 && (
                                    <button onClick={onExportAll} className="px-4 py-2.5 text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 font-medium text-sm flex items-center gap-2 transition-colors">
                                        <i className="ph-bold ph-download-simple"></i> 全てエクスポート
                                    </button>
                                )}
                                <button onClick={onCreateNew} className="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-bold text-sm hover:bg-blue-700 flex items-center gap-2 transition-colors shadow-sm">
                                    <i className="ph-bold ph-plus"></i> 新規作成
                                </button>
                            </div>
                        </div>
                        {projects.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-20 text-gray-400">
                                <div className="w-24 h-24 bg-blue-100 text-blue-300 rounded-full flex items-center justify-center mb-6 shadow-inner">
                                    <i className="ph-fill ph-tree-structure text-5xl"></i>
                                </div>
                                <h3 className="text-xl font-bold text-gray-400 mb-2">まだまとめがありません</h3>
                                <p className="text-sm text-gray-400 max-w-sm text-center leading-relaxed">「新規作成」ボタンから大元のテーマを作成し、質問と回答を無限に掘り下げていくツリーを作りましょう。</p>
                            </div>
                        ) : (
                            <div className="grid gap-4">
                                {projects.map(project => (
                                    <div key={project.id} onClick={() => onOpen(project.id)} className="bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-md hover:border-blue-300 transition-all cursor-pointer group">
                                        <div className="p-5 flex items-start justify-between">
                                            <div className="flex-1 min-w-0">
                                                <h3 className="font-bold text-gray-800 text-lg truncate group-hover:text-blue-600 transition-colors">{project.name}</h3>
                                                <div className="flex items-center gap-4 mt-2 text-sm text-gray-400">
                                                    <span className="flex items-center gap-1"><i className="ph ph-calendar-blank"></i>{new Date(project.createdAt).toLocaleDateString('ja-JP')}</span>
                                                    <span className="flex items-center gap-1"><i className="ph ph-clock"></i>{new Date(project.updatedAt).toLocaleDateString('ja-JP')} 更新</span>
                                                    <span className="flex items-center gap-1"><i className="ph ph-list-dashes"></i>{project.nodeCount || 0} ノード</span>
                                                    {(project.annotationCount || 0) > 0 && <span className="flex items-center gap-1 text-amber-500"><i className="ph-fill ph-highlighter"></i>{project.annotationCount} 注釈</span>}
                                                </div>
                                                {project.preview && <p className="mt-3 text-sm text-gray-500 line-clamp-2 leading-relaxed">{project.preview}</p>}
                                            </div>
                                            <div className="flex items-center gap-1 ml-4 shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                                                <button onClick={(e) => { e.stopPropagation(); onExportSingle(project.id); }} className="w-9 h-9 flex items-center justify-center rounded-full text-gray-400 hover:text-blue-600 hover:bg-blue-100 transition-colors" title="エクスポート"><i className="ph ph-download-simple text-lg"></i></button>
                                                <button onClick={(e) => { e.stopPropagation(); if(confirm('\u300c'+project.name+'\u300d\u3092\u524a\u9664\u3057\u307e\u3059\u304b\uff1f\u3053\u306e\u64cd\u4f5c\u306f\u5143\u306b\u623b\u305b\u307e\u305b\u3093\u3002')) onDelete(project.id); }} className="w-9 h-9 flex items-center justify-center rounded-full text-gray-400 hover:text-red-600 hover:bg-red-100 transition-colors" title="削除"><i className="ph ph-trash text-lg"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- セットアップ画面 ---
        const SetupScreen = ({ initialName, isNew, onSave, onCancel }) => {
            const [name, setName] = useState(initialName || '');
            return (
                <div className="flex flex-col items-center justify-center h-[calc(100vh-56px)] bg-gray-50 p-6">
                    <div className="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col animate-fade-in-up">
                        <div className="p-8">
                            <h1 className="text-2xl font-bold text-gray-800 mb-2">{isNew ? '新しいまとめツリーを作成' : 'まとめのタイトルを編集'}</h1>
                            <p className="text-gray-500 text-sm mb-6">このツリー全体の主題（タイトル）を設定します。</p>
                            <label className="block text-sm font-bold text-gray-700 mb-2">主題・タイトル <span className="text-red-500">*</span></label>
                            <input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all bg-white text-lg font-bold" placeholder="例：React Hooks の仕組みについて" autoFocus />
                        </div>
                        <div className="bg-gray-50 px-8 py-5 border-t border-gray-100 flex justify-end gap-3">
                            {onCancel && <button onClick={onCancel} className="px-5 py-2.5 text-gray-600 bg-white border border-gray-300 rounded-lg font-bold hover:bg-gray-50 transition-colors">キャンセル</button>}
                            <button onClick={() => onSave(name)} disabled={!name.trim()} className="px-6 py-2.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 disabled:opacity-50 transition-colors shadow-sm flex items-center gap-2">
                                <i className="ph-bold ph-check"></i> {isNew ? '作成して進む' : '保存'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- パンくずリスト ---
        const BreadcrumbTrail = ({ path }) => (
            <div className="flex items-center flex-wrap gap-1 text-xs px-4 py-2 bg-slate-100 border-b border-gray-200 text-gray-500 shrink-0">
                <i className="ph-fill ph-folder-open text-blue-400 mr-1"></i>
                {path.map((item, idx) => (
                    <React.Fragment key={idx}>
                        {idx > 0 && <span className="text-gray-400 mx-1">›</span>}
                        <span className={`max-w-[120px] md:max-w-[200px] truncate ${item.isLast ? 'font-bold text-gray-800' : 'text-gray-500'}`} title={item.title}>{item.title}</span>
                    </React.Fragment>
                ))}
            </div>
        );

        // --- 注釈リストバー (テキスト選択注釈一覧) ---
        const AnnotationListBar = ({ annotations, activeAnnotationId, onSelect }) => {
            if (!annotations || annotations.length === 0) return null;
            return (
                <div className="border border-amber-200 rounded-lg bg-amber-50 mb-4 overflow-hidden">
                    <div className="px-3 py-2 bg-amber-100 border-b border-amber-200 flex items-center gap-2">
                        <i className="ph-fill ph-highlighter text-amber-600 text-sm"></i>
                        <span className="text-xs font-bold text-amber-700 uppercase tracking-wider">テキスト注釈 ({annotations.length})</span>
                    </div>
                    <div className="max-h-[160px] overflow-y-auto">
                        {annotations.map(a => (
                            <div key={a.id} onClick={() => onSelect(a.id)} className={'anno-list-item flex items-center gap-2' + (a.id === activeAnnotationId ? ' active' : '')}>
                                <i className="ph-fill ph-highlighter text-amber-500 text-xs shrink-0"></i>
                                <div className="flex-1 min-w-0">

        // --- ViewPane ---
        const ViewPane = ({ node, isRoot, breadcrumb, isActive, selectedChildId, nodeAnnotations, activeAnnotationId, onAnnotateText, onAnnotationClick, onMarkHover, onHideSelectionMenu, onEdit, onDelete, onClose, onAddChild, onOpenChild }) => {

            const handleMouseUp = () => {
                if (isRoot) return;
                setTimeout(() => {
                    const sel = window.getSelection();
                    const text = sel?.toString().trim();
                    if (text && text.length >= 2 && sel.rangeCount > 0) {
                        const range = sel.getRangeAt(0);
                        const rect = range.getBoundingClientRect();
                        const quote = getQuoteFromSelection(range);
                        onAnnotateText(node.id, quote || text, rect);

        // --- Q&A編集ペイン ---
        const EditPane = ({ mode, isTopLevel, initialQuestion, initialAnswer, initialGroup, breadcrumb, existingGroups, onSave, onCancel }) => {

                    {breadcrumb.length > 0 && <BreadcrumbTrail path={breadcrumb} />}

                        </div>

                            <label className="block text-sm font-bold text-gray-600 mb-2 flex items-center gap-1">

                            </label>

                            {existingGroups && existingGroups.length > 0 && (

                            </label>
                            <textarea value={answer} onChange={e => setAnswer(e.target.value)} className="flex-1 w-full border border-gray-300 rounded-lg p-4 focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all resize-none font-mono text-sm bg-white shadow-sm text-gray-700 leading-relaxed" placeholder="回答をマークダウン形式で記述します..."></textarea>

                            <i className="ph-bold ph-check"></i> 保存
                        </button>
                    </div>
                </div>
            );
        };

        // --- テキスト注釈ビューペイン ---
        const AnnotationViewPane = ({ annotation, onEdit, onDelete, onClose }) => {
            if (!annotation) return null;
            return (
                <div className="flex flex-col h-full bg-white border-r border-gray-200 shrink-0 w-[90vw] md:w-[50vw] lg:w-[45vw] xl:w-[40vw] relative z-0 shadow-[4px_0_24px_rgba(0,0,0,0.06)] animate-slide-in-right">
                    <div className="p-4 border-b border-gray-100 bg-white flex items-start justify-between shrink-0 shadow-sm z-10">
                        <div className="flex items-start gap-3 overflow-hidden flex-1">
                            <i className="ph-fill ph-highlighter text-amber-500 text-2xl shrink-0 mt-0.5"></i>
                            <h2 className="font-bold text-gray-800 leading-snug text-lg">{annotation.title}</h2>

                        <div className="flex items-center gap-1 shrink-0 ml-2">
                            <button onClick={onEdit} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-blue-600 hover:bg-blue-100 transition-colors" title="編集"><i className="ph ph-pencil-simple text-lg"></i></button>
                            <button onClick={onDelete} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-red-600 hover:bg-red-100 transition-colors" title="削除"><i className="ph ph-trash text-lg"></i></button>
                            <div className="w-px h-5 bg-gray-300 mx-1"></div>
                            <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-200 transition-colors" title="閉じる"><i className="ph-bold ph-x text-lg"></i></button>
                        </div>
                    </div>
                    {/* 対象テキストパネル */}
                    <div className="border-b border-gray-200 bg-gray-50 shrink-0">
                        <div className="px-4 py-2 border-b border-gray-100">
                            <div className="text-xs text-amber-600 font-bold flex items-center gap-1 uppercase tracking-wider">
                                <i className="ph-bold ph-quotes text-sm"></i> 対象テキスト
                                {annotation.group && <span className="ml-2 text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded font-medium"><i className="ph-fill ph-folder-notch mr-0.5"></i>{annotation.group}</span>}
                            </div>
                        </div>
                        <div className="px-4 py-3">
                            <p className="text-sm text-gray-700 italic leading-relaxed bg-amber-50 p-3 rounded border-l-2 border-amber-400">{annotation.quote}</p>
                        </div>
                    </div>
                    {/* 解説パネル */}
                    <div className="flex-1 overflow-y-auto bg-white">
                        <div className="p-6 md:p-8">
                            <div className="text-xs text-green-600 font-bold flex items-center gap-1 uppercase tracking-wider mb-3">
                                <i className="ph-fill ph-check-circle text-sm"></i> 解説
                            </div>
                            <div className="max-w-3xl mx-auto pb-20">
                                <MarkdownViewer content={annotation.content} />
                            </div>
                        </div>
                    </div>

            );
        };

        // --- テキスト注釈フォームペイン ---
        const AnnotationFormPane = ({ mode, quote, initialData, existingAnnotationGroups, onSave, onCancel }) => {
            const isAdd = mode === 'add';
            const [title, setTitle] = useState(initialData?.title || '');
            const [content, setContent] = useState(initialData?.content || '');
            const [group, setGroup] = useState(initialData?.group || '');
            return (
                <div className="flex flex-col h-full bg-slate-50 border-r border-gray-200 shrink-0 w-[90vw] md:w-[50vw] lg:w-[45vw] xl:w-[40vw] relative z-0 shadow-[4px_0_24px_rgba(0,0,0,0.06)] animate-slide-in-right">
                    <div className="p-4 border-b border-gray-200 bg-white flex items-center justify-between shrink-0 shadow-sm z-10">
                        <div className="flex items-center gap-2">
                            <i className={`ph-fill ${isAdd ? 'ph-highlighter text-amber-500' : 'ph-pencil-simple text-orange-500'} text-xl`}></i>
                            <h3 className="font-bold text-gray-700">{isAdd ? '新規テキスト注釈を追加' : 'テキスト注釈を編集'}</h3>
                        </div>
                        <button onClick={onCancel} className="text-gray-400 hover:text-gray-600 transition-colors"><i className="ph-bold ph-x text-lg"></i></button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 flex flex-col gap-5">
                        <div className="bg-white border border-yellow-200 p-4 rounded-xl shadow-sm">
                            <p className="text-xs text-yellow-700 font-bold mb-2 uppercase tracking-wider"><i className="ph-bold ph-quotes mr-1"></i>選択したテキスト</p>
                            <p className="text-sm text-gray-700 italic leading-relaxed bg-yellow-50 p-3 rounded border-l-2 border-yellow-400 line-clamp-4">{quote}</p>
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-gray-600 mb-2">タイトル <span className="text-red-500">*</span></label>
                            <input type="text" value={title} onChange={e => setTitle(e.target.value)} className="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition-all bg-white shadow-sm text-gray-800" placeholder="例：この概念の具体例" autoFocus />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-gray-600 mb-2 flex items-center gap-1">
                                <i className="ph-fill ph-folder-notch text-amber-500"></i> グループ名 (任意)
                            </label>
                            <input type="text" value={group} onChange={e => setGroup(e.target.value)} list="anno-existing-groups" className="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition-all bg-white shadow-sm text-gray-800" placeholder="例：重要な概念" />
                            {existingAnnotationGroups && existingAnnotationGroups.length > 0 && (
                                <datalist id="anno-existing-groups">
                                    {existingAnnotationGroups.map((g, i) => <option key={i} value={g} />)}
                                </datalist>

                        </div>
                        <div className="flex-1 flex flex-col min-h-[200px]">
                            <label className="block text-sm font-bold text-gray-600 mb-2 flex justify-between items-end">
                                <span>注釈本文 <span className="text-red-500">*</span></span>
                                <span className="text-xs text-gray-400 font-normal px-2 py-0.5 bg-gray-200 rounded">Markdown & LaTeX対応</span>
                            </label>
                            <textarea value={content} onChange={e => setContent(e.target.value)} className="flex-1 w-full border border-gray-300 rounded-lg p-4 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition-all resize-none font-mono text-sm bg-white shadow-sm text-gray-700 leading-relaxed" placeholder="注釈をマークダウン形式で記述します..."></textarea>

                    <div className="p-4 border-t border-gray-200 bg-white flex justify-end gap-3 shrink-0">

                        </button>
                    </div>
                </div>
            );

        // --- メインアプリ ---
        const App = () => {
            const [appMode, setAppMode] = useState('home');
            const [projectList, setProjectList] = useState([]);
            const [currentProjectId, setCurrentProjectId] = useState(null);
            const [currentProjectName, setCurrentProjectName] = useState('');
            const [nodes, setNodes] = useState({});
            const [annotations, setAnnotations] = useState([]); // テキスト選択注釈
            const [panes, setPanes] = useState([]);
            const [selectionMenu, setSelectionMenu] = useState({ show: false, top: 0, left: 0, text: '', nodeId: null, paneIndex: 0 });
            const [tooltip, setTooltip] = useState({ show: false, text: '', top: 0, left: 0 });
            const scrollContainerRef = useRef(null);

            // 初期化
            useEffect(() => { setProjectList(Storage.getProjectList()); }, []);

            // 自動保存
            useEffect(() => {
                if (!currentProjectId || !nodes['root']) return;
                Storage.saveProjectData(currentProjectId, { nodes, annotations });
                setProjectList(prev => {
                    const updated = prev.map(p => p.id === currentProjectId ? {
                        ...p, name: currentProjectName, updatedAt: Date.now(),
                        nodeCount: Object.keys(nodes).length,
                        annotationCount: annotations.length,
                        preview: nodes['root'].answer.substring(0, 100)
                    } : p);
                    Storage.saveProjectList(updated);
                    return updated;
                });
            }, [nodes, annotations, currentProjectName, currentProjectId]);

            // カラムが増えたら右端へスクロール
            useEffect(() => {
                if (scrollContainerRef.current) {
                    scrollContainerRef.current.scrollTo({ left: scrollContainerRef.current.scrollWidth, behavior: 'smooth' });
                }
            }, [panes.length]);

            // --- プロジェクト管理 ---
            const openProject = (id) => {
                const data = Storage.getProjectData(id);
                const meta = projectList.find(p => p.id === id);
                if (data && meta && data.nodes && data.nodes['root']) {
                    setCurrentProjectId(id); setCurrentProjectName(meta.name);
                    setNodes(data.nodes); setAnnotations(data.annotations || []);
                    setAppMode('workspace'); setPanes([{ type: 'view', nodeId: 'root' }]);
                }
            };
            const createNewProject = () => { setCurrentProjectId(null); setCurrentProjectName(''); setNodes({}); setAnnotations([]); setAppMode('setup'); };
            const deleteProject = (id) => {
                Storage.deleteProjectData(id);
                setProjectList(prev => { const u = prev.filter(p => p.id !== id); Storage.saveProjectList(u); return u; });
            };
            const goHome = () => { setAppMode('home'); setCurrentProjectId(null); setCurrentProjectName(''); setNodes({}); setAnnotations([]); setPanes([]); setSelectionMenu({ show: false }); setTooltip({ show: false }); };

            // --- ノード操作 ---
            const handleSetupSave = (name) => {
                let id = currentProjectId;
                const now = Date.now();
                let newNodes = { ...nodes };
                if (!id) {
                    id = generateId();
                    const newProject = { id, name, createdAt: now, updatedAt: now, nodeCount: 1, annotationCount: 0, preview: '質問一覧から展開して確認してください。' };
                    setProjectList(prev => { const u = [newProject, ...prev]; Storage.saveProjectList(u); return u; });
                    newNodes = { root: { id: 'root', parentId: null, question: name, answer: '', children: [] } };
                } else {
                    newNodes['root'] = { ...newNodes['root'], question: name };
                }
                setCurrentProjectId(id); setCurrentProjectName(name); setNodes(newNodes);
                Storage.saveProjectData(id, { nodes: newNodes, annotations });
                setAppMode('workspace');
                if (panes.length === 0) setPanes([{ type: 'view', nodeId: 'root' }]);
            };

            const deleteNodeRecursive = (nodeId, nodesObj) => {
                const node = nodesObj[nodeId]; if (!node) return;
                node.children.forEach(childId => deleteNodeRecursive(childId, nodesObj));
                delete nodesObj[nodeId];
            };

            const handleSaveNode = (paneIndex, type, idOrParentId, question, answer, group = '') => {
                if (type === 'add') {
                    const newNodeId = generateId();
                    const parentId = idOrParentId;
                    setNodes(prev => {
                        const next = { ...prev };
                        next[newNodeId] = { id: newNodeId, parentId, question, answer, group, children: [] };
                        next[parentId] = { ...next[parentId], children: [...next[parentId].children, newNodeId] };
                        return next;
                    });
                    setPanes(prev => { const next = [...prev]; next[paneIndex] = { type: 'view', nodeId: newNodeId }; return next; });
                } else {
                    const nodeId = idOrParentId;
                    if (nodeId === 'root') setCurrentProjectName(question);
                    setNodes(prev => ({ ...prev, [nodeId]: { ...prev[nodeId], question, answer, group } }));
                    setPanes(prev => { const next = [...prev]; next[paneIndex] = { type: 'view', nodeId }; return next; });
                }
            };

            const handleDeleteNode = (paneIndex, nodeId, parentId) => {
                if (nodeId === 'root') return;
                if (!confirm('この質問と、そこから派生するすべての回答・質問を削除します。よろしいですか？')) return;
                // 関連するテキスト注釈も削除
                const nodeIds = new Set([nodeId]);
                const collectIds = (nid) => {
                    const n = nodes[nid]; if (!n) return;
                    n.children.forEach(cid => { nodeIds.add(cid); collectIds(cid); });
                };
                collectIds(nodeId);
                setAnnotations(prev => prev.filter(a => !nodeIds.has(a.nodeId)));
                setNodes(prev => {
                    const next = { ...prev };
                    if (parentId && next[parentId]) next[parentId] = { ...next[parentId], children: next[parentId].children.filter(id => id !== nodeId) };
                    deleteNodeRecursive(nodeId, next);
                    return next;
                });
                setPanes(prev => prev.slice(0, paneIndex));
            };

            // --- テキスト注釈操作 ---
            const handleAnnotateText = (nodeId, quote, rect) => {
                const top = Math.max(10, rect.top - 50);
                const left = rect.left + rect.width / 2;
                setSelectionMenu({ show: true, top, left, text: quote, nodeId, paneIndex: panes.findIndex(p => p.type === 'view' && p.nodeId === nodeId) });
            };

            const hideSelectionMenu = () => { setSelectionMenu({ show: false }); };

            const startAnnotationAdd = (paneIndex, nodeId, quote) => {
                setPanes(prev => {
                    const next = prev.slice(0, paneIndex + 1);
                    next.push({ type: 'annotation-add', nodeId, quote });
                    return next;
                });
                setSelectionMenu({ show: false });
                window.getSelection()?.removeAllRanges();
            };

            const saveAnnotation = (paneIndex, nodeId, quote, title, content, group) => {
                const na = { id: generateId(), nodeId, quote, title, content, group: group?.trim() || '', timestamp: Date.now() };
                setAnnotations(prev => [...prev, na]);
                setPanes(prev => { const next = [...prev]; next[paneIndex] = { type: 'annotation', annotationId: na.id }; return next; });
                window.getSelection()?.removeAllRanges();
            };

            const updateAnnotation = (paneIndex, annotationId, title, content, group) => {
                setAnnotations(prev => prev.map(a => a.id === annotationId ? { ...a, title, content, group: group?.trim() || '', timestamp: Date.now() } : a));
                setPanes(prev => { const next = [...prev]; next[paneIndex] = { type: 'annotation', annotationId }; return next; });
            };

            const handleDeleteAnnotation = (paneIndex, annotationId) => {
                if (!confirm('この注釈を削除しますか？')) return;
                setAnnotations(prev => prev.filter(a => a.id !== annotationId));
                setPanes(prev => prev.slice(0, paneIndex));
            };

            const openAnnotation = (paneIndex, annotationId) => {
                setPanes(prev => {
                    const next = prev.slice(0, paneIndex + 1);
                    next.push({ type: 'annotation', annotationId });
                    return next;
                });
            };

            // --- パンくず生成 ---
            const buildBreadcrumbPath = (paneIndex) => {
                const path = [];
                for (let i = 0; i <= paneIndex; i++) {
                    const p = panes[i];
                    let nodeId = p.nodeId || p.parentId;
                    if (!nodeId && p.type === 'add') nodeId = p.parentId;
                    const node = nodes[nodeId];
                    if (node) path.push({ title: node.question, isLast: i === paneIndex });
                }
                return path;
            };

            // --- エクスポート / インポート ---
            const doExport = (projectIds) => {
                const exportData = {
                    type: 'annotator-qa-export', version: 2, exportedAt: Date.now(),
                    projects: projectIds.map(id => {
                        const meta = projectList.find(p => p.id === id);
                        const data = Storage.getProjectData(id);
                        return { name: meta?.name || '名前なし', nodes: data?.nodes || {}, annotations: data?.annotations || [], createdAt: meta?.createdAt, updatedAt: meta?.updatedAt };
                    })
                };
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'qa-tree-export-' + new Date().toISOString().slice(0, 10) + '.json';
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            };
            const exportAllProjects = () => doExport(projectList.map(p => p.id));
            const exportSingleProject = (id) => doExport([id]);

            const importProjects = (data) => {
                if (!data || (data.type !== 'annotator-qa-export' && data.type !== 'annotator-qa-export') || !Array.isArray(data.projects)) {
                    alert('無効なファイル形式です。このツールからエクスポートしたファイルを選択してください。'); return;
                }
                let count = 0;
                const newList = [...projectList];
                data.projects.forEach(proj => {
                    const id = generateId(); const now = Date.now();
                    newList.unshift({ id, name: proj.name || '名前なし', createdAt: proj.createdAt || now, updatedAt: proj.updatedAt || now, nodeCount: Object.keys(proj.nodes || {}).length, annotationCount: (proj.annotations || []).length, preview: proj.nodes?.root?.answer?.substring(0, 100) || '' });
                    Storage.saveProjectData(id, { nodes: proj.nodes || {}, annotations: proj.annotations || [] });
                    count++;
                });
                Storage.saveProjectList(newList); setProjectList(newList);
                alert(count + ' 件のまとめをインポートしました。');
            };


            // --- レンダリング ---
            return (
                <div className="flex flex-col h-screen w-full bg-gray-50 overflow-hidden font-sans text-gray-900">
                    <header className="h-14 bg-slate-900 text-white flex items-center px-6 shrink-0 z-30 shadow-md">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-500 p-1.5 rounded text-white flex items-center justify-center shadow-lg shadow-blue-500/30 cursor-pointer hover:bg-blue-400 transition-colors" onClick={goHome} title="ホームに戻る">
                                <i className="ph-bold ph-tree-structure text-xl"></i>
                            </div>
                            <h1 className="font-bold text-lg tracking-wide cursor-pointer hover:text-blue-300 transition-colors" onClick={goHome}>
                                Q&Aツリー<span className="hidden sm:inline-block text-slate-400 font-normal text-sm ml-2">| 多重構造まとめツール</span>
                            </h1>
                            {appMode !== 'home' && currentProjectName && (
                                <div className="hidden sm:flex items-center gap-2 ml-4">
                                    <i className="ph ph-caret-right text-slate-600 text-sm"></i>
                                    <span className="text-slate-300 text-sm font-medium truncate max-w-[300px]">{currentProjectName}</span>
                                </div>
                            )}
                        </div>
                        <div className="ml-auto flex items-center gap-4">
                            {appMode !== 'home' && <button onClick={goHome} className="text-slate-400 hover:text-white text-sm flex items-center gap-1.5 transition-colors font-medium"><i className="ph-bold ph-house"></i> ホーム</button>}
                        </div>
                    </header>

                    {appMode === 'home' && (
                        <HomeScreen projects={projectList} onOpen={openProject} onCreateNew={createNewProject} onDelete={deleteProject} onExportSingle={exportSingleProject} onExportAll={exportAllProjects} onImport={importProjects} />
                    )}
                    {appMode === 'setup' && (
                        <SetupScreen initialName={currentProjectName} isNew={!currentProjectId} onSave={handleSetupSave}
                            onCancel={currentProjectId ? () => { setAppMode('workspace'); if (panes.length === 0) setPanes([{ type: 'view', nodeId: 'root' }]); } : (projectList.length > 0 ? goHome : null)} />
                    )}

                    {appMode === 'workspace' && (
                        <div className="flex-1 flex overflow-hidden relative bg-gray-200">
                            {/* テキスト選択フローティングメニュー */}
                            {selectionMenu.show && (
                                <div className="fixed z-[100] transform -translate-x-1/2 bg-slate-800 text-white px-3 py-2 rounded-lg shadow-xl flex items-center gap-3 animate-fade-in-up border border-slate-700"
                                    style={{ top: `${selectionMenu.top}px`, left: `${selectionMenu.left}px` }}>
                                    <div className="text-xs text-gray-300 max-w-[160px] truncate hidden sm:block">"{selectionMenu.text}"</div>
                                    <div className="w-px h-4 bg-slate-600 hidden sm:block"></div>
                                    <button className="text-sm font-bold text-amber-300 hover:text-amber-100 flex items-center gap-1.5 whitespace-nowrap"
                                        onMouseDown={(e) => { e.preventDefault(); startAnnotationAdd(selectionMenu.paneIndex, selectionMenu.nodeId, selectionMenu.text); }}>
                                        <i className="ph-bold ph-highlighter text-lg"></i> 注釈を追加
                                    </button>
                                    <button className="text-slate-500 hover:text-slate-300 ml-1" onMouseDown={(e) => { e.preventDefault(); hideSelectionMenu(); }}>
                                        <i className="ph-bold ph-x text-sm"></i>
                                    </button>
                                </div>
                            )}
                            {/* ホバーツールチップ */}
                            {tooltip.show && (
                                <div className="fixed z-[110] transform -translate-x-1/2 -translate-y-full bg-slate-800 text-white px-3 py-1.5 rounded-md text-xs font-bold shadow-lg pointer-events-none max-w-[250px] break-words text-center"
                                    style={{ top: `${tooltip.top}px`, left: `${tooltip.left}px` }}>
                                    {tooltip.text}
                                    <div className="absolute top-full left-1/2 transform -translate-x-1/2 border-[5px] border-transparent border-t-slate-800"></div>
                                </div>
                            )}

                            <div className="horizontal-scroll-container scroll-smooth" ref={scrollContainerRef}>
                                {panes.map((pane, index) => {
                                    const breadcrumb = buildBreadcrumbPath(index);

                                    if (pane.type === 'view') {
                                        const node = nodes[pane.nodeId];
                                        if (!node) return null;
                                        const validChildren = node.children.map(id => nodes[id]).filter(Boolean);
                                        const nodeWithValidChildren = { ...node, children: validChildren };
                                        const nextPane = panes[index + 1];
                                        const selectedChildId = nextPane ? (nextPane.nodeId || nextPane.parentId) : null;
                                        const nodeAnnotations = annotations.filter(a => a.nodeId === pane.nodeId);
                                        const activeAnnotationId = nextPane && nextPane.type === 'annotation' ? nextPane.annotationId :
                                            nextPane && nextPane.type === 'annotation-edit' ? nextPane.annotationId : null;
                                        return (
                                            <ViewPane
                                                key={`pane-${index}-${pane.nodeId}`}
                                                node={nodeWithValidChildren}
                                                isRoot={pane.nodeId === 'root'}
                                                breadcrumb={breadcrumb}
                                                isActive={index === panes.length - 1}
                                                selectedChildId={selectedChildId}
                                                nodeAnnotations={nodeAnnotations}
                                                activeAnnotationId={activeAnnotationId}
                                                onAnnotateText={(nodeId, quote, rect) => handleAnnotateText(nodeId, quote, rect)}
                                                onAnnotationClick={(annotationId) => openAnnotation(index, annotationId)}
                                                onMarkHover={(h, t, r) => { if (h && r) setTooltip({ show: true, text: t, top: r.top - 8, left: r.left + r.width / 2 }); else setTooltip({ show: false }); }}
                                                onHideSelectionMenu={hideSelectionMenu}
                                                onEdit={() => {
                                                    if (pane.nodeId === 'root') { setAppMode('setup'); }
                                                    else { setPanes(prev => { const n = [...prev]; n[index] = { type: 'edit', nodeId: pane.nodeId }; return n; }); }
                                                }}
                                                onDelete={() => handleDeleteNode(index, pane.nodeId, node.parentId)}
                                                onClose={() => setPanes(prev => prev.slice(0, index))}
                                                onAddChild={() => { setPanes(prev => { const next = prev.slice(0, index + 1); next.push({ type: 'add', parentId: pane.nodeId }); return next; }); }}
                                                onOpenChild={(childId) => { setPanes(prev => { const next = prev.slice(0, index + 1); next.push({ type: 'view', nodeId: childId }); return next; }); }}
                                            />
                                        );
                                    }

                                    if (pane.type === 'add' || pane.type === 'edit') {
                                        const isAdd = pane.type === 'add';
                                        const node = isAdd ? null : nodes[pane.nodeId];
                                        const isTopLevel = isAdd ? pane.parentId === 'root' : false;
                                        const existingGroups = Array.from(new Set(Object.values(nodes).map(n => n.group?.trim()).filter(Boolean)));
                                        return (
                                            <EditPane
                                                key={`pane-${index}-${pane.type}`}
                                                mode={pane.type}
                                                isTopLevel={isTopLevel}
                                                initialQuestion={node?.question || ''}
                                                initialAnswer={node?.answer || ''}
                                                initialGroup={node?.group || ''}
                                                breadcrumb={breadcrumb}
                                                existingGroups={existingGroups}
                                                onSave={(q, a, g) => handleSaveNode(index, pane.type, isAdd ? pane.parentId : pane.nodeId, q, a, g)}
                                                onCancel={() => {
                                                    if (isAdd) setPanes(prev => prev.slice(0, index));
                                                    else setPanes(prev => { const n = [...prev]; n[index] = { type: 'view', nodeId: pane.nodeId }; return n; });
                                                }}
                                            />
                                        );
                                    }

                                    if (pane.type === 'annotation') {
                                        const annotation = annotations.find(a => a.id === pane.annotationId);
                                        if (!annotation) return null;
                                        return (
                                            <AnnotationViewPane
                                                key={`pane-${index}-annotation-${pane.annotationId}`}
                                                annotation={annotation}
                                                onEdit={() => setPanes(prev => { const n = [...prev]; n[index] = { type: 'annotation-edit', annotationId: pane.annotationId }; return n; })}
                                                onDelete={() => handleDeleteAnnotation(index, pane.annotationId)}
                                                onClose={() => setPanes(prev => prev.slice(0, index))}
                                            />
                                        );
                                    }

                                    if (pane.type === 'annotation-add') {
                                        const existingAnnotationGroups = Array.from(new Set(annotations.map(a => a.group?.trim()).filter(Boolean)));
                                        return (
                                            <AnnotationFormPane
                                                key={`pane-${index}-annotation-add`}
                                                mode="add"
                                                quote={pane.quote}
                                                existingAnnotationGroups={existingAnnotationGroups}
                                                onSave={(title, content, group) => saveAnnotation(index, pane.nodeId, pane.quote, title, content, group)}
                                                onCancel={() => setPanes(prev => prev.slice(0, index))}
                                            />
                                        );
                                    }

                                    if (pane.type === 'annotation-edit') {
                                        const annotation = annotations.find(a => a.id === pane.annotationId);
                                        if (!annotation) return null;
                                        const existingAnnotationGroups = Array.from(new Set(annotations.map(a => a.group?.trim()).filter(Boolean)));
                                        return (
                                            <AnnotationFormPane
                                                key={`pane-${index}-annotation-edit-${pane.annotationId}`}
                                                mode="edit"
                                                quote={annotation.quote}
                                                initialData={annotation}
                                                existingAnnotationGroups={existingAnnotationGroups}
                                                onSave={(title, content, group) => updateAnnotation(index, pane.annotationId, title, content, group)}
                                                onCancel={() => setPanes(prev => { const n = [...prev]; n[index] = { type: 'annotation', annotationId: pane.annotationId }; return n; })}
                                            />
                                        );
                                    }

                                    return null;
                                })}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
