<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&Aツリー [Dev] - 多重構造まとめツール</title>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Marked (Markdown Parser) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- KaTeX (Math Rendering) -->
    <link href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        /* カスタムアニメーション */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out forwards;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide-in-right {
            animation: slideInRight 0.3s ease-out forwards;
        }

        /* 横スクロールコンテナとスクロールバー */
        .horizontal-scroll-container {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            width: 100%;
            height: 100%;
        }
        .horizontal-scroll-container::-webkit-scrollbar { height: 10px; }
        .horizontal-scroll-container::-webkit-scrollbar-track { background: #f1f5f9; }
        .horizontal-scroll-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Markdown 表示用スタイル */
        .markdown-body { color: #334155; font-size: 0.95rem; line-height: 1.8; }
        .markdown-body h1 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.75em; color: #0f172a; }
        .markdown-body h2 { font-size: 1.25rem; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.75em; color: #1e293b; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3em; }
        .markdown-body h3 { font-size: 1.125rem; font-weight: 600; margin-top: 1.25em; margin-bottom: 0.5em; color: #334155; }
        .markdown-body p { margin-bottom: 1.2em; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body a { color: #2563eb; text-decoration: underline; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1.2em; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1.2em; }
        .markdown-body li { margin-bottom: 0.3em; }
        .markdown-body blockquote { border-left: 4px solid #cbd5e1; color: #64748b; font-style: italic; margin-bottom: 1.2em; background: #f8fafc; padding: 0.5em 1em; border-radius: 0 0.5rem 0.5rem 0; }
        .markdown-body code { background-color: #f1f5f9; color: #ef4444; padding: 0.2em 0.4em; border-radius: 0.25rem; font-size: 0.875em; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .markdown-body pre { background-color: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1.2em; }
        .markdown-body pre code { background-color: transparent; color: inherit; padding: 0; font-size: 0.875em; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1.2em; }
        .markdown-body th, .markdown-body td { border: 1px solid #e2e8f0; padding: 0.5rem; text-align: left; }
        .markdown-body th { background-color: #f8fafc; font-weight: 600; }

        /* KaTeX 表示調整 */
        .katex-display { margin: 1em 0; overflow-x: auto; overflow-y: hidden; padding-bottom: 0.2em; }

        /* 注釈ハイライト */
        .annotation-mark {
            background-color: rgba(253, 224, 71, 0.4); border-bottom: 2px dotted #eab308;
            color: inherit; cursor: pointer; border-radius: 2px; padding: 2px 0;
            transition: all 0.2s; position: relative;
            box-decoration-break: clone; -webkit-box-decoration-break: clone;
        }
        .annotation-mark:hover { background-color: rgba(253, 224, 71, 0.7); }
        .annotation-mark.active { background-color: rgba(250, 204, 21, 0.6); border-bottom: 2px solid #ca8a04; box-shadow: 0 0 0 2px rgba(250, 204, 21, 0.3); }

        /* 注釈リストアイテム */
        .anno-list-item { padding: 6px 12px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s ease; }
        .anno-list-item:hover { background: rgba(59,130,246,0.08); }
        .anno-list-item.active { background: rgba(59,130,246,0.12); border-left-color: #3b82f6; }


        /* 検索ハイライト */
        .search-highlight { background: rgba(250, 204, 21, 0.5); border-radius: 2px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

        const { useState, useEffect, useRef } = React;
        const generateId = () => Math.random().toString(36).substr(2, 9);

        // スクロール可能な親要素内でのみスクロール（scrollIntoViewはページ全体に影響するため使用しない）
        const scrollToId = (elementId) => {
            const el = document.getElementById(elementId);
            if (!el) return;
            let parent = el.parentElement;
            while (parent && !['auto', 'scroll'].includes(window.getComputedStyle(parent).overflowY)) {
                parent = parent.parentElement;
            }
            if (parent) {
                const elRect = el.getBoundingClientRect();
                const parentRect = parent.getBoundingClientRect();
                parent.scrollTo({ top: parent.scrollTop + elRect.top - parentRect.top - 12, behavior: 'smooth' });
            }
        };

        const migrateNode = (node) => {
            if (node.sections) return node;
            const { answer, group, ...rest } = node;
            return { ...rest, sections: [{ id: generateId(), title: '', content: answer || '' }] };
        };
        const migrateNodes = (nodesObj) => Object.fromEntries(Object.entries(nodesObj).map(([k, v]) => [k, migrateNode(v)]));
        const migrateAnnotation = (a) => {
            if (a.sections) return a;
            return { ...a, sections: [{ id: generateId(), title: '', content: a.content || '' }] };
        };
        const migrateAnnotations = (arr) => arr.map(migrateAnnotation);

        // テキスト選択からquoteを取得（KaTeX対応）
        const getQuoteFromSelection = (range) => {
            const fragment = range.cloneContents();
            const tempDiv = document.createElement('div');
            tempDiv.appendChild(fragment);
            tempDiv.querySelectorAll('.katex-display').forEach(el => {
                const ann = el.querySelector('annotation[encoding="application/x-tex"]');
                if (ann) el.replaceWith('$$' + ann.textContent.trim() + '$$');
            });
            tempDiv.querySelectorAll('.katex').forEach(el => {
                const ann = el.querySelector('annotation[encoding="application/x-tex"]');
                if (ann) el.replaceWith('$' + ann.textContent.trim() + '$');
            });
            return tempDiv.textContent.trim();
        };

        // --- LocalStorage ヘルパー ---
        const Storage = {
            getProjectList() {
                try { return JSON.parse(localStorage.getItem('annotator-qa-project-list') || '[]'); }
                catch(e) { return []; }
            },
            saveProjectList(list) {
                localStorage.setItem('annotator-qa-project-list', JSON.stringify(list));
            },
            getProjectData(id) {
                try {
                    const data = JSON.parse(localStorage.getItem('annotator-qa-project-' + id) || 'null');
                    if (data && !data.annotations) data.annotations = [];
                    if (data) {
                        data.annotations = data.annotations.map(a => ({
                            childNodeIds: [], parentAnnotationId: null, ...a
                        }));
                        Object.values(data.nodes || {}).forEach(n => {
                            if (n.parentAnnotationId === undefined) n.parentAnnotationId = null;
                        });
                    }
                    return data;
                } catch(e) { return null; }
            },
            saveProjectData(id, data) {
                localStorage.setItem('annotator-qa-project-' + id, JSON.stringify(data));
            },
            deleteProjectData(id) {
                localStorage.removeItem('annotator-qa-project-' + id);
            },
            getBackupConfig() {
                try { return JSON.parse(localStorage.getItem('annotator-qa-backup-config') || '{}'); }
                catch(e) { return {}; }
            },
            saveBackupConfig(config) {
                localStorage.setItem('annotator-qa-backup-config', JSON.stringify(config));
            }
        };

        const BackupFile = {
            isSupported() {
                return !!(window.showSaveFilePicker && window.indexedDB);
            },
            openDb() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open('annotator-qa-backup-db', 1);
                    req.onupgradeneeded = () => req.result.createObjectStore('kv');
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            },
            async getHandle() {
                if (!this.isSupported()) return null;
                const db = await this.openDb();
                return await new Promise((resolve, reject) => {
                    const tx = db.transaction('kv', 'readonly');
                    const req = tx.objectStore('kv').get('backup-file-handle');
                    req.onsuccess = () => resolve(req.result || null);
                    req.onerror = () => reject(req.error);
                });
            },
            async setHandle(handle) {
                const db = await this.openDb();
                await new Promise((resolve, reject) => {
                    const tx = db.transaction('kv', 'readwrite');
                    tx.objectStore('kv').put(handle, 'backup-file-handle');
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },
            async requestWritePermission(handle, request = false) {
                if (!handle) return false;
                const opts = { mode: 'readwrite' };
                if ((await handle.queryPermission(opts)) === 'granted') return true;
                if (!request) return false;
                return (await handle.requestPermission(opts)) === 'granted';
            },
            async pickHandle() {
                return await window.showSaveFilePicker({
                    suggestedName: 'qa-tree-auto-backup.json',
                    types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
                });
            },
            async write(handle, data) {
                const writable = await handle.createWritable();
                await writable.write(JSON.stringify(data, null, 2));
                await writable.close();
            }
        };

        // --- MarkdownViewer (注釈ハイライト対応) ---
        const MarkdownViewer = ({ content, className = "markdown-body", annotations = [], onMarkClick, onMarkHover, activeAnnotationId }) => {
            const contentRef = useRef(null);
            const callbacksRef = useRef({ onMarkClick, onMarkHover });
            useEffect(() => { callbacksRef.current = { onMarkClick, onMarkHover }; }, [onMarkClick, onMarkHover]);
            const annotationsStr = JSON.stringify(annotations.map(a => ({ id: a.id, quote: a.quote, title: a.title })));

            // マークダウン+数式レンダリング
            useEffect(() => {
                if (!contentRef.current || !content) {
                    if (contentRef.current) contentRef.current.innerHTML = '';
                    return;
                }
                const mathBlocks = [];
                let pt = content;
                pt = pt.replace(/\$\$([\s\S]+?)\$\$/g, (m, p1) => { const id = `MATHBLOCK${mathBlocks.length}END`; mathBlocks.push({ id, content: `$$${p1}$$` }); return id; });
                pt = pt.replace(/\\\[([\s\S]+?)\\\]/g, (m, p1) => { const id = `MATHBLOCK${mathBlocks.length}END`; mathBlocks.push({ id, content: `\\[${p1}\\]` }); return id; });
                pt = pt.replace(/\$((?:\\.|[^$\n])+?)\$/g, (m, p1) => { const id = `MATHINLINE${mathBlocks.length}END`; mathBlocks.push({ id, content: `$${p1}$` }); return id; });
                pt = pt.replace(/\\\(([\s\S]+?)\\\)/g, (m, p1) => { const id = `MATHINLINE${mathBlocks.length}END`; mathBlocks.push({ id, content: `\\(${p1}\\)` }); return id; });
                let html = marked.parse(pt);
                mathBlocks.forEach(block => { html = html.replace(block.id, block.content); });
                contentRef.current.innerHTML = html;
                try {
                    renderMathInElement(contentRef.current, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false},
                            {left: '\\(', right: '\\)', display: false},
                            {left: '\\[', right: '\\]', display: true}
                        ],
                        throwOnError: false
                    });
                } catch(e) {}
            }, [content]);

            // コピー時のKaTeX処理
            useEffect(() => {
                const el = contentRef.current; if (!el) return;
                const handleCopy = (e) => {
                    const sel = window.getSelection(); if (!sel.rangeCount) return;
                    const frag = sel.getRangeAt(0).cloneContents();
                    const tmp = document.createElement('div'); tmp.appendChild(frag);
                    if (!tmp.querySelector('.katex')) return;
                    tmp.querySelectorAll('.katex-display').forEach(k => { const a = k.querySelector('annotation[encoding="application/x-tex"]'); if (a) k.replaceWith(`\n$$${a.textContent.trim()}$$\n`); });
                    tmp.querySelectorAll('.katex').forEach(k => { const a = k.querySelector('annotation[encoding="application/x-tex"]'); if (a) k.replaceWith(`$${a.textContent.trim()}$`); });
                    e.preventDefault(); e.clipboardData.setData('text/plain', tmp.textContent);
                };
                el.addEventListener('copy', handleCopy);
                return () => el.removeEventListener('copy', handleCopy);
            }, []);

            // 注釈ハイライト適用（DOM操作）― contentまたはannotations変更時のみ実行
            useEffect(() => {
                const root = contentRef.current; if (!root) return;
                root.querySelectorAll('.annotation-mark').forEach(mark => {
                    const p = mark.parentNode;
                    while (mark.firstChild) p.insertBefore(mark.firstChild, mark);
                    p.removeChild(mark);
                });
                root.normalize();
                const parsed = JSON.parse(annotationsStr);
                if (!parsed || parsed.length === 0) return;

                const segments = []; let vOff = 0;
                const walk = (node) => {
                    if (node.nodeType === 3) { const t = node.textContent; if (t.length > 0) { segments.push({ type:'text', node, text:t, vStart:vOff, vEnd:vOff+t.length }); vOff += t.length; } return; }
                    if (node.nodeType !== 1) return;
                    if (node.classList.contains('katex-display')) { const a = node.querySelector('annotation[encoding="application/x-tex"]'); if (a) { const t = '$$'+a.textContent.trim()+'$$'; segments.push({ type:'katex-display', node, text:t, vStart:vOff, vEnd:vOff+t.length }); vOff += t.length; } return; }
                    if (node.classList.contains('katex')) { const a = node.querySelector('annotation[encoding="application/x-tex"]'); if (a) { const t = '$'+a.textContent.trim()+'$'; segments.push({ type:'katex', node, text:t, vStart:vOff, vEnd:vOff+t.length }); vOff += t.length; } return; }
                    for (const c of Array.from(node.childNodes)) walk(c);
                };
                walk(root);

                const vText = segments.map(s => s.text).join('');
                const matches = [];
                for (const a of parsed) {
                    if (!a.quote) continue;
                    const idx = vText.indexOf(a.quote);
                    if (idx === -1) continue;
                    matches.push({ id: a.id, title: a.title, start: idx, end: idx + a.quote.length });
                }
                if (matches.length === 0) return;

                const setupEv = (el, cov) => {
                    el.onmouseenter = () => { if (callbacksRef.current.onMarkHover) { const r = el.getBoundingClientRect(); const t = cov.map(m=>m.title).filter(Boolean); callbacksRef.current.onMarkHover(true, t.length>1?t.join(' / '):(t[0]||'注釈'), r); } };
                    el.onmouseleave = () => { if (callbacksRef.current.onMarkHover) callbacksRef.current.onMarkHover(false); };
                    el.onclick = (e) => { e.preventDefault(); e.stopPropagation(); window.getSelection().removeAllRanges(); if (callbacksRef.current.onMarkHover) callbacksRef.current.onMarkHover(false); if (callbacksRef.current.onMarkClick) callbacksRef.current.onMarkClick(cov[0].id); };
                };

                for (let i = segments.length-1; i >= 0; i--) {
                    const seg = segments[i];
                    const ol = matches.filter(m => m.start < seg.vEnd && m.end > seg.vStart);
                    if (ol.length === 0) continue;
                    if (seg.type === 'katex' || seg.type === 'katex-display') {
                        const w = document.createElement('span');
                        w.className = 'annotation-mark';
                        w.dataset.annoIds = JSON.stringify(ol.map(m => m.id));
                        if (seg.type === 'katex-display') w.style.display = 'block';
                        setupEv(w, ol); seg.node.parentNode.insertBefore(w, seg.node); w.appendChild(seg.node);
                    } else if (seg.type === 'text') {
                        const txt = seg.node.textContent;
                        const bds = new Set([0, txt.length]);
                        for (const m of ol) { bds.add(Math.max(0, m.start-seg.vStart)); bds.add(Math.min(txt.length, m.end-seg.vStart)); }
                        const sorted = Array.from(bds).sort((a,b)=>a-b);
                        const frag = document.createDocumentFragment();
                        for (let j = 0; j < sorted.length-1; j++) {
                            const s = sorted[j], e = sorted[j+1]; const sub = txt.substring(s, e); if (!sub) continue;
                            const vs = seg.vStart+s, ve = seg.vStart+e;
                            const cov = ol.filter(m => m.start<=vs && m.end>=ve);
                            if (cov.length > 0) {
                                const sp = document.createElement('span');
                                sp.className = 'annotation-mark';
                                sp.dataset.annoId = cov[0].id;
                                sp.dataset.annoIds = JSON.stringify(cov.map(m => m.id));
                                sp.textContent = sub; setupEv(sp, cov); frag.appendChild(sp);
                            } else frag.appendChild(document.createTextNode(sub));
                        }
                        seg.node.parentNode.replaceChild(frag, seg.node);
                    }
                }
                return () => { if (callbacksRef.current.onMarkHover) callbacksRef.current.onMarkHover(false); };
            }, [content, annotationsStr]);

            // activeAnnotationId変更時のみクラス更新＋スクロール（DOM操作なし）
            useEffect(() => {
                const root = contentRef.current; if (!root) return;
                let activeEl = null;
                root.querySelectorAll('.annotation-mark').forEach(el => {
                    const ids = JSON.parse(el.dataset.annoIds || '[]');
                    const isActive = activeAnnotationId && ids.includes(activeAnnotationId);
                    el.className = 'annotation-mark' + (isActive ? ' active' : '');
                    if (isActive && !activeEl) activeEl = el;
                });
                if (activeEl) {
                    // ページ全体ではなく最近傍のスクロール可能な親要素内でスクロール
                    let parent = activeEl.parentElement;
                    while (parent && !['auto', 'scroll'].includes(window.getComputedStyle(parent).overflowY)) {
                        parent = parent.parentElement;
                    }
                    if (parent) {
                        const elRect = activeEl.getBoundingClientRect();
                        const parentRect = parent.getBoundingClientRect();
                        const relTop = elRect.top - parentRect.top + parent.scrollTop;
                        parent.scrollTo({ top: Math.max(0, relTop - 80), behavior: 'smooth' });
                    }
                }
            }, [activeAnnotationId]);


            return <div ref={contentRef} className={className}></div>;
        };

        // --- InlineTitle (タイトル向けインラインMarkdown+数式レンダラ) ---
        const InlineTitle = ({ text, className = '' }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!ref.current) return;
                const html = text ? marked.parseInline(text) : '';
                ref.current.innerHTML = html;
                if (html && window.renderMathInElement) {
                    renderMathInElement(ref.current, {
                        delimiters: [
                            { left: '$$', right: '$$', display: false },
                            { left: '$', right: '$', display: false },
                            { left: '\\(', right: '\\)', display: false },
                        ],
                        throwOnError: false,
                    });
                }
            }, [text]);
            return <span ref={ref} className={className}></span>;
        };


        // --- ホーム画面 ---
        const HomeScreen = ({ projects, onOpen, onCreateNew, onDelete, onExportSingle, onExportAll, onImport }) => {
            const fileInputRef = useRef(null);
            const handleFileChange = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => { try { onImport(JSON.parse(event.target.result)); } catch(err) { alert('ファイルの読み込みに失敗しました。正しいJSONファイルを選択してください。'); } };
                reader.readAsText(file); e.target.value = '';
            };
            return (
                <div className="flex-1 overflow-y-auto bg-gray-50">
                    <div className="max-w-4xl mx-auto px-6 py-10 animate-fade-in-up">
                        <div className="flex items-center justify-between mb-8">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800">保存済みのQ&Aツリー</h2>
                                <p className="text-gray-500 text-sm mt-1">{projects.length} 件のまとめ</p>
                            </div>
                            <div className="flex items-center gap-3">
                                <button onClick={() => fileInputRef.current?.click()} className="px-4 py-2.5 text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 font-medium text-sm flex items-center gap-2 transition-colors">
                                    <i className="ph-bold ph-upload-simple"></i> インポート
                                </button>
                                <input ref={fileInputRef} type="file" accept=".json" onChange={handleFileChange} className="hidden" />
                                {projects.length > 0 && (
                                    <button onClick={onExportAll} className="px-4 py-2.5 text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 font-medium text-sm flex items-center gap-2 transition-colors">
                                        <i className="ph-bold ph-download-simple"></i> 全てエクスポート
                                    </button>
                                )}
                                <button onClick={onCreateNew} className="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-bold text-sm hover:bg-blue-700 flex items-center gap-2 transition-colors shadow-sm">
                                    <i className="ph-bold ph-plus"></i> 新規作成
                                </button>
                            </div>
                        </div>
                        {projects.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-20 text-gray-400">
                                <div className="w-24 h-24 bg-blue-100 text-blue-300 rounded-full flex items-center justify-center mb-6 shadow-inner">
                                    <i className="ph-fill ph-tree-structure text-5xl"></i>
                                </div>
                                <h3 className="text-xl font-bold text-gray-400 mb-2">まだまとめがありません</h3>
                                <p className="text-sm text-gray-400 max-w-sm text-center leading-relaxed">「新規作成」ボタンから大元のテーマを作成し、質問と回答を無限に掘り下げていくツリーを作りましょう。</p>
                            </div>
                        ) : (
                            <div className="grid gap-4">
                                {projects.map(project => (
                                    <div key={project.id} onClick={() => onOpen(project.id)} className="bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-md hover:border-blue-300 transition-all cursor-pointer group">
                                        <div className="p-5 flex items-start justify-between">
                                            <div className="flex-1 min-w-0">
                                                <h3 className="font-bold text-gray-800 text-lg truncate group-hover:text-blue-600 transition-colors">{project.name}</h3>
                                                <div className="flex items-center gap-4 mt-2 text-sm text-gray-400">
                                                    <span className="flex items-center gap-1"><i className="ph ph-calendar-blank"></i>{new Date(project.createdAt).toLocaleDateString('ja-JP')}</span>
                                                    <span className="flex items-center gap-1"><i className="ph ph-clock"></i>{new Date(project.updatedAt).toLocaleDateString('ja-JP')} 更新</span>
                                                    <span className="flex items-center gap-1"><i className="ph ph-list-dashes"></i>{project.nodeCount || 0} ノード</span>
                                                    {(project.annotationCount || 0) > 0 && <span className="flex items-center gap-1 text-amber-500"><i className="ph-fill ph-highlighter"></i>{project.annotationCount} 注釈</span>}
                                                </div>
                                                {project.preview && <p className="mt-3 text-sm text-gray-500 line-clamp-2 leading-relaxed">{project.preview}</p>}
                                            </div>
                                            <div className="flex items-center gap-1 ml-4 shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                                                <button onClick={(e) => { e.stopPropagation(); onExportSingle(project.id); }} className="w-9 h-9 flex items-center justify-center rounded-full text-gray-400 hover:text-blue-600 hover:bg-blue-100 transition-colors" title="エクスポート（JSON）"><i className="ph ph-download-simple text-lg"></i></button>
                                                <button onClick={(e) => { e.stopPropagation(); if(confirm('\u300c'+project.name+'\u300d\u3092\u524a\u9664\u3057\u307e\u3059\u304b\uff1f\u3053\u306e\u64cd\u4f5c\u306f\u5143\u306b\u623b\u305b\u307e\u305b\u3093\u3002')) onDelete(project.id); }} className="w-9 h-9 flex items-center justify-center rounded-full text-gray-400 hover:text-red-600 hover:bg-red-100 transition-colors" title="削除"><i className="ph ph-trash text-lg"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- セットアップ画面 ---
        const SetupScreen = ({ initialName, isNew, onSave, onCancel }) => {
            const [name, setName] = useState(initialName || '');
            return (
                <div className="flex flex-col items-center justify-center h-[calc(100vh-56px)] bg-gray-50 p-6">
                    <div className="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col animate-fade-in-up">
                        <div className="p-8">
                            <h1 className="text-2xl font-bold text-gray-800 mb-2">{isNew ? '新しいまとめツリーを作成' : 'まとめのタイトルを編集'}</h1>
                            <p className="text-gray-500 text-sm mb-6">このツリー全体の主題（タイトル）を設定します。</p>
                            <label className="block text-sm font-bold text-gray-700 mb-2">主題・タイトル <span className="text-red-500">*</span></label>
                            <input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all bg-white text-lg font-bold" placeholder="例：React Hooks の仕組みについて" autoFocus />
                        </div>
                        <div className="bg-gray-50 px-8 py-5 border-t border-gray-100 flex justify-end gap-3">
                            {onCancel && <button onClick={onCancel} className="px-5 py-2.5 text-gray-600 bg-white border border-gray-300 rounded-lg font-bold hover:bg-gray-50 transition-colors">キャンセル</button>}
                            <button onClick={() => onSave(name)} disabled={!name.trim()} className="px-6 py-2.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 disabled:opacity-50 transition-colors shadow-sm flex items-center gap-2">
                                <i className="ph-bold ph-check"></i> {isNew ? '作成して進む' : '保存'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- パンくずリスト ---
        const BreadcrumbTrail = ({ path }) => (
            <div className="flex items-center flex-wrap gap-1 text-xs px-4 py-2 bg-slate-100 border-b border-gray-200 text-gray-500 shrink-0">
                <i className="ph-fill ph-folder-open text-blue-400 mr-1"></i>
                {path.map((item, idx) => (
                    <React.Fragment key={idx}>
                        {idx > 0 && <span className="text-gray-400 mx-1">›</span>}
                        {item.isAnnotation && <i className="ph-fill ph-highlighter text-amber-400 mr-0.5"></i>}
                        <span className={`max-w-[120px] md:max-w-[200px] truncate ${item.isLast ? 'font-bold text-gray-800' : 'text-gray-500'}`} title={item.title}>{item.title}</span>
                    </React.Fragment>
                ))}
            </div>
        );

        // --- 注釈リストバー (テキスト選択注釈一覧) ---
        const AnnotationListBar = ({ annotations, activeAnnotationId, onSelect }) => {
            if (!annotations || annotations.length === 0) return null;
            return (
                <div className="border border-amber-200 rounded-lg bg-amber-50 mb-4 overflow-hidden">
                    <div className="px-3 py-2 bg-amber-100 border-b border-amber-200 flex items-center gap-2">
                        <i className="ph-fill ph-highlighter text-amber-600 text-sm"></i>
                        <span className="text-xs font-bold text-amber-700 uppercase tracking-wider">テキスト注釈 ({annotations.length})</span>
                    </div>
                    <div className="max-h-[160px] overflow-y-auto">
                        {annotations.map(a => (
                            <div key={a.id} onClick={() => onSelect(a.id)} className={'anno-list-item flex items-center gap-2' + (a.id === activeAnnotationId ? ' active' : '')}>
                                <i className="ph-fill ph-highlighter text-amber-500 text-xs shrink-0"></i>
                                <div className="flex-1 min-w-0">
                                    <span className="text-sm font-medium text-gray-700 truncate block">{a.title}</span>
                                    <span className="text-[11px] text-gray-400 truncate block">"{a.quote?.substring(0, 50)}{(a.quote?.length||0) > 50 ? '...' : ''}"</span>
                                </div>
                                {a.group && <span className="text-[10px] bg-amber-200 text-amber-700 px-1.5 py-0.5 rounded font-medium shrink-0">{a.group}</span>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };


        // --- ツリーナビゲーション ノードアイテム (再帰) ---
        const TreeNodeItem = ({ node, level, nodes, annotations, expandedIds, onToggle, onExpand, onSelectNode, onSelectAnnotation, activeNodeIds, activeAnnotationId, onMoveNode }) => {
            const isExpanded = expandedIds.has(node.id);
            const isActive = activeNodeIds.has(node.id);
            const children = node.children.map(id => nodes[id]).filter(Boolean);
            const nodeAnnotations = annotations.filter(a => a.nodeId === node.id);
            const hasItems = children.length > 0 || nodeAnnotations.length > 0;
            const pl = 8 + level * 14;

            return (
                <div className="group/treerow">
                    <div
                        onClick={() => { onExpand(node.id); onSelectNode(node.id); }}
                        style={{ paddingLeft: `${pl}px` }}
                        className={`flex items-center gap-1 py-1.5 pr-1 rounded-md cursor-pointer transition-colors text-xs ${isActive ? 'bg-blue-100 text-blue-800 font-bold' : 'hover:bg-gray-100 text-gray-700'}`}
                    >
                        <span onClick={(e) => { e.stopPropagation(); onToggle(node.id); }} className="w-3 shrink-0 flex items-center justify-center">
                            {hasItems && <i className={`ph-bold ph-caret-${isExpanded ? 'down' : 'right'} text-[9px] ${isActive ? 'text-blue-500' : 'text-gray-400'}`}></i>}
                        </span>
                        <i className={`ph-fill ph-question text-[10px] shrink-0 ${isActive ? 'text-blue-600' : 'text-gray-300'}`}></i>
                        <InlineTitle text={node.question} className="truncate leading-snug flex-1 min-w-0" />
                        {onMoveNode && node.parentId && (
                            <span className="flex gap-0.5 opacity-0 group-hover/treerow:opacity-100 transition-opacity shrink-0 ml-1" onClick={e => e.stopPropagation()}>
                                <button onClick={() => onMoveNode(node.id, -1)} title="上へ" className="w-4 h-4 flex items-center justify-center rounded hover:bg-gray-300 text-gray-400 hover:text-gray-700"><i className="ph-bold ph-arrow-up text-[8px]"></i></button>
                                <button onClick={() => onMoveNode(node.id,  1)} title="下へ" className="w-4 h-4 flex items-center justify-center rounded hover:bg-gray-300 text-gray-400 hover:text-gray-700"><i className="ph-bold ph-arrow-down text-[8px]"></i></button>
                            </span>
                        )}
                    </div>
                    {isExpanded && (
                        <>
                            {children.map(child => (
                                <TreeNodeItem key={child.id} node={child} level={level + 1} nodes={nodes} annotations={annotations}
                                    expandedIds={expandedIds} onToggle={onToggle} onExpand={onExpand} onSelectNode={onSelectNode} onSelectAnnotation={onSelectAnnotation}
                                    activeNodeIds={activeNodeIds} activeAnnotationId={activeAnnotationId} onMoveNode={onMoveNode} />
                            ))}
                            {nodeAnnotations.map(anno => {
                                const isAnnoActive = activeAnnotationId === anno.id;
                                return (
                                    <div key={anno.id}
                                        onClick={(e) => { e.stopPropagation(); onSelectAnnotation(node.id, anno.id); }}
                                        style={{ paddingLeft: `${pl + 14}px` }}
                                        className={`flex items-center gap-1 py-1 pr-2 rounded-md cursor-pointer transition-colors text-xs ${isAnnoActive ? 'bg-amber-100 text-amber-800 font-bold' : 'hover:bg-amber-50 text-gray-600'}`}
                                    >
                                        <span className="w-3 shrink-0"></span>
                                        <i className={`ph-fill ph-highlighter text-[10px] shrink-0 ${isAnnoActive ? 'text-amber-500' : 'text-amber-300'}`}></i>
                                        <InlineTitle text={anno.title} className="truncate leading-snug" />
                                    </div>
                                );
                            })}
                        </>
                    )}
                </div>
            );
        };

        // --- ViewPane ---
        const ViewPane = ({ node, isRoot, breadcrumb, isActive, selectedChildId, nodeAnnotations, activeAnnotationId, onAnnotateText, onAnnotationClick, onMarkHover, onHideSelectionMenu, onEdit, onDelete, onClose, onAddChild, onAddSection, onOpenChild, onMoveNode, allNodes, allAnnotations, treeExpandedIds, onTreeToggle, onTreeExpand, onTreeExpandAll, onTreeCollapseAll, onTreeSelectNode, onTreeSelectAnnotation, treeActiveNodeIds, treeActiveAnnotationId, onOpenSearch }) => {
            const [listCollapsed, setListCollapsed] = useState(!isRoot);
            const [collapsedSections, setCollapsedSections] = useState(new Set());
            const toggleSection = (sectionId) => setCollapsedSections(prev => { const next = new Set(prev); next.has(sectionId) ? next.delete(sectionId) : next.add(sectionId); return next; });

            // セクションごとにアノテーションを振り分け
            const sectionAnnotations = {};
            if (!isRoot && node.sections && nodeAnnotations) {
                nodeAnnotations.forEach(a => {
                    if (a.sectionId) {
                        if (!sectionAnnotations[a.sectionId]) sectionAnnotations[a.sectionId] = [];
                        sectionAnnotations[a.sectionId].push(a);
                    } else {
                        const found = node.sections.find(s => a.quote && s.content.includes(a.quote));
                        const targetId = found ? found.id : node.sections[0]?.id;
                        if (targetId) {
                            if (!sectionAnnotations[targetId]) sectionAnnotations[targetId] = [];
                            sectionAnnotations[targetId].push(a);
                        }
                    }
                });
            }

            const handleSectionMouseUp = (sectionId) => () => {
                if (isRoot) return;
                setTimeout(() => {
                    const sel = window.getSelection();
                    const text = sel?.toString().trim();
                    if (text && text.length >= 2 && sel.rangeCount > 0) {
                        const range = sel.getRangeAt(0);
                        const rect = range.getBoundingClientRect();
                        const quote = getQuoteFromSelection(range);
                        onAnnotateText(node.id, quote || text, rect, sectionId);
                    }
                }, 10);
            };

            const renderChildNode = (childNode) => {
                const isChildSelected = selectedChildId === childNode.id;
                return (
                    <div key={childNode.id} onClick={() => onOpenChild(childNode.id)} className={`px-3 py-2 rounded-lg border transition-all cursor-pointer group bg-white ${isChildSelected ? 'border-blue-500 bg-blue-50 ring-2 ring-blue-100 shadow-sm' : 'border-gray-200 hover:border-blue-300 hover:shadow-sm'}`}>
                        <div className="font-medium text-gray-800 flex items-center gap-2 text-sm">
                            <i className={`ph-fill ph-question shrink-0 text-sm ${isChildSelected ? 'text-blue-600' : 'text-gray-300 group-hover:text-blue-400 transition-colors'}`}></i>
                            <InlineTitle text={childNode.question} className="leading-snug flex-1 min-w-0" />
                            {onMoveNode && (
                                <span className="flex gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity shrink-0" onClick={e => e.stopPropagation()}>
                                    <button onClick={() => onMoveNode(childNode.id, -1)} title="上へ" className="w-5 h-5 flex items-center justify-center rounded hover:bg-gray-200 text-gray-400 hover:text-gray-700"><i className="ph-bold ph-arrow-up text-[10px]"></i></button>
                                    <button onClick={() => onMoveNode(childNode.id,  1)} title="下へ" className="w-5 h-5 flex items-center justify-center rounded hover:bg-gray-200 text-gray-400 hover:text-gray-700"><i className="ph-bold ph-arrow-down text-[10px]"></i></button>
                                </span>
                            )}
                        </div>
                    </div>
                );
            };

            const renderAnnotationCard = (annotation) => {
                const isSelected = activeAnnotationId === annotation.id;
                return (
                    <div key={annotation.id} onClick={() => onAnnotationClick(annotation.id)} className={`px-3 py-2 rounded-lg border transition-all cursor-pointer group bg-white ${isSelected ? 'border-amber-400 bg-amber-50 ring-2 ring-amber-100 shadow-sm' : 'border-gray-200 hover:border-amber-300 hover:shadow-sm'}`}>
                        <div className="font-medium text-gray-800 flex items-start gap-2 text-sm">
                            <i className={`ph-fill ph-highlighter mt-0.5 shrink-0 text-sm ${isSelected ? 'text-amber-500' : 'text-amber-300 group-hover:text-amber-400 transition-colors'}`}></i>
                            <div className="flex-1 min-w-0">
                                <InlineTitle text={annotation.title} className="leading-snug block" />
                                {annotation.quote && <span className="text-[11px] text-gray-400 truncate block">「{annotation.quote.substring(0, 40)}{annotation.quote.length > 40 ? '…' : '」'}</span>}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className={`flex flex-col h-full bg-white border-r border-gray-200 shrink-0 w-[90vw] md:w-[50vw] lg:w-[45vw] xl:w-[40vw] relative z-0 shadow-[4px_0_24px_rgba(0,0,0,0.06)] animate-slide-in-right ${isRoot ? 'bg-slate-50' : ''}`}>
                    {breadcrumb.length > 0 && <BreadcrumbTrail path={breadcrumb} />}
                    <div className="p-4 border-b border-gray-100 bg-white flex items-start justify-between shrink-0 shadow-sm z-10">
                        <div className="flex items-start gap-3 overflow-hidden flex-1">
                            <i className={`ph-fill ${isRoot ? 'ph-folders text-indigo-500' : 'ph-question text-blue-500'} text-2xl shrink-0 mt-0.5`}></i>
                            <h2 className={`font-bold text-gray-800 leading-snug ${isRoot ? 'text-xl' : 'text-lg'}`}><InlineTitle text={node.question} /></h2>
                        </div>
                        <div className="flex items-center gap-1 shrink-0 ml-2">
                            {isRoot && onOpenSearch && (
                                <button onClick={onOpenSearch} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-blue-600 hover:bg-blue-100 transition-colors" title="全文検索 (Ctrl+K)"><i className="ph ph-magnifying-glass text-lg"></i></button>
                            )}
                            <button onClick={onAddChild} className="px-2.5 py-1.5 bg-blue-50 border border-blue-200 text-blue-600 rounded-lg text-xs font-bold hover:bg-blue-100 hover:border-blue-300 transition-colors flex items-center gap-1" title="質問を追加">
                                <i className="ph-bold ph-plus text-xs"></i><span className="hidden sm:inline">追加</span>
                            </button>
                            <div className="w-px h-5 bg-gray-200 mx-1"></div>
                            <button onClick={onEdit} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-blue-600 hover:bg-blue-100 transition-colors" title="編集"><i className="ph ph-pencil-simple text-lg"></i></button>
                            {!isRoot && <button onClick={onDelete} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-red-600 hover:bg-red-100 transition-colors" title="削除"><i className="ph ph-trash text-lg"></i></button>}
                            {!isRoot && <div className="w-px h-5 bg-gray-300 mx-1"></div>}
                            {!isRoot && <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-200 transition-colors" title="閉じる"><i className="ph-bold ph-x text-lg"></i></button>}
                        </div>
                    </div>
                    {/* 質問一覧パネル — 常に上部に固定、独立スクロール */}
                    <div className={`border-b border-gray-200 bg-gray-50 shrink-0 flex flex-col ${isRoot && !listCollapsed ? 'flex-1' : ''}`}>
                        <div className="flex items-center shrink-0">
                            <button onClick={() => setListCollapsed(v => !v)} className="flex-1 px-4 py-1.5 flex items-center gap-1 hover:bg-gray-100 transition-colors">
                                <i className={`ph-bold ph-caret-${listCollapsed ? 'right' : 'down'} text-gray-400 text-xs`}></i>
                                <i className={`ph-bold ${isRoot ? 'ph-list-bullets' : 'ph-list-dashes'} text-gray-500 text-xs`}></i>
                                <span className="text-xs text-gray-500 font-bold uppercase tracking-wider">
                                    {isRoot ? `質問一覧 (${node.children.length})` : `注釈・派生する質問 (${node.children.length + (nodeAnnotations?.length || 0)})`}
                                </span>
                            </button>
                            {isRoot && onTreeExpandAll && (
                                <div className="flex items-center gap-0.5 pr-2">
                                    <button onClick={onTreeExpandAll} title="全展開" className="p-1 rounded hover:bg-gray-200 transition-colors text-gray-400 hover:text-gray-600">
                                        <i className="ph-bold ph-arrows-out-simple text-xs"></i>
                                    </button>
                                    <button onClick={onTreeCollapseAll} title="全折りたたみ" className="p-1 rounded hover:bg-gray-200 transition-colors text-gray-400 hover:text-gray-600">
                                        <i className="ph-bold ph-arrows-in-simple text-xs"></i>
                                    </button>
                                </div>
                            )}
                        </div>
                        {!listCollapsed && (
                            <div className={`overflow-y-auto ${isRoot ? 'flex-1' : 'max-h-[14vh]'}`} onScroll={onHideSelectionMenu}>
                                {isRoot ? (
                                    /* ルートはツリーナビゲーター */
                                    <div className="py-1">
                                        {node.children.length === 0 ? (
                                            <div className="text-center py-4 opacity-60 flex flex-col items-center justify-center">
                                                <i className="ph-fill ph-list-plus text-xl text-gray-300 mb-1"></i>
                                                <p className="text-xs text-gray-400">まだ質問がありません</p>
                                            </div>
                                        ) : node.children.map(childNode => (
                                            <TreeNodeItem key={childNode.id} node={childNode} level={0}
                                                nodes={allNodes || {}} annotations={allAnnotations || []}
                                                expandedIds={treeExpandedIds || new Set()}
                                                onToggle={onTreeToggle || (() => {})}
                                                onExpand={onTreeExpand || (() => {})}
                                                onSelectNode={onTreeSelectNode || (() => {})}
                                                onSelectAnnotation={onTreeSelectAnnotation || (() => {})}
                                                activeNodeIds={treeActiveNodeIds || new Set()}
                                                activeAnnotationId={treeActiveAnnotationId}
                                                onMoveNode={onMoveNode || null} />
                                        ))}
                                    </div>
                                ) : (
                                    /* 非ルートはフラットリスト */
                                    <div className="p-3 space-y-1.5">
                                        {node.children.length === 0 && !(nodeAnnotations && nodeAnnotations.length > 0) ? (
                                            <div className="text-center py-4 opacity-60 bg-white rounded-lg border border-dashed border-gray-300 flex flex-col items-center justify-center min-h-[56px]">
                                                <i className="ph-fill ph-tree-structure text-xl text-gray-300 mb-1"></i>
                                                <p className="text-xs text-gray-400">まだ派生する質問はありません</p>
                                            </div>
                                        ) : (
                                            <>
                                                {node.children.length > 0 && <div className="space-y-1.5">{node.children.map(childNode => renderChildNode(childNode))}</div>}
                                                {nodeAnnotations && nodeAnnotations.length > 0 && (
                                                    <div className="space-y-1.5">
                                                        {node.children.length > 0 && <div className="border-t border-gray-200 mt-2 pt-2"></div>}
                                                        {nodeAnnotations.map(a => renderAnnotationCard(a))}
                                                    </div>
                                                )}
                                            </>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                    {/* 回答・解説パネル — 残りを占める、独立スクロール */}
                    {!isRoot && (
                        <div className="flex-1 overflow-y-auto bg-slate-100" onScroll={onHideSelectionMenu}>
                            {node.sections && node.sections.some(s => s.content) ? (
                                <div className="py-4 flex flex-col gap-3">
                                    {/* 目次（タイトル付きセクションが存在する場合） */}
                                    {node.sections.length > 1 && node.sections.some(s => s.title) && (
                                        <div className="mx-4 bg-white rounded-xl border border-gray-200 shadow-sm px-5 py-3">
                                            <div className="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-2">目次</div>
                                            {node.sections.map((s, i) => (
                                                <button key={s.id} onClick={() => scrollToId(`section-${s.id}`)}
                                                    className="flex items-center gap-2 w-full text-left py-0.5 group">
                                                    <span className="text-[10px] text-gray-300 group-hover:text-blue-300 shrink-0">{i+1}.</span>
                                                    <span className="text-xs text-blue-500 group-hover:text-blue-700 group-hover:underline">
                                                        {s.title ? <InlineTitle text={s.title} /> : <span className="text-gray-400 italic">（タイトルなし）</span>}
                                                    </span>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                    {/* セクションカード */}
                                    {node.sections.map((section, i) => {
                                        const isSectionCollapsed = collapsedSections.has(section.id);
                                        return (
                                        <div key={section.id} id={`section-${section.id}`} className="mx-4 bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                                            {section.title ? (
                                                <div className="bg-blue-50 px-6 py-3 border-b-2 border-blue-100 flex items-center justify-between">
                                                    <h3 className="text-xl font-bold text-blue-900 leading-snug flex-1"><InlineTitle text={section.title} /></h3>
                                                    <div className="flex items-center gap-1 shrink-0 ml-2">
                                                        <button onClick={() => onEdit(section.id)} title="この段落を編集" className="w-6 h-6 flex items-center justify-center rounded text-blue-300 hover:text-blue-600 hover:bg-blue-100 transition-colors"><i className="ph ph-pencil-simple text-xs"></i></button>
                                                        <button onClick={() => onAddChild(section.id)} title="このセクションから子ノードを追加" className="w-6 h-6 flex items-center justify-center rounded text-blue-300 hover:text-blue-600 hover:bg-blue-100 transition-colors"><i className="ph-bold ph-plus text-xs"></i></button>
                                                        <button onClick={() => toggleSection(section.id)} title={isSectionCollapsed ? '展開' : '折りたたむ'} className="w-6 h-6 flex items-center justify-center rounded text-blue-300 hover:text-blue-600 hover:bg-blue-100 transition-colors"><i className={`ph-bold ph-caret-${isSectionCollapsed ? 'down' : 'up'} text-xs`}></i></button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="px-6 pt-4 pb-0 flex items-center justify-between">
                                                    <div>
                                                        {node.sections.length > 1 && <div className="text-[10px] font-bold text-gray-300 uppercase tracking-widest">段落 {i+1}</div>}

        // --- Q&A編集ペイン ---
        const EditPane = ({ mode, isTopLevel, initialQuestion, initialSections, breadcrumb, onSave, onCancel, scrollToSectionId }) => {
            const isAdd = mode === 'add';
            const [question, setQuestion] = useState(initialQuestion || '');
            const [sections, setSections] = useState(() =>
                (initialSections && initialSections.length > 0)
                    ? initialSections
                    : [{ id: generateId(), title: '', content: '' }]
            );
            const scrollContainerRef = useRef(null);
            const addSection = (afterIndex) => setSections(prev => {
                const next = [...prev];
                next.splice(afterIndex + 1, 0, { id: generateId(), title: '', content: '' });
                return next;
            });
            const removeSection = (index) => setSections(prev => prev.length <= 1 ? prev : prev.filter((_, i) => i !== index));
            const moveSection = (index, dir) => setSections(prev => {
                const t = index + dir;
                if (t < 0 || t >= prev.length) return prev;
                const next = [...prev]; [next[index], next[t]] = [next[t], next[index]]; return next;
            });
            const updateSection = (index, field, value) =>
                setSections(prev => prev.map((s, i) => i === index ? { ...s, [field]: value } : s));
            useEffect(() => {
                if (!scrollToSectionId || !scrollContainerRef.current) return;
                requestAnimationFrame(() => {
                    const container = scrollContainerRef.current;
                    const el = document.getElementById(`edit-section-${scrollToSectionId}`);
                    if (!el || !container) return;
                    const containerRect = container.getBoundingClientRect();
                    const elRect = el.getBoundingClientRect();
                    container.scrollTop += elRect.top - containerRect.top - 16;
                });
            }, []);
            return (
                <div className="flex flex-col h-full bg-slate-50 border-r border-gray-200 shrink-0 w-[90vw] md:w-[50vw] lg:w-[45vw] xl:w-[40vw] relative z-0 shadow-[4px_0_24px_rgba(0,0,0,0.06)] animate-slide-in-right">
                    {breadcrumb.length > 0 && <BreadcrumbTrail path={breadcrumb} />}
                    <div className="p-4 border-b border-gray-200 bg-white flex items-center justify-between shrink-0 shadow-sm z-10">
                        <div className="flex items-center gap-2">

                        </div>
                        <button onClick={onCancel} className="text-gray-400 hover:text-gray-600 transition-colors"><i className="ph-bold ph-x text-lg"></i></button>

                    <div ref={scrollContainerRef} className="flex-1 overflow-y-auto p-6 flex flex-col gap-6">

                                        <input
                                            type="text"

                    <div className="p-4 border-t border-gray-200 bg-white flex justify-end gap-3 shrink-0">

                </div>

        // --- テキスト注釈ビューペイン ---
        const AnnotationViewPane = ({ annotation, breadcrumb, childNodes, subAnnotations, activeAnnotationId, selectedChildId, onEdit, onDelete, onClose, onAddChild, onAddSection, onOpenChild, onAnnotateText, onAnnotationClick, onMarkHover, onHideSelectionMenu }) => {
            if (!annotation) return null;

            const [quoteCollapsed, setQuoteCollapsed] = useState(true);
            const [listCollapsed, setListCollapsed] = useState(true);
            const [collapsedSections, setCollapsedSections] = useState(new Set());
            const toggleSection = (sectionId) => setCollapsedSections(prev => { const next = new Set(prev); next.has(sectionId) ? next.delete(sectionId) : next.add(sectionId); return next; });

            const handleMouseUp = () => {
                setTimeout(() => {
                    const sel = window.getSelection();
                    const text = sel?.toString().trim();
                    if (text && text.length >= 2 && sel.rangeCount > 0) {
                        const range = sel.getRangeAt(0);
                        const rect = range.getBoundingClientRect();
                        const quote = getQuoteFromSelection(range);
                        onAnnotateText(annotation.id, quote || text, rect);

            };

            const renderChildNode = (childNode) => {

                return (
                    <div key={childNode.id} onClick={() => onOpenChild(childNode.id)} className={`px-3 py-2 rounded-lg border transition-all cursor-pointer group bg-white ${isChildSelected ? 'border-blue-500 bg-blue-50 ring-2 ring-blue-100 shadow-sm' : 'border-gray-200 hover:border-blue-300 hover:shadow-sm'}`}>

            const renderSubAnnotationCard = (anno) => {
                const isSelected = activeAnnotationId === anno.id;
                return (
                    <div key={anno.id} onClick={() => onAnnotationClick(anno.id)} className={`px-3 py-2 rounded-lg border transition-all cursor-pointer group bg-white ${isSelected ? 'border-amber-400 bg-amber-50 ring-2 ring-amber-100 shadow-sm' : 'border-gray-200 hover:border-amber-300 hover:shadow-sm'}`}>
                        <div className="font-medium text-gray-800 flex items-start gap-2 text-sm">
                            <i className={`ph-fill ph-highlighter mt-0.5 shrink-0 text-sm ${isSelected ? 'text-amber-500' : 'text-amber-300 group-hover:text-amber-400 transition-colors'}`}></i>
                            <div className="flex-1 min-w-0">
                                <InlineTitle text={anno.title} className="leading-snug block" />
                                {anno.quote && <span className="text-[11px] text-gray-400 truncate block">「{anno.quote.substring(0, 40)}{anno.quote.length > 40 ? '…' : '」'}</span>}
                            </div>
                        </div>
                    </div>
                );
            };

            const totalCount = (childNodes?.length || 0) + (subAnnotations?.length || 0);

            return (
                <div className="flex flex-col h-full bg-white border-r border-gray-200 shrink-0 w-[90vw] md:w-[50vw] lg:w-[45vw] xl:w-[40vw] relative z-0 shadow-[4px_0_24px_rgba(0,0,0,0.06)] animate-slide-in-right">
                    {breadcrumb.length > 0 && <BreadcrumbTrail path={breadcrumb} />}
                    <div className="p-4 border-b border-gray-100 bg-white flex items-start justify-between shrink-0 shadow-sm z-10">
                        <div className="flex items-start gap-3 overflow-hidden flex-1">
                            <i className="ph-fill ph-highlighter text-amber-500 text-2xl shrink-0 mt-0.5"></i>
                            <h2 className="font-bold text-gray-800 leading-snug text-lg"><InlineTitle text={annotation.title} /></h2>
                        </div>
                        <div className="flex items-center gap-1 shrink-0 ml-2">
                            <button onClick={onAddChild} className="px-2.5 py-1.5 bg-blue-50 border border-blue-200 text-blue-600 rounded-lg text-xs font-bold hover:bg-blue-100 hover:border-blue-300 transition-colors flex items-center gap-1" title="質問を追加">
                                <i className="ph-bold ph-plus text-xs"></i><span className="hidden sm:inline">追加</span>
                            </button>
                            <div className="w-px h-5 bg-gray-200 mx-1"></div>
                            <button onClick={onEdit} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-blue-600 hover:bg-blue-100 transition-colors" title="編集"><i className="ph ph-pencil-simple text-lg"></i></button>
                            <button onClick={onDelete} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-red-600 hover:bg-red-100 transition-colors" title="削除"><i className="ph ph-trash text-lg"></i></button>
                            <div className="w-px h-5 bg-gray-300 mx-1"></div>
                            <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-200 transition-colors" title="閉じる"><i className="ph-bold ph-x text-lg"></i></button>
                        </div>
                    </div>
                    {/* 対象テキストパネル */}
                    <div className="border-b border-gray-200 bg-amber-50 shrink-0">
                        <button onClick={() => setQuoteCollapsed(v => !v)} className="w-full px-4 py-1.5 flex items-center gap-1 hover:bg-amber-100 transition-colors">
                            <i className={`ph-bold ph-caret-${quoteCollapsed ? 'right' : 'down'} text-amber-500 text-xs`}></i>
                            <i className="ph-bold ph-quotes text-amber-600 text-xs"></i>
                            <span className="text-xs text-amber-600 font-bold uppercase tracking-wider">対象テキスト</span>
                            {quoteCollapsed && <span className="ml-2 text-[11px] text-amber-500 italic truncate max-w-[180px]">{annotation.quote?.substring(0, 40)}{(annotation.quote?.length||0) > 40 ? '…' : ''}</span>}
                        </button>
                        {!quoteCollapsed && (
                            <div className="px-4 pb-2">
                                <p className="text-xs text-gray-600 italic leading-relaxed bg-white px-3 py-2 rounded border-l-2 border-amber-400 line-clamp-3">{annotation.quote}</p>
                            </div>
                        )}
                    </div>
                    {/* 注釈・派生する質問パネル */}
                    <div className="border-b border-gray-200 bg-gray-50 shrink-0 flex flex-col">
                        <button onClick={() => setListCollapsed(v => !v)} className="w-full px-4 py-1.5 flex items-center gap-1 hover:bg-gray-100 transition-colors shrink-0">
                            <i className={`ph-bold ph-caret-${listCollapsed ? 'right' : 'down'} text-gray-400 text-xs`}></i>
                            <i className="ph-bold ph-list-dashes text-gray-500 text-xs"></i>
                            <span className="text-xs text-gray-500 font-bold uppercase tracking-wider">注釈・派生する質問 ({totalCount})</span>
                        </button>
                        {!listCollapsed && (
                            <div className="overflow-y-auto max-h-[8vh]" onScroll={onHideSelectionMenu}>
                                <div className="px-3 pb-2 space-y-1">
                                    {totalCount === 0 ? (
                                        <div className="text-center py-2 opacity-60 bg-white rounded border border-dashed border-gray-300 flex items-center justify-center gap-1.5 min-h-[36px]">
                                            <i className="ph-fill ph-tree-structure text-sm text-gray-300"></i>
                                            <p className="text-xs text-gray-400">まだ派生する質問はありません</p>
                                        </div>
                                    ) : (
                                        <>
                                            {childNodes?.map(childNode => renderChildNode(childNode))}
                                            {childNodes?.length > 0 && subAnnotations?.length > 0 && <div className="border-t border-gray-200 mt-1 pt-1"></div>}
                                            {subAnnotations?.map(a => renderSubAnnotationCard(a))}
                                        </>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                    {/* 解説パネル（段落カード） */}
                    {(() => {
                        const sections = annotation.sections || [{ id: annotation.id + '_s', title: '', content: annotation.content || '' }];
                        return (
                            <div className="flex-1 overflow-y-auto bg-slate-100" onScroll={onHideSelectionMenu}>
                                <div className="py-4 flex flex-col gap-3">
                                    {sections.length > 1 && sections.some(s => s.title) && (
                                        <div className="mx-4 bg-white rounded-xl border border-gray-200 shadow-sm px-5 py-3">
                                            <div className="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-2">目次</div>
                                            {sections.map((s, i) => (
                                                <button key={s.id} onClick={() => scrollToId(`anno-section-${s.id}`)}
                                                    className="flex items-center gap-2 w-full text-left py-0.5 group">
                                                    <span className="text-[10px] text-gray-300 group-hover:text-amber-300 shrink-0">{i+1}.</span>
                                                    <span className="text-xs text-amber-500 group-hover:text-amber-700 group-hover:underline">
                                                        {s.title ? <InlineTitle text={s.title} /> : <span className="text-gray-400 italic">（タイトルなし）</span>}
                                                    </span>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                    {sections.map((section, i) => {
                                        const isSectionCollapsed = collapsedSections.has(section.id);
                                        return (
                                        <div key={section.id} id={`anno-section-${section.id}`} className="mx-4 bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                                            {section.title ? (
                                                <div className="bg-amber-50 px-6 py-3 border-b-2 border-amber-100 flex items-center justify-between">
                                                    <h3 className="text-lg font-bold text-amber-900 leading-snug flex-1"><InlineTitle text={section.title} /></h3>
                                                    <button onClick={() => toggleSection(section.id)} title={isSectionCollapsed ? '展開' : '折りたたむ'} className="w-6 h-6 flex items-center justify-center rounded text-amber-300 hover:text-amber-600 hover:bg-amber-100 transition-colors shrink-0 ml-2"><i className={`ph-bold ph-caret-${isSectionCollapsed ? 'down' : 'up'} text-xs`}></i></button>
                                                </div>
                                            ) : (
                                                <div className="px-6 pt-4 pb-0 flex items-center justify-between">
                                                    <div>
                                                        {sections.length > 1 && <div className="text-[10px] font-bold text-gray-300 uppercase tracking-widest mb-1">段落 {i+1}</div>}
                                                        {i === 0 && (
                                                            <div className="flex items-center gap-2">
                                                                <div className="text-xs text-green-600 font-bold flex items-center gap-1 uppercase tracking-wider"><i className="ph-fill ph-check-circle text-sm"></i> 解説</div>
                                                                <span className="text-[10px] text-gray-400 bg-gray-100 px-2 py-0.5 rounded">テキストを選択→注釈を追加</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <button onClick={() => toggleSection(section.id)} title={isSectionCollapsed ? '展開' : '折りたたむ'} className="w-6 h-6 flex items-center justify-center rounded text-gray-300 hover:text-amber-500 hover:bg-amber-50 transition-colors shrink-0"><i className={`ph-bold ph-caret-${isSectionCollapsed ? 'down' : 'up'} text-xs`}></i></button>

                                                        className="text-xs text-gray-400 hover:text-amber-500 flex items-center gap-1 transition-colors">

                                                    </button>
                                                </div>
                                            )}
                                            {!isSectionCollapsed && (
                                                <div className="px-6 py-4" onMouseUp={handleMouseUp}>
                                                    <div className="selection:bg-blue-200">
                                                        <MarkdownViewer content={section.content} annotations={subAnnotations || []} onMarkClick={onAnnotationClick} onMarkHover={onMarkHover} activeAnnotationId={activeAnnotationId} />

                                    <div className="mx-4 pb-2">

        // --- テキスト注釈フォームペイン ---
        const AnnotationFormPane = ({ mode, quote, initialData, onSave, onCancel }) => {
            const isAdd = mode === 'add';
            const [title, setTitle] = useState(initialData?.title || '');
            const [sections, setSections] = useState(() =>
                (initialData?.sections && initialData.sections.length > 0)
