            return (
                <div className="flex flex-col h-full bg-slate-50 border-r border-gray-200 shrink-0 w-[90vw] md:w-[50vw] lg:w-[45vw] xl:w-[40vw] relative z-0 shadow-[4px_0_24px_rgba(0,0,0,0.06)] animate-slide-in-right">
                    <div className="p-4 border-b border-gray-200 bg-white flex items-center justify-between shrink-0 shadow-sm z-10">
                        <div className="flex items-center gap-2">
                            <i className={`ph-fill ${isAdd ? 'ph-highlighter text-amber-500' : 'ph-pencil-simple text-orange-500'} text-xl`}></i>
                            <h3 className="font-bold text-gray-700">{isAdd ? '新規テキスト注釈を追加' : 'テキスト注釈を編集'}</h3>
                        </div>
                        <button onClick={onCancel} className="text-gray-400 hover:text-gray-600 transition-colors"><i className="ph-bold ph-x text-lg"></i></button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 flex flex-col gap-5">
                        <div className="bg-white border border-yellow-200 p-4 rounded-xl shadow-sm">
                            <p className="text-xs text-yellow-700 font-bold mb-2 uppercase tracking-wider"><i className="ph-bold ph-quotes mr-1"></i>選択したテキスト</p>
                            <p className="text-sm text-gray-700 italic leading-relaxed bg-yellow-50 p-3 rounded border-l-2 border-yellow-400 line-clamp-4">{quote}</p>
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-gray-600 mb-2">タイトル <span className="text-red-500">*</span></label>
                            <input type="text" value={title} onChange={e => setTitle(e.target.value)} className="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition-all bg-white shadow-sm text-gray-800" placeholder="例：この概念の具体例" autoFocus />
                        </div>
                        <div className="flex flex-col gap-3">
                            <label className="block text-sm font-bold text-gray-600 flex justify-between items-center">
                                <span>注釈本文 <span className="text-red-500">*</span></span>
                                <span className="text-xs text-gray-400 font-normal px-2 py-0.5 bg-gray-200 rounded">Markdown & LaTeX対応</span>
                            </label>
                            {sections.map((section, i) => (
                                <div key={section.id} className="bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
                                    <div className="flex items-center gap-1 px-3 py-1.5 bg-amber-50 border-b border-amber-100">
                                        <input type="text" value={section.title} onChange={e => updateSection(i, 'title', e.target.value)}
                                            className="flex-1 text-xs font-bold text-amber-700 bg-transparent border-none outline-none placeholder-amber-300"
                                            placeholder="段落タイトル（任意）" />
                                        <button onClick={() => moveSection(i, -1)} disabled={i === 0} className="p-1 rounded hover:bg-amber-100 disabled:opacity-30 transition-colors text-amber-400" title="上へ"><i className="ph-bold ph-arrow-up text-xs"></i></button>
                                        <button onClick={() => moveSection(i, 1)} disabled={i === sections.length - 1} className="p-1 rounded hover:bg-amber-100 disabled:opacity-30 transition-colors text-amber-400" title="下へ"><i className="ph-bold ph-arrow-down text-xs"></i></button>
                                        <button onClick={() => addSection(i)} className="p-1 rounded hover:bg-amber-100 text-amber-300 hover:text-amber-500 transition-colors" title="ここに追加"><i className="ph-bold ph-plus text-xs"></i></button>
                                        {sections.length > 1 && (
                                            <button onClick={() => removeSection(i)} className="p-1 rounded hover:bg-red-100 text-gray-300 hover:text-red-500 transition-colors" title="削除"><i className="ph-bold ph-trash text-xs"></i></button>
                                        )}
                                    </div>
                                    <textarea value={section.content} onChange={e => updateSection(i, 'content', e.target.value)}
                                        className="w-full border-none p-4 focus:ring-2 focus:ring-inset focus:ring-amber-400 outline-none resize-none font-mono text-sm bg-white text-gray-700 leading-relaxed min-h-[120px]"
                                        placeholder="注釈をマークダウン形式で記述します..." rows={5} />
                                </div>
                            ))}
                            <button onClick={() => addSection(sections.length - 1)} className="flex items-center justify-center gap-2 w-full py-2 border border-dashed border-amber-200 rounded-lg text-xs font-bold text-amber-400 hover:text-amber-600 hover:border-amber-400 hover:bg-amber-50 transition-colors">
                                <i className="ph-bold ph-plus text-xs"></i> 段落を追加
                            </button>
                        </div>
                    </div>
                    <div className="p-4 border-t border-gray-200 bg-white flex justify-end gap-3 shrink-0">
                        <button onClick={onCancel} className="px-6 py-2.5 rounded-lg font-bold text-gray-600 hover:bg-gray-100 transition-colors">キャンセル</button>
                        <button onClick={() => onSave(title, sections)} disabled={!title.trim() || !hasContent} className="px-6 py-2.5 rounded-lg font-bold text-white bg-amber-500 hover:bg-amber-600 disabled:opacity-50 transition-colors flex items-center gap-2 shadow-sm">
                            <i className="ph-bold ph-check"></i> 保存
                        </button>
                    </div>
                </div>
            );
        };


        // --- メインアプリ ---
        const App = () => {
            const [appMode, setAppMode] = useState('home');
            const [projectList, setProjectList] = useState([]);
            const [currentProjectId, setCurrentProjectId] = useState(null);
            const [currentProjectName, setCurrentProjectName] = useState('');
            const [nodes, setNodes] = useState({});
            const [annotations, setAnnotations] = useState([]); // テキスト選択注釈
            const [panes, setPanes] = useState([]);
            const [treeExpandedIds, setTreeExpandedIds] = useState(() => new Set());
            const [selectionMenu, setSelectionMenu] = useState({ show: false, top: 0, left: 0, text: '', nodeId: null, paneIndex: 0 });
            const [tooltip, setTooltip] = useState({ show: false, text: '', top: 0, left: 0 });
            const [searchOpen, setSearchOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const searchInputRef = useRef(null);
            const scrollContainerRef = useRef(null);
            const backupHandleRef = useRef(null);
            const backupTimerRef = useRef(null);
            const backupInProgressRef = useRef(false);
            const [backupConfig, setBackupConfig] = useState({
                supported: BackupFile.isSupported(),
                enabled: false,
                fileName: '',
                lastSavedAt: null,
                lastError: ''
            });

            // 初期化
            useEffect(() => {
                setProjectList(Storage.getProjectList());
                const saved = Storage.getBackupConfig();
                setBackupConfig(prev => ({ ...prev, ...saved, supported: BackupFile.isSupported() }));
                (async () => {
                    if (!BackupFile.isSupported()) return;
                    try {
                        const handle = await BackupFile.getHandle();
                        if (!handle) return;
                        const granted = await BackupFile.requestWritePermission(handle, false);
                        backupHandleRef.current = handle;
                        setBackupConfig(prev => ({
                            ...prev,
                            fileName: handle.name || prev.fileName || '',
                            enabled: Boolean((saved?.enabled) && granted),
                            lastError: granted ? '' : 'バックアップファイルの再接続が必要です'
                        }));
                    } catch (e) {
                        setBackupConfig(prev => ({ ...prev, enabled: false, lastError: 'バックアップ初期化に失敗しました' }));
                    }
                })();
            }, []);

            // 自動保存
            useEffect(() => {
                if (!currentProjectId || !nodes['root']) return;
                Storage.saveProjectData(currentProjectId, { nodes, annotations });
                setProjectList(prev => {
                    const updated = prev.map(p => p.id === currentProjectId ? {
                        ...p, name: currentProjectName, updatedAt: Date.now(),
                        nodeCount: Object.keys(nodes).length,
                        annotationCount: annotations.length,
                        preview: (nodes['root'].sections?.[0]?.content || '').substring(0, 100)
                    } : p);
                    Storage.saveProjectList(updated);
                    return updated;
                });
            }, [nodes, annotations, currentProjectName, currentProjectId]);

            // カラムが増えたら右端へスクロール
            useEffect(() => {
                if (scrollContainerRef.current) {
                    scrollContainerRef.current.scrollTo({ left: scrollContainerRef.current.scrollWidth, behavior: 'smooth' });
                }
            }, [panes.length]);

            // --- プロジェクト管理 ---
            const openProject = (id) => {
                const data = Storage.getProjectData(id);
                const meta = projectList.find(p => p.id === id);
                if (data && meta && data.nodes && data.nodes['root']) {
                    setCurrentProjectId(id); setCurrentProjectName(meta.name);
                    setNodes(migrateNodes(data.nodes)); setAnnotations(migrateAnnotations(data.annotations || []));
                    setTreeExpandedIds(new Set(Object.keys(data.nodes).filter(k => k !== 'root')));
                    setAppMode('workspace'); setPanes([{ type: 'view', nodeId: 'root' }]);
                }
            };
            const createNewProject = () => { setCurrentProjectId(null); setCurrentProjectName(''); setNodes({}); setAnnotations([]); setAppMode('setup'); };
            const deleteProject = (id) => {
                Storage.deleteProjectData(id);
                setProjectList(prev => { const u = prev.filter(p => p.id !== id); Storage.saveProjectList(u); return u; });
            };
            const goHome = () => { setAppMode('home'); setCurrentProjectId(null); setCurrentProjectName(''); setNodes({}); setAnnotations([]); setPanes([]); setTreeExpandedIds(new Set()); setSelectionMenu({ show: false }); setTooltip({ show: false }); };

            // --- 全文検索 ---
            const openSearch = () => { setSearchQuery(''); setSearchResults([]); setSearchOpen(true); setTimeout(() => searchInputRef.current?.focus(), 50); };
            const closeSearch = () => { setSearchOpen(false); setSearchQuery(''); setSearchResults([]); };

            const getSnippet = (text, query, maxLen = 60) => {
                if (!text || !query) return '';
                const idx = text.toLowerCase().indexOf(query.toLowerCase());
                if (idx === -1) return text.substring(0, maxLen) + (text.length > maxLen ? '…' : '');
                const start = Math.max(0, idx - 20);
                const end = Math.min(text.length, idx + query.length + 40);
                return (start > 0 ? '…' : '') + text.substring(start, end) + (end < text.length ? '…' : '');
            };

            const doSearch = (q) => {
                setSearchQuery(q);
                if (!q.trim() || !nodes['root']) { setSearchResults([]); return; }
                const ql = q.toLowerCase();
                const results = [];
                // Search nodes
                Object.values(nodes).filter(n => n.id !== 'root').forEach(n => {
                    if (n.question.toLowerCase().includes(ql)) {
                        results.push({ type: 'node', id: n.id, title: n.question, snippet: getSnippet(n.question, q), matchIn: 'question' });
                    }
                    if (n.sections) {
                        n.sections.forEach(s => {
                            if (s.title && s.title.toLowerCase().includes(ql)) {
                                results.push({ type: 'node', id: n.id, title: n.question, snippet: getSnippet(s.title, q), matchIn: 'sectionTitle' });
                            }
                            if (s.content && s.content.toLowerCase().includes(ql)) {
                                results.push({ type: 'node', id: n.id, title: n.question, snippet: getSnippet(s.content, q), matchIn: 'sectionContent' });
                            }
                        });
                    }
                });
                // Search annotations
                annotations.forEach(a => {
                    if (a.title && a.title.toLowerCase().includes(ql)) {
                        results.push({ type: 'annotation', id: a.id, nodeId: a.nodeId, title: a.title, snippet: getSnippet(a.title, q), matchIn: 'annotationTitle' });
                    }
                    if (a.sections) {
                        a.sections.forEach(s => {
                            if (s.title && s.title.toLowerCase().includes(ql)) {
                                results.push({ type: 'annotation', id: a.id, nodeId: a.nodeId, title: a.title, snippet: getSnippet(s.title, q), matchIn: 'annotationSectionTitle' });
                            }
                            if (s.content && s.content.toLowerCase().includes(ql)) {
                                results.push({ type: 'annotation', id: a.id, nodeId: a.nodeId, title: a.title, snippet: getSnippet(s.content, q), matchIn: 'annotationContent' });
                            }
                        });
                    }
                });
                // Deduplicate by id (prefer earlier match)
                const seen = new Set();
                const deduped = results.filter(r => { const k = r.type + r.id; if (seen.has(k)) return false; seen.add(k); return true; });
                setSearchResults(deduped);
            };

            // Keyboard shortcut Ctrl+K / Cmd+K
            useEffect(() => {
                const handler = (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                        e.preventDefault();
                        if (appMode === 'workspace') { searchOpen ? closeSearch() : openSearch(); }
                    }
                    if (e.key === 'Escape' && searchOpen) closeSearch();
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, [appMode, searchOpen]);

            const handleSearchNavigate = (result) => {
                closeSearch();
                if (result.type === 'node') {
                    handleTreeSelectNode(result.id);
                } else if (result.type === 'annotation') {
                    const anno = annotations.find(a => a.id === result.id);
                    if (anno) {
                        if (anno.nodeId) handleTreeSelectAnnotation(anno.nodeId, anno.id);
                        else if (anno.parentAnnotationId) {
                            // Navigate to parent annotation chain
                            const parentAnno = annotations.find(a => a.id === anno.parentAnnotationId);
                            if (parentAnno && parentAnno.nodeId) {
                                handleTreeSelectAnnotation(parentAnno.nodeId, anno.id);
                            }
                        }
                    }
                }
            };

            const highlightMatch = (text, query) => {
                if (!query) return text;
                const idx = text.toLowerCase().indexOf(query.toLowerCase());
                if (idx === -1) return text;
                return (
                    <span>
                        {text.substring(0, idx)}
                        <mark className="search-highlight">{text.substring(idx, idx + query.length)}</mark>
                        {text.substring(idx + query.length)}
                    </span>
                );
            };

            // --- ノード操作 ---
            const handleSetupSave = (name) => {
                let id = currentProjectId;
                const now = Date.now();
                let newNodes = { ...nodes };
                if (!id) {
                    id = generateId();
                    const newProject = { id, name, createdAt: now, updatedAt: now, nodeCount: 1, annotationCount: 0, preview: '質問一覧から展開して確認してください。' };
                    setProjectList(prev => { const u = [newProject, ...prev]; Storage.saveProjectList(u); return u; });
                    newNodes = { root: { id: 'root', parentId: null, question: name, sections: [{ id: generateId(), title: '', content: '' }], children: [] } };
                } else {
                    newNodes['root'] = { ...newNodes['root'], question: name };
                }
                setCurrentProjectId(id); setCurrentProjectName(name); setNodes(newNodes);
                Storage.saveProjectData(id, { nodes: newNodes, annotations });
                setAppMode('workspace');
                if (panes.length === 0) setPanes([{ type: 'view', nodeId: 'root' }]);
            };

            const deleteNodeRecursive = (nodeId, nodesObj) => {
                const node = nodesObj[nodeId]; if (!node) return;
                node.children.forEach(childId => deleteNodeRecursive(childId, nodesObj));
                delete nodesObj[nodeId];
            };

            const handleSaveNode = (paneIndex, type, idOrParentId, parentAnnotationId, question, sections) => {
                if (type === 'add') {
                    const newNodeId = generateId();
                    const parentId = idOrParentId;
                    setNodes(prev => {
                        const next = { ...prev };
                        next[newNodeId] = { id: newNodeId, parentId: parentId || null, parentAnnotationId: parentAnnotationId || null, question, sections, children: [] };
                        if (parentId && next[parentId]) next[parentId] = { ...next[parentId], children: [...next[parentId].children, newNodeId] };
                        return next;
                    });
                    if (parentAnnotationId) {
                        setAnnotations(prev => prev.map(a => a.id === parentAnnotationId ? { ...a, childNodeIds: [...(a.childNodeIds || []), newNodeId] } : a));
                    }
                    setPanes(prev => { const next = [...prev]; next[paneIndex] = { type: 'view', nodeId: newNodeId }; return next; });
                } else {
                    const nodeId = idOrParentId;
                    if (nodeId === 'root') setCurrentProjectName(question);
                    setNodes(prev => ({ ...prev, [nodeId]: { ...prev[nodeId], question, sections } }));
                    setPanes(prev => { const next = [...prev]; next[paneIndex] = { type: 'view', nodeId }; return next; });
                }
            };

            const handleDeleteNode = (paneIndex, nodeId, parentId, parentAnnotationId) => {
                if (nodeId === 'root') return;
                if (!confirm('この質問と、そこから派生するすべての回答・質問を削除します。よろしいですか？')) return;
                // 関連するテキスト注釈も削除
                const nodeIds = new Set([nodeId]);
                const collectIds = (nid) => {
                    const n = nodes[nid]; if (!n) return;
                    n.children.forEach(cid => { nodeIds.add(cid); collectIds(cid); });
                };
                collectIds(nodeId);
                setAnnotations(prev => prev.filter(a => !nodeIds.has(a.nodeId)));
                if (parentAnnotationId) {
                    setAnnotations(prev => prev.map(a => a.id === parentAnnotationId ? { ...a, childNodeIds: (a.childNodeIds || []).filter(id => id !== nodeId) } : a));
                }
                setNodes(prev => {
                    const next = { ...prev };
                    if (parentId && next[parentId]) next[parentId] = { ...next[parentId], children: next[parentId].children.filter(id => id !== nodeId) };
                    deleteNodeRecursive(nodeId, next);
                    return next;
                });
                setPanes(prev => prev.slice(0, paneIndex));
            };

            // --- テキスト注釈操作 ---
            // nodeId: 注釈元がノードの回答の場合, parentAnnotationId: 注釈元が注釈の解説の場合
            const handleAnnotateText = (nodeId, parentAnnotationId, quote, rect, sectionId) => {
                const top = Math.max(10, rect.top - 50);
                const left = rect.left + rect.width / 2;
                const paneIndex = nodeId
                    ? panes.findIndex(p => p.type === 'view' && p.nodeId === nodeId)
                    : panes.findIndex(p => p.type === 'annotation' && p.annotationId === parentAnnotationId);
                setSelectionMenu({ show: true, top, left, text: quote, nodeId, parentAnnotationId, paneIndex, sectionId: sectionId || null });
            };

            const hideSelectionMenu = () => { setSelectionMenu({ show: false }); };

            const startAnnotationAdd = (paneIndex, nodeId, parentAnnotationId, quote, sectionId) => {
                setPanes(prev => {
                    const next = prev.slice(0, paneIndex + 1);
                    next.push({ type: 'annotation-add', nodeId, parentAnnotationId, quote, sectionId: sectionId || null });
                    return next;
                });
                setSelectionMenu({ show: false });
                window.getSelection()?.removeAllRanges();
            };

            const saveAnnotation = (paneIndex, nodeId, parentAnnotationId, quote, title, sections, sectionId) => {
                const na = { id: generateId(), nodeId: nodeId || null, parentAnnotationId: parentAnnotationId || null, quote, title, sections, sectionId: sectionId || null, timestamp: Date.now(), childNodeIds: [] };
                setAnnotations(prev => [...prev, na]);
                setPanes(prev => { const next = [...prev]; next[paneIndex] = { type: 'annotation', annotationId: na.id }; return next; });
                window.getSelection()?.removeAllRanges();
            };

            const updateAnnotation = (paneIndex, annotationId, title, sections) => {
                setAnnotations(prev => prev.map(a => a.id === annotationId ? { ...a, title, sections, timestamp: Date.now() } : a));
                setPanes(prev => { const next = [...prev]; next[paneIndex] = { type: 'annotation', annotationId }; return next; });
            };

            const handleDeleteAnnotation = (paneIndex, annotationId) => {
                if (!confirm('この注釈を削除しますか？')) return;
                // 子ノードを再帰削除
                const anno = annotations.find(a => a.id === annotationId);
                if (anno?.childNodeIds?.length > 0) {
                    const nodeIdsToDelete = new Set();
                    const collectNodeIds = (nid) => { nodeIdsToDelete.add(nid); const n = nodes[nid]; if (n) n.children.forEach(cid => collectNodeIds(cid)); };
                    anno.childNodeIds.forEach(nid => collectNodeIds(nid));
                    setNodes(prev => { const next = { ...prev }; nodeIdsToDelete.forEach(nid => deleteNodeRecursive(nid, next)); return next; });
                    setAnnotations(prev => prev.filter(a => a.id !== annotationId && a.parentAnnotationId !== annotationId && !nodeIdsToDelete.has(a.nodeId)));
                } else {
                    setAnnotations(prev => prev.filter(a => a.id !== annotationId && a.parentAnnotationId !== annotationId));
                }
                setPanes(prev => prev.slice(0, paneIndex));
            };

            const openAnnotation = (paneIndex, annotationId) => {
                setPanes(prev => {
                    const next = prev.slice(0, paneIndex + 1);
                    next.push({ type: 'annotation', annotationId });
                    return next;
                });
            };

            // --- ツリーナビゲーション ---
            const handleTreeToggle = (nodeId) => {
                setTreeExpandedIds(prev => { const next = new Set(prev); next.has(nodeId) ? next.delete(nodeId) : next.add(nodeId); return next; });
            };
            const handleTreeExpand = (nodeId) => {
                setTreeExpandedIds(prev => { const next = new Set(prev); next.add(nodeId); return next; });
            };
            const handleMoveNode = (nodeId, dir) => {
                const n = nodes[nodeId];
                if (!n || !n.parentId) return;
                const parent = nodes[n.parentId];
                if (!parent) return;
                const idx = parent.children.indexOf(nodeId);
                if (idx === -1) return;
                const newIdx = idx + dir;
                if (newIdx < 0 || newIdx >= parent.children.length) return;
                const next = [...parent.children];
                [next[idx], next[newIdx]] = [next[newIdx], next[idx]];
                setNodes(prev => ({ ...prev, [n.parentId]: { ...prev[n.parentId], children: next } }));
            };
            const handleAddSection = (paneIndex, nodeId) => {
                const newSectionId = generateId();
                setNodes(prev => ({
                    ...prev,
                    [nodeId]: { ...prev[nodeId], sections: [...(prev[nodeId].sections || []), { id: newSectionId, title: '', content: '' }] }
                }));
                setPanes(prev => { const n = [...prev]; n[paneIndex] = { type: 'edit', nodeId, scrollToSectionId: newSectionId }; return n; });
            };
            const handleAddAnnotationSection = (paneIndex, annotationId) => {
                setAnnotations(prev => prev.map(a => a.id === annotationId ? {
                    ...a,
                    sections: [...(a.sections || [{ id: generateId(), title: '', content: a.content || '' }]), { id: generateId(), title: '', content: '' }]
                } : a));
                setPanes(prev => { const n = [...prev]; n[paneIndex] = { type: 'annotation-edit', annotationId }; return n; });
            };
            const handleTreeExpandAll = () => {
                setTreeExpandedIds(new Set(Object.keys(nodes).filter(k => k !== 'root')));
            };
            const handleTreeCollapseAll = () => {
                setTreeExpandedIds(new Set());
            };
            const buildAncestryPath = (nodeId) => {
                const path = [];
                let current = nodes[nodeId];
                while (current && current.id !== 'root') {
                    path.unshift(current.id);
                    current = current.parentId ? nodes[current.parentId] : null;
                }
                return path;
            };
            const handleTreeSelectNode = (nodeId) => {
                const path = buildAncestryPath(nodeId);
                // 祖先ノードを全て展開
                setTreeExpandedIds(prev => { const next = new Set(prev); path.forEach(id => next.add(id)); return next; });
                setPanes([{ type: 'view', nodeId: 'root' }, ...path.map(id => ({ type: 'view', nodeId: id }))]);
            };
            const handleTreeSelectAnnotation = (parentNodeId, annotationId) => {
                const path = buildAncestryPath(parentNodeId);
                setPanes([{ type: 'view', nodeId: 'root' }, ...path.map(id => ({ type: 'view', nodeId: id })), { type: 'annotation', annotationId }]);
            };

            // --- パンくず生成 ---
            const buildBreadcrumbPath = (paneIndex) => {
                const path = [];
                for (let i = 0; i <= paneIndex; i++) {
                    const p = panes[i];
                    if (p.type === 'annotation') {
                        const anno = annotations.find(a => a.id === p.annotationId);
                        if (anno) path.push({ title: anno.title, isLast: i === paneIndex, isAnnotation: true });
                    } else {
                        let nodeId = p.nodeId || p.parentId;
                        const node = nodes[nodeId];
                        if (node) path.push({ title: node.question, isLast: i === paneIndex });
                    }
                }
                return path;
            };


            const updateBackupConfig = (patch) => {
                setBackupConfig(prev => {
                    const next = { ...prev, ...patch };
                    Storage.saveBackupConfig({ enabled: next.enabled, fileName: next.fileName, lastSavedAt: next.lastSavedAt, lastError: next.lastError });
                    return next;
                });
            };

            const buildBackupData = () => {
                const projects = projectList.map(meta => {
                    const data = meta.id === currentProjectId ? { nodes, annotations } : (Storage.getProjectData(meta.id) || { nodes: {}, annotations: [] });
                    return {
                        id: meta.id,
                        name: meta.name,
                        createdAt: meta.createdAt,
                        updatedAt: meta.updatedAt,
                        nodes: data.nodes || {},
                        annotations: data.annotations || []
                    };
                });
                return {
                    type: 'annotator-qa-auto-backup',
                    version: 1,
                    exportedAt: Date.now(),
                    projects
                };
            };

            const connectBackup = async () => {
                if (!BackupFile.isSupported()) {
                    alert('このブラウザは安全保存（ファイルへの自動保存）に未対応です。JSONエクスポートを併用してください。');
                    return;
                }
                try {
                    const handle = await BackupFile.pickHandle();
                    const granted = await BackupFile.requestWritePermission(handle, true);
                    if (!granted) {
                        alert('書き込み権限がないため接続できませんでした。');
                        return;
                    }
                    backupHandleRef.current = handle;
                    await BackupFile.setHandle(handle);
                    const data = buildBackupData();
                    await BackupFile.write(handle, data);
                    updateBackupConfig({ enabled: true, fileName: handle.name || 'qa-tree-auto-backup.json', lastSavedAt: Date.now(), lastError: '' });
                    alert('安全保存ファイルを接続しました。以後は編集内容が自動保存されます。');
                } catch (e) {
                    if (e?.name !== 'AbortError') alert('バックアップ接続に失敗しました。');
                }
            };

            const toggleAutoBackup = () => {
                if (!backupHandleRef.current) {
                    alert('先に「安全保存を接続」を実行してください。');
                    return;
                }
                updateBackupConfig({ enabled: !backupConfig.enabled, lastError: '' });
            };

            useEffect(() => {
                if (!backupConfig.enabled || !backupHandleRef.current || !currentProjectId) return;
                if (backupTimerRef.current) clearTimeout(backupTimerRef.current);
                backupTimerRef.current = setTimeout(async () => {
                    if (backupInProgressRef.current) return;
                    backupInProgressRef.current = true;
                    try {
                        const granted = await BackupFile.requestWritePermission(backupHandleRef.current, false);
                        if (!granted) {
                            updateBackupConfig({ enabled: false, lastError: '権限が切れたため自動保存を停止しました。再接続してください。' });
                            return;
                        }
                        await BackupFile.write(backupHandleRef.current, buildBackupData());
                        updateBackupConfig({ lastSavedAt: Date.now(), lastError: '' });
                    } catch (e) {
                        updateBackupConfig({ lastError: '自動保存に失敗しました。' });
                    } finally {
                        backupInProgressRef.current = false;
                    }
                }, 1500);
                return () => {
                    if (backupTimerRef.current) clearTimeout(backupTimerRef.current);
                };
            }, [nodes, annotations, projectList, currentProjectId, backupConfig.enabled]);

            // --- エクスポート / インポート ---
            const doExport = (projectIds) => {
                const exportData = {
                    type: 'annotator-qa-export', version: 2, exportedAt: Date.now(),
                    projects: projectIds.map(id => {
                        const meta = projectList.find(p => p.id === id);
                        const data = Storage.getProjectData(id);
                        return { name: meta?.name || '名前なし', nodes: data?.nodes || {}, annotations: data?.annotations || [], createdAt: meta?.createdAt, updatedAt: meta?.updatedAt };
                    })
                };
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'qa-tree-export-' + new Date().toISOString().slice(0, 10) + '.json';
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            };
            const exportAllProjects = () => doExport(projectList.map(p => p.id));
            const exportSingleProject = (id) => doExport([id]);

            const importProjects = (data) => {
                if (!data || (data.type !== 'annotator-qa-export' && data.type !== 'annotator-qa-export') || !Array.isArray(data.projects)) {
                    alert('無効なファイル形式です。このツールからエクスポートしたファイルを選択してください。'); return;
                }
                let count = 0;
                const newList = [...projectList];
                data.projects.forEach(proj => {
                    const id = generateId(); const now = Date.now();
                    const migratedNodes = migrateNodes(proj.nodes || {});
                    newList.unshift({ id, name: proj.name || '名前なし', createdAt: proj.createdAt || now, updatedAt: proj.updatedAt || now, nodeCount: Object.keys(migratedNodes).length, annotationCount: (proj.annotations || []).length, preview: migratedNodes?.root?.sections?.[0]?.content?.substring(0, 100) || '' });
                    Storage.saveProjectData(id, { nodes: migratedNodes, annotations: migrateAnnotations(proj.annotations || []) });
                    count++;
                });
                Storage.saveProjectList(newList); setProjectList(newList);
                alert(count + ' 件のまとめをインポートしました。');
            };


            // --- レンダリング ---
            return (
                <div className="flex flex-col h-screen w-full bg-gray-50 overflow-hidden font-sans text-gray-900">
                    <header className="h-14 bg-slate-900 text-white flex items-center px-6 shrink-0 z-30 shadow-md">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-500 p-1.5 rounded text-white flex items-center justify-center shadow-lg shadow-blue-500/30 cursor-pointer hover:bg-blue-400 transition-colors" onClick={goHome} title="ホームに戻る">
                                <i className="ph-bold ph-tree-structure text-xl"></i>
                            </div>
                            <h1 className="font-bold text-lg tracking-wide cursor-pointer hover:text-blue-300 transition-colors" onClick={goHome}>
                                Q&Aツリー [Dev]<span className="hidden sm:inline-block text-slate-400 font-normal text-sm ml-2">| 多重構造まとめツール</span>
                            </h1>
                            {appMode !== 'home' && currentProjectName && (
                                <div className="hidden sm:flex items-center gap-2 ml-4">
                                    <i className="ph ph-caret-right text-slate-600 text-sm"></i>
                                    <span className="text-slate-300 text-sm font-medium truncate max-w-[300px]">{currentProjectName}</span>
                                </div>
                            )}
                        </div>
                        <div className="ml-auto flex items-center gap-3">
                            {backupConfig.supported && (
                                <>
                                    <button onClick={connectBackup} className="text-xs px-3 py-1.5 rounded-md border border-emerald-500/40 text-emerald-200 hover:text-white hover:border-emerald-300 transition-colors">
                                        <i className="ph-bold ph-floppy-disk mr-1"></i> 安全保存を接続
                                    </button>
                                    <button onClick={toggleAutoBackup} className={`text-xs px-3 py-1.5 rounded-md border transition-colors ${backupConfig.enabled ? 'border-emerald-300 text-white bg-emerald-600/30' : 'border-slate-500 text-slate-300 hover:text-white'}`}>
                                        <i className={`ph-bold ${backupConfig.enabled ? 'ph-toggle-right' : 'ph-toggle-left'} mr-1`}></i> 自動保存 {backupConfig.enabled ? 'ON' : 'OFF'}
                                    </button>
                                </>
                            )}
                            {!backupConfig.supported && <span className="text-[11px] text-amber-300">このブラウザでは安全保存未対応</span>}
                            {backupConfig.fileName && <span className="hidden md:inline text-[11px] text-slate-400">{backupConfig.fileName}{backupConfig.lastSavedAt ? ` / ${new Date(backupConfig.lastSavedAt).toLocaleTimeString('ja-JP')} 保存` : ''}</span>}
                            {backupConfig.lastError && <span className="hidden lg:inline text-[11px] text-rose-300">{backupConfig.lastError}</span>}
                            {appMode !== 'home' && <button onClick={goHome} className="text-slate-400 hover:text-white text-sm flex items-center gap-1.5 transition-colors font-medium"><i className="ph-bold ph-house"></i> ホーム</button>}
                        </div>
                    </header>

                    {appMode === 'home' && (
                        <HomeScreen projects={projectList} onOpen={openProject} onCreateNew={createNewProject} onDelete={deleteProject} onExportSingle={exportSingleProject} onExportAll={exportAllProjects} onImport={importProjects} />
                    )}
                    {appMode === 'setup' && (
                        <SetupScreen initialName={currentProjectName} isNew={!currentProjectId} onSave={handleSetupSave}
                            onCancel={currentProjectId ? () => { setAppMode('workspace'); if (panes.length === 0) setPanes([{ type: 'view', nodeId: 'root' }]); } : (projectList.length > 0 ? goHome : null)} />
                    )}

                    {appMode === 'workspace' && (
                        <div className="flex-1 flex overflow-hidden relative bg-gray-200">
                            {/* テキスト選択フローティングメニュー */}
                            {selectionMenu.show && (
                                <div className="fixed z-[100] transform -translate-x-1/2 bg-slate-800 text-white px-3 py-2 rounded-lg shadow-xl flex items-center gap-3 animate-fade-in-up border border-slate-700"
                                    style={{ top: `${selectionMenu.top}px`, left: `${selectionMenu.left}px` }}>
                                    <div className="text-xs text-gray-300 max-w-[160px] truncate hidden sm:block">"{selectionMenu.text}"</div>
                                    <div className="w-px h-4 bg-slate-600 hidden sm:block"></div>
                                    <button className="text-sm font-bold text-amber-300 hover:text-amber-100 flex items-center gap-1.5 whitespace-nowrap"
                                        onMouseDown={(e) => { e.preventDefault(); startAnnotationAdd(selectionMenu.paneIndex, selectionMenu.nodeId, selectionMenu.parentAnnotationId, selectionMenu.text, selectionMenu.sectionId); }}>
                                        <i className="ph-bold ph-highlighter text-lg"></i> 注釈を追加
                                    </button>
                                    <button className="text-slate-500 hover:text-slate-300 ml-1" onMouseDown={(e) => { e.preventDefault(); hideSelectionMenu(); }}>
                                        <i className="ph-bold ph-x text-sm"></i>
                                    </button>
                                </div>
                            )}
                            {/* ホバーツールチップ */}
                            {tooltip.show && (
                                <div className="fixed z-[110] transform -translate-x-1/2 -translate-y-full bg-slate-800 text-white px-3 py-1.5 rounded-md text-xs font-bold shadow-lg pointer-events-none max-w-[250px] break-words text-center"
                                    style={{ top: `${tooltip.top}px`, left: `${tooltip.left}px` }}>
                                    {tooltip.text}
                                    <div className="absolute top-full left-1/2 transform -translate-x-1/2 border-[5px] border-transparent border-t-slate-800"></div>
                                </div>
                            )}

                            {/* 全文検索オーバーレイ */}
                            {searchOpen && (
                                <div className="fixed inset-0 z-50 flex items-start justify-center pt-24 bg-black/40" onClick={(e) => { if (e.target === e.currentTarget) closeSearch(); }}>
                                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-xl mx-4 overflow-hidden animate-fade-in-up" onClick={e => e.stopPropagation()}>
                                        <div className="flex items-center gap-3 px-4 py-3 border-b border-gray-200">
                                            <i className="ph ph-magnifying-glass text-gray-400 text-xl shrink-0"></i>
                                            <input
                                                ref={searchInputRef}
                                                type="text"
                                                value={searchQuery}
                                                onChange={e => doSearch(e.target.value)}
                                                onKeyDown={e => { if (e.key === 'Escape') closeSearch(); }}
                                                className="flex-1 text-gray-800 text-sm outline-none bg-transparent placeholder-gray-400"
                                                placeholder="全文検索… (Esc で閉じる)"
                                            />
                                            {searchQuery && (
                                                <button onClick={() => { setSearchQuery(''); setSearchResults([]); searchInputRef.current?.focus(); }} className="text-gray-400 hover:text-gray-600 transition-colors">
                                                    <i className="ph-bold ph-x text-sm"></i>
                                                </button>
                                            )}
                                        </div>
                                        <div className="max-h-[60vh] overflow-y-auto">
                                            {searchQuery.trim() === '' ? (
                                                <div className="py-10 text-center text-gray-400 text-sm">検索キーワードを入力してください</div>
                                            ) : searchResults.length === 0 ? (
                                                <div className="py-10 text-center text-gray-400 text-sm">結果なし</div>
                                            ) : (
                                                <div className="py-2">
                                                    {searchResults.map((result, idx) => (
                                                        <button key={idx} onClick={() => handleSearchNavigate(result)}
                                                            className="w-full text-left px-4 py-3 hover:bg-blue-50 transition-colors flex items-start gap-3 border-b border-gray-100 last:border-b-0">
                                                            <span className="shrink-0 mt-0.5">
                                                                {result.type === 'node'
                                                                    ? <i className="ph-fill ph-question text-blue-500 text-base"></i>
                                                                    : <i className="ph-fill ph-highlighter text-amber-500 text-base"></i>
                                                                }
                                                            </span>
                                                            <div className="flex-1 min-w-0">
                                                                <div className="font-bold text-gray-800 text-sm truncate">{highlightMatch(result.title, searchQuery)}</div>
                                                                {result.snippet && result.snippet !== result.title && (
                                                                    <div className="text-xs text-gray-500 mt-0.5 line-clamp-2">{highlightMatch(result.snippet, searchQuery)}</div>
                                                                )}
                                                            </div>
                                                            <span className="text-[10px] text-gray-400 shrink-0 mt-1">
                                                                {result.type === 'node' ? '質問' : '注釈'}
                                                            </span>
                                                        </button>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="horizontal-scroll-container scroll-smooth" ref={scrollContainerRef}>
                                {panes.map((pane, index) => {
                                    const breadcrumb = buildBreadcrumbPath(index);

                                    if (pane.type === 'view') {
                                        const node = nodes[pane.nodeId];
                                        if (!node) return null;
                                        const validChildren = node.children.map(id => nodes[id]).filter(Boolean);
                                        const nodeWithValidChildren = { ...node, children: validChildren };
                                        const nextPane = panes[index + 1];
                                        const selectedChildId = nextPane ? (nextPane.nodeId || nextPane.parentId) : null;
                                        const nodeAnnotations = annotations.filter(a => a.nodeId === pane.nodeId);
                                        const activeAnnotationId = nextPane && nextPane.type === 'annotation' ? nextPane.annotationId :
                                            nextPane && nextPane.type === 'annotation-edit' ? nextPane.annotationId : null;
                                        const isRootPane = pane.nodeId === 'root';
                                        const treeActiveNodeIds = isRootPane ? new Set(panes.slice(1).filter(p => p.nodeId).map(p => p.nodeId)) : null;
                                        const treeActiveAnnotationId = isRootPane ? (panes.find(p => p.type === 'annotation')?.annotationId || null) : null;
                                        return (
                                            <ViewPane
                                                key={`pane-${index}-${pane.nodeId}`}
                                                node={nodeWithValidChildren}
                                                isRoot={isRootPane}
                                                breadcrumb={breadcrumb}
                                                isActive={index === panes.length - 1}
                                                selectedChildId={selectedChildId}
                                                nodeAnnotations={nodeAnnotations}
                                                activeAnnotationId={activeAnnotationId}
                                                onAnnotateText={(nodeId, quote, rect, sectionId) => handleAnnotateText(nodeId, null, quote, rect, sectionId)}
                                                onAnnotationClick={(annotationId) => openAnnotation(index, annotationId)}
                                                onMarkHover={(h, t, r) => { if (h && r) setTooltip({ show: true, text: t, top: r.top - 8, left: r.left + r.width / 2 }); else setTooltip({ show: false }); }}
                                                onHideSelectionMenu={hideSelectionMenu}
                                                onEdit={(sectionId) => {
                                                    if (pane.nodeId === 'root') { setAppMode('setup'); }
                                                    else { setPanes(prev => { const n = [...prev]; n[index] = { type: 'edit', nodeId: pane.nodeId, scrollToSectionId: sectionId || null }; return n; }); }
                                                }}
                                                onDelete={() => handleDeleteNode(index, pane.nodeId, node.parentId, node.parentAnnotationId)}
                                                onClose={() => setPanes(prev => prev.slice(0, index))}
                                                onAddChild={(_sectionId) => { setPanes(prev => { const next = prev.slice(0, index + 1); next.push({ type: 'add', parentId: pane.nodeId, parentAnnotationId: null }); return next; }); }}
                                                onAddSection={() => handleAddSection(index, pane.nodeId)}
                                                onOpenChild={(childId) => { setPanes(prev => { const next = prev.slice(0, index + 1); next.push({ type: 'view', nodeId: childId }); return next; }); }}
                                                onMoveNode={handleMoveNode}
                                                allNodes={nodes}
                                                allAnnotations={isRootPane ? annotations : null}
                                                treeExpandedIds={isRootPane ? treeExpandedIds : null}
                                                onTreeToggle={isRootPane ? handleTreeToggle : null}
                                                onTreeExpand={isRootPane ? handleTreeExpand : null}
                                                onTreeExpandAll={isRootPane ? handleTreeExpandAll : null}
                                                onTreeCollapseAll={isRootPane ? handleTreeCollapseAll : null}
                                                onTreeSelectNode={isRootPane ? handleTreeSelectNode : null}
                                                onTreeSelectAnnotation={isRootPane ? handleTreeSelectAnnotation : null}
                                                treeActiveNodeIds={treeActiveNodeIds}
                                                treeActiveAnnotationId={treeActiveAnnotationId}
                                                onOpenSearch={isRootPane ? openSearch : null}
                                            />
                                        );
                                    }

                                    if (pane.type === 'add' || pane.type === 'edit') {
                                        const isAdd = pane.type === 'add';
                                        const node = isAdd ? null : nodes[pane.nodeId];
                                        const isTopLevel = isAdd ? pane.parentId === 'root' && !pane.parentAnnotationId : false;
                                        return (
                                            <EditPane
                                                key={`pane-${index}-${pane.type}-${pane.scrollToSectionId || ''}`}
                                                mode={pane.type}
                                                isTopLevel={isTopLevel}
                                                initialQuestion={node?.question || ''}
                                                initialSections={node?.sections || null}
                                                breadcrumb={breadcrumb}
                                                scrollToSectionId={pane.scrollToSectionId || null}
                                                onSave={(q, sections) => handleSaveNode(index, pane.type, isAdd ? pane.parentId : pane.nodeId, isAdd ? (pane.parentAnnotationId || null) : null, q, sections)}
                                                onCancel={() => {
                                                    if (isAdd) setPanes(prev => prev.slice(0, index));
                                                    else setPanes(prev => { const n = [...prev]; n[index] = { type: 'view', nodeId: pane.nodeId }; return n; });
                                                }}
                                            />
                                        );
                                    }

                                    if (pane.type === 'annotation') {
                                        const annotation = annotations.find(a => a.id === pane.annotationId);
                                        if (!annotation) return null;
                                        const nextPane = panes[index + 1];
                                        const selectedChildId = nextPane ? (nextPane.nodeId || null) : null;
                                        const childNodes = (annotation.childNodeIds || []).map(id => nodes[id]).filter(Boolean);
                                        const subAnnotations = annotations.filter(a => a.parentAnnotationId === pane.annotationId);
                                        const activeAnnotationId = nextPane && nextPane.type === 'annotation' ? nextPane.annotationId :
                                            nextPane && nextPane.type === 'annotation-edit' ? nextPane.annotationId : null;
                                        return (
                                            <AnnotationViewPane
                                                key={`pane-${index}-annotation-${pane.annotationId}`}
                                                annotation={annotation}
                                                breadcrumb={breadcrumb}
                                                childNodes={childNodes}
                                                subAnnotations={subAnnotations}
                                                activeAnnotationId={activeAnnotationId}
                                                selectedChildId={selectedChildId}
                                                onEdit={() => setPanes(prev => { const n = [...prev]; n[index] = { type: 'annotation-edit', annotationId: pane.annotationId }; return n; })}
                                                onDelete={() => handleDeleteAnnotation(index, pane.annotationId)}
                                                onClose={() => setPanes(prev => prev.slice(0, index))}
                                                onAddChild={() => { setPanes(prev => { const next = prev.slice(0, index + 1); next.push({ type: 'add', parentId: null, parentAnnotationId: pane.annotationId }); return next; }); }}
                                                onAddSection={() => handleAddAnnotationSection(index, pane.annotationId)}
                                                onOpenChild={(childId) => { setPanes(prev => { const next = prev.slice(0, index + 1); next.push({ type: 'view', nodeId: childId }); return next; }); }}
                                                onAnnotateText={(annotationId, quote, rect) => handleAnnotateText(null, annotationId, quote, rect)}
                                                onAnnotationClick={(annotationId) => openAnnotation(index, annotationId)}
                                                onMarkHover={(h, t, r) => { if (h && r) setTooltip({ show: true, text: t, top: r.top - 8, left: r.left + r.width / 2 }); else setTooltip({ show: false }); }}
                                                onHideSelectionMenu={hideSelectionMenu}
                                            />
                                        );
                                    }

                                    if (pane.type === 'annotation-add') {
                                        return (
                                            <AnnotationFormPane
                                                key={`pane-${index}-annotation-add`}
                                                mode="add"
                                                quote={pane.quote}
                                                onSave={(title, sections) => saveAnnotation(index, pane.nodeId, pane.parentAnnotationId, pane.quote, title, sections, pane.sectionId)}
                                                onCancel={() => setPanes(prev => prev.slice(0, index))}
                                            />
                                        );
                                    }

                                    if (pane.type === 'annotation-edit') {
                                        const annotation = annotations.find(a => a.id === pane.annotationId);
                                        if (!annotation) return null;
                                        return (
                                            <AnnotationFormPane
                                                key={`pane-${index}-annotation-edit-${pane.annotationId}`}
                                                mode="edit"
                                                quote={annotation.quote}
                                                initialData={annotation}
                                                onSave={(title, sections) => updateAnnotation(index, pane.annotationId, title, sections)}
                                                onCancel={() => setPanes(prev => { const n = [...prev]; n[index] = { type: 'annotation', annotationId: pane.annotationId }; return n; })}
                                            />
                                        );
                                    }

                                    return null;
                                })}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
