<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QAmatomer Side Panel</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    .toolbar { display: flex; align-items: center; gap: 8px; padding: 10px; border-bottom: 1px solid #334155; }
    .title { font-size: 13px; font-weight: 700; margin-right: auto; }
    button, a { border: 0; border-radius: 8px; padding: 7px 10px; font-size: 12px; font-weight: 700; cursor: pointer; text-decoration: none; }
    #reload { background: #334155; color: #e2e8f0; }
    #newTab { background: #2563eb; color: #fff; }
    #status { font-size: 11px; color: #94a3b8; padding: 6px 10px; border-bottom: 1px solid #1e293b; }
    iframe { width: 100%; height: calc(100vh - 80px); border: 0; background: #fff; }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="title">QAmatomer Dev</span>
    <button id="reload">再読込</button>
    <a id="newTab" target="_blank" rel="noopener noreferrer">新規タブ</a>
  </div>
  <div id="status">読み込み中...</div>
  <iframe id="appFrame" title="QAmatomer Dev"></iframe>
  <script src="sidepanel.js"></script>
</body>
</html>
