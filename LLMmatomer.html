<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annotator - 無限カラム階層版</title>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Marked (Markdown Parser) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- KaTeX (Math Rendering) -->
    <link href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <!-- mark.js (Text Highlighting) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mark.js/8.11.1/mark.min.js"></script>

    <style>
        /* カスタムアニメーション */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out forwards;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide-in-right {
            animation: slideInRight 0.3s ease-out forwards;
        }

        /* 横スクロールコンテナとスクロールバー */
        .horizontal-scroll-container {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            width: 100%;
            height: 100%;
        }
        .horizontal-scroll-container::-webkit-scrollbar { height: 10px; }
        .horizontal-scroll-container::-webkit-scrollbar-track { background: #f1f5f9; }
        .horizontal-scroll-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Markdown 表示用スタイル */
        .markdown-body { color: #334155; font-size: 0.95rem; line-height: 1.8; }
        .markdown-body h1 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.75em; color: #0f172a; }
        .markdown-body h2 { font-size: 1.25rem; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.75em; color: #1e293b; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3em; }
        .markdown-body h3 { font-size: 1.125rem; font-weight: 600; margin-top: 1.25em; margin-bottom: 0.5em; color: #334155; }
        .markdown-body p { margin-bottom: 1.2em; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body a { color: #2563eb; text-decoration: underline; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1.2em; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1.2em; }
        .markdown-body li { margin-bottom: 0.3em; }
        .markdown-body blockquote { border-left: 4px solid #cbd5e1; padding-left: 1em; color: #64748b; font-style: italic; margin-bottom: 1.2em; background: #f8fafc; padding: 0.5em 1em; border-radius: 0 0.5rem 0.5rem 0; }
        .markdown-body code { background-color: #f1f5f9; color: #ef4444; padding: 0.2em 0.4em; border-radius: 0.25rem; font-size: 0.875em; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .markdown-body pre { background-color: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1.2em; }
        .markdown-body pre code { background-color: transparent; color: inherit; padding: 0; font-size: 0.875em; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1.2em; }
        .markdown-body th, .markdown-body td { border: 1px solid #e2e8f0; padding: 0.5rem; text-align: left; }
        .markdown-body th { background-color: #f8fafc; font-weight: 600; }

        .left-pane-text { color: #1f2937; font-size: 15px; }

        /* KaTeX 表示調整 */
        .katex-display { margin: 1em 0; overflow-x: auto; overflow-y: hidden; padding-bottom: 0.2em; }

        /* 注釈ハイライトのスタイル */
        .annotation-mark {
            background-color: rgba(253, 224, 71, 0.4);
            border-bottom: 2px dotted #eab308;
            color: inherit;
            cursor: pointer;
            border-radius: 2px;
            padding: 2px 0;
            transition: all 0.2s;
            position: relative;
            box-decoration-break: clone;
            -webkit-box-decoration-break: clone;
        }
        .annotation-mark:hover {
            background-color: rgba(253, 224, 71, 0.7);
        }
        .annotation-mark.active {
            background-color: rgba(250, 204, 21, 0.6);
            border-bottom: 2px solid #ca8a04;
            box-shadow: 0 0 0 2px rgba(250, 204, 21, 0.3);
        }

        /* Annotation anchor (footnote-style) */
        .annotation-anchor {
            color: #f59e0b;
            font-weight: 700;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }
        .annotation-anchor:hover {
            color: #d97706;
            text-decoration: underline;
        }
        .annotation-anchor.active {
            color: #d97706;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const generateId = () => Math.random().toString(36).substr(2, 9);

        // Markdown offset ベースの注釈システム
        // 注釈は startOffset, endOffset を持つ position オブジェクトで位置を特定

        // マークダウン内でテキストを検索（簡易版）
        const findSimpleTextPosition = (markdown, searchText) => {
            if (!searchText || !markdown) return null;

            // 完全マッチを試みる
            const idx = markdown.indexOf(searchText);
            if (idx !== -1) {
                return {
                    startOffset: idx,
                    endOffset: idx + searchText.length,
                    quote: searchText
                };
            }

            // 簡単な正規化（複数スペースを1つに）
            const normalized = searchText.replace(/\s+/g, ' ').trim();
            const normalizedMarkdown = markdown.replace(/\s+/g, ' ');

            const nIdx = normalizedMarkdown.indexOf(normalized);
            if (nIdx !== -1) {
                return {
                    startOffset: nIdx,
                    endOffset: nIdx + normalized.length,
                    quote: normalized
                };
            }

            return null;
        };

        // マークダウンにアンカーを inject する
        const injectAnnotationAnchors = (markdown, annotations) => {
            if (!annotations || annotations.length === 0) return markdown;

            // 注釈に position がない場合は quote から position を計算
            const enrichedAnnos = annotations.map(anno => {
                if (anno.position && anno.position.endOffset !== undefined) {
                    return anno;
                }

                // quote から position を計算
                if (anno.quote) {
                    const pos = findSimpleTextPosition(markdown, anno.quote);
                    if (pos) {
                        return { ...anno, position: pos };
                    }
                }

                return null;
            }).filter(a => a && a.position && a.position.endOffset !== undefined);

            // 位置でソート（後ろから挿入するため逆順）
            const sorted = [...enrichedAnnos]
                .sort((a, b) => (b.position.endOffset || 0) - (a.position.endOffset || 0));

            let result = markdown;
            sorted.forEach((anno, idx) => {
                const anchorNum = sorted.length - idx; // 後ろから挿入するので逆順
                let pos = anno.position.endOffset;

                // endOffset から次の改行を探す
                if (pos !== undefined && pos >= 0) {
                    const remaining = result.slice(pos);
                    const newlineMatch = remaining.match(/\n/); // 最初の改行を探す
                    if (newlineMatch) {
                        pos = pos + newlineMatch.index; // 改行の直前に挿入
                    }
                    // 改行がなければ endOffset のままで挿入
                }

                if (pos !== undefined && pos >= 0 && pos <= result.length) {
                    const anchor = `<span class="annotation-anchor" data-anno-id="${anno.id}" title="${anno.title || '注釈'}" data-anno-num="${anchorNum}">[${anchorNum}]</span>`;
                    result = result.slice(0, pos) + anchor + result.slice(pos);
                }
            });

            return result;
        };

        // --- LocalStorage ヘルパー ---
        const Storage = {
            getProjectList() {
                try {
                    return JSON.parse(localStorage.getItem('annotator-project-list') || '[]');
                } catch(e) { return []; }
            },
            saveProjectList(list) {
                localStorage.setItem('annotator-project-list', JSON.stringify(list));
            },
            getProjectData(id) {
                try {
                    return JSON.parse(localStorage.getItem('annotator-project-' + id) || 'null');
                } catch(e) { return null; }
            },
            saveProjectData(id, data) {
                localStorage.setItem('annotator-project-' + id, JSON.stringify(data));
            },
            deleteProjectData(id) {
                localStorage.removeItem('annotator-project-' + id);
            }
        };

        // --- コンポーネント: Markdown & KaTeX & Highlight ビュワー ---
        const MarkdownViewer = ({ content, className = "markdown-body", annotations = [], onMarkClick, onMultiMarkClick, onMarkHover, activeAnnotationId, onAnnotationClick }) => {
            const contentRef = useRef(null);
            const markerRef = useRef(null);

            const callbacksRef = useRef({ onMarkClick, onMultiMarkClick, onMarkHover });
            useEffect(() => {
                callbacksRef.current = { onMarkClick, onMultiMarkClick, onMarkHover };
            }, [onMarkClick, onMultiMarkClick, onMarkHover]);

            const annotationsStr = JSON.stringify(
                annotations.map(a => ({ id: a.id, quote: a.quote, title: a.title }))
            );

            useEffect(() => {
                if (contentRef.current && content) {
                    const mathBlocks = [];
                    let processedText = content;

                    processedText = processedText.replace(/\$\$([\s\S]+?)\$\$/g, (match, p1) => {
                        const id = `MATHBLOCK${mathBlocks.length}END`;
                        mathBlocks.push({ id, content: `$$${p1}$$` });
                        return id;
                    });

                    processedText = processedText.replace(/\\\[([\s\S]+?)\\\]/g, (match, p1) => {
                        const id = `MATHBLOCK${mathBlocks.length}END`;
                        mathBlocks.push({ id, content: `\\[${p1}\\]` });
                        return id;
                    });

                    processedText = processedText.replace(/\$((?:\\.|[^$\n])+?)\$/g, (match, p1) => {
                        const id = `MATHINLINE${mathBlocks.length}END`;
                        mathBlocks.push({ id, content: `$${p1}$` });
                        return id;
                    });

                    processedText = processedText.replace(/\\\(([\s\S]+?)\\\)/g, (match, p1) => {
                        const id = `MATHINLINE${mathBlocks.length}END`;
                        mathBlocks.push({ id, content: `\\(${p1}\\)` });
                        return id;
                    });

                    // 注釈のアンカーを inject
                    processedText = injectAnnotationAnchors(processedText, annotations);

                    let html = marked.parse(processedText);

                    // LaTeX を data-latex 属性で埋め込む
                    mathBlocks.forEach(block => {
                        const encoded = block.content
                            .replace(/&/g, '&amp;')
                            .replace(/"/g, '&quot;');
                        const wrapper = `<span data-latex="${encoded}" class="math-latex-wrap">${block.content}</span>`;
                        html = html.replace(block.id, wrapper);
                    });

                    contentRef.current.innerHTML = html;

                    try {
                        renderMathInElement(contentRef.current, {
                            delimiters: [
                                {left: '$$', right: '$$', display: true},
                                {left: '$', right: '$', display: false},
                                {left: '\\(', right: '\\)', display: false},
                                {left: '\\[', right: '\\]', display: true}
                            ],
                            throwOnError: false
                        });
                    } catch (e) {
                        console.error("KaTeX rendering error:", e);
                    }

                    // クリップボードイベント：コピー時に LaTeX コードを含める
                    contentRef.current.addEventListener('copy', (e) => {
                        const selection = window.getSelection();
                        if (selection.rangeCount === 0) return;

                        const range = selection.getRangeAt(0);
                        const tempDiv = document.createElement('div');
                        tempDiv.appendChild(range.cloneContents());

                        // 選択範囲内の data-latex を抽出
                        const mathSpans = tempDiv.querySelectorAll('[data-latex]');

                        if (mathSpans.length > 0) {
                            const text = selection.toString();
                            // LaTeX から区切り文字（\(...\) や $...$）を削除して、本体のみ抽出
                            const latexBodies = Array.from(mathSpans)
                                .map(span => {
                                    let latex = span.dataset.latex;
                                    // \(...\) や \[...\] や $...$ を削除
                                    return latex
                                        .replace(/\\\(/, '')
                                        .replace(/\\\)/, '')
                                        .replace(/\\\[/, '')
                                        .replace(/\\\]/, '')
                                        .replace(/^\$\$/, '')
                                        .replace(/\$\$$/, '')
                                        .replace(/^\$/, '')
                                        .replace(/\$$/, '');
                                })
                                .join('');

                            // クリップボードにテキスト + LaTeX本体を設定
                            e.preventDefault();
                            e.clipboardData.setData('text/plain', text + ' ' + latexBodies);
                            console.log('[Copy] Text:', text, 'LaTeX bodies:', latexBodies);
                        }
                    });

                    // 注釈アンカーのクリックハンドラーを設定
                    const anchors = contentRef.current.querySelectorAll('.annotation-anchor');
                    anchors.forEach(anchor => {
                        anchor.addEventListener('click', (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            const annoId = anchor.dataset.annoId;
                            if (annoId && onAnnotationClick) {
                                onAnnotationClick(annoId);
                            }
                        });

                        // ホバーでタイトルを表示
                        anchor.style.cursor = 'pointer';
                    });
                }
            }, [content, annotations]);

            // Annotation anchor のアクティブ状態を更新
            useEffect(() => {
                const anchors = contentRef.current?.querySelectorAll('.annotation-anchor');
                if (!anchors) return;

                anchors.forEach(anchor => {
                    const annoId = anchor.dataset.annoId;
                    if (activeAnnotationId === annoId) {
                        anchor.classList.add('active');
                    } else {
                        anchor.classList.remove('active');
                    }
                });
            }, [activeAnnotationId]);

            return <div ref={contentRef} className={className}></div>;
        };

        // --- コンポーネント: ホーム画面（プロジェクト一覧） ---
        const HomeScreen = ({ projects, onOpen, onCreateNew, onDelete, onExportSingle, onExportAll, onImport }) => {
            const fileInputRef = useRef(null);

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        onImport(data);
                    } catch(err) {
                        alert('ファイルの読み込みに失敗しました。正しいJSONファイルを選択してください。');
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            return (
                <div className="flex-1 overflow-y-auto bg-gray-50">
                    <div className="max-w-4xl mx-auto px-6 py-10 animate-fade-in-up">
                        <div className="flex items-center justify-between mb-8">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800">保存済みのまとめ</h2>
                                <p className="text-gray-500 text-sm mt-1">{projects.length} 件のまとめ</p>
                            </div>
                            <div className="flex items-center gap-3">
                                <button
                                    onClick={() => fileInputRef.current?.click()}
                                    className="px-4 py-2.5 text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 font-medium text-sm flex items-center gap-2 transition-colors"
                                >
                                    <i className="ph-bold ph-upload-simple"></i> インポート
                                </button>
                                <input ref={fileInputRef} type="file" accept=".json" onChange={handleFileChange} className="hidden" />
                                {projects.length > 0 && (
                                    <button
                                        onClick={onExportAll}
                                        className="px-4 py-2.5 text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 font-medium text-sm flex items-center gap-2 transition-colors"
                                    >
                                        <i className="ph-bold ph-download-simple"></i> 全てエクスポート
                                    </button>
                                )}
                                <button
                                    onClick={onCreateNew}
                                    className="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-bold text-sm hover:bg-blue-700 flex items-center gap-2 transition-colors shadow-sm"
                                >
                                    <i className="ph-bold ph-plus"></i> 新規作成
                                </button>
                            </div>
                        </div>

                        {projects.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-20 text-gray-400">
                                <div className="w-24 h-24 bg-blue-100 text-blue-300 rounded-full flex items-center justify-center mb-6 shadow-inner">
                                    <i className="ph-fill ph-notebook text-5xl"></i>
                                </div>
                                <h3 className="text-xl font-bold text-gray-400 mb-2">まだまとめがありません</h3>
                                <p className="text-sm text-gray-400 max-w-sm text-center leading-relaxed">
                                    「新規作成」ボタンからLLMの回答を貼り付けて、注釈付きのまとめを作成しましょう。
                                </p>
                            </div>
                        ) : (
                            <div className="grid gap-4">
                                {projects.map(project => (
                                    <div
                                        key={project.id}
                                        onClick={() => onOpen(project.id)}
                                        className="bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-md hover:border-blue-300 transition-all cursor-pointer group"
                                    >
                                        <div className="p-5 flex items-start justify-between">
                                            <div className="flex-1 min-w-0">
                                                <h3 className="font-bold text-gray-800 text-lg truncate group-hover:text-blue-600 transition-colors">
                                                    {project.name}
                                                </h3>
                                                <div className="flex items-center gap-4 mt-2 text-sm text-gray-400">
                                                    <span className="flex items-center gap-1">
                                                        <i className="ph ph-calendar-blank"></i>
                                                        {new Date(project.createdAt).toLocaleDateString('ja-JP')}
                                                    </span>
                                                    <span className="flex items-center gap-1">
                                                        <i className="ph ph-clock"></i>
                                                        {new Date(project.updatedAt).toLocaleDateString('ja-JP')} 更新
                                                    </span>
                                                    <span className="flex items-center gap-1">
                                                        <i className="ph ph-chat-teardrop-text"></i>
                                                        {project.annotationCount || 0} 件の注釈
                                                    </span>
                                                </div>
                                                {project.preview && (
                                                    <p className="mt-3 text-sm text-gray-500 line-clamp-2 leading-relaxed">{project.preview}</p>
                                                )}
                                            </div>
                                            <div className="flex items-center gap-1 ml-4 shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                                                <button
                                                    onClick={(e) => { e.stopPropagation(); onExportSingle(project.id); }}
                                                    className="w-9 h-9 flex items-center justify-center rounded-full text-gray-400 hover:text-blue-600 hover:bg-blue-100 transition-colors"
                                                    title="エクスポート"
                                                >
                                                    <i className="ph ph-download-simple text-lg"></i>
                                                </button>
                                                <button
                                                    onClick={(e) => {
                                                        e.stopPropagation();
                                                        if(confirm('\u300c' + project.name + '\u300d\u3092\u524a\u9664\u3057\u307e\u3059\u304b\uff1f\u3053\u306e\u64cd\u4f5c\u306f\u5143\u306b\u623b\u305b\u307e\u305b\u3093\u3002')) onDelete(project.id);
                                                    }}
                                                    className="w-9 h-9 flex items-center justify-center rounded-full text-gray-400 hover:text-red-600 hover:bg-red-100 transition-colors"
                                                    title="削除"
                                                >
                                                    <i className="ph ph-trash text-lg"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- コンポーネント: 主軸テキスト入力画面 ---
        const SetupScreen = ({ initialName, initialText, isNew, onSave, onCancel }) => {
            const [name, setName] = useState(initialName || '');
            const [text, setText] = useState(initialText || '');

            return (
                <div className="flex flex-col items-center justify-center h-[calc(100vh-56px)] bg-gray-50 p-6">
                    <div className="w-full max-w-4xl bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col h-[80vh] animate-fade-in-up">
                        <div className="p-6 border-b border-gray-100 bg-gray-50 shrink-0">
                            <div className="flex justify-between items-center">
                                <div>
                                    <h1 className="text-2xl font-bold text-gray-800">{isNew ? '新しいまとめを作成' : '主軸テキストの編集'}</h1>
                                    <p className="text-gray-500 text-sm mt-1">ChatGPTなどの回答原文をそのまま貼り付けてください。</p>
                                </div>
                                <div className="flex items-center gap-3">
                                    {onCancel && (
                                        <button
                                            onClick={onCancel}
                                            className="px-5 py-2.5 text-gray-600 bg-white border border-gray-300 rounded-lg font-bold hover:bg-gray-50 transition-colors"
                                        >
                                            キャンセル
                                        </button>
                                    )}
                                    <button
                                        onClick={() => onSave(name, text)}
                                        disabled={!text.trim() || !name.trim()}
                                        className="px-6 py-2.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm"
                                    >
                                        保存して注釈を始める
                                    </button>
                                </div>
                            </div>
                            <div className="mt-4">
                                <input
                                    type="text"
                                    value={name}
                                    onChange={e => setName(e.target.value)}
                                    className="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all bg-white text-lg"
                                    placeholder="まとめのタイトルを入力（例：Transformerの仕組み）"
                                />
                            </div>
                        </div>
                        <div className="flex-1 relative">
                            <textarea
                                className="w-full h-full p-6 resize-none focus:outline-none text-gray-700 leading-relaxed text-lg font-mono"
                                placeholder="ここにテキストをペーストしてください..."
                                value={text}
                                onChange={e => setText(e.target.value)}
                            ></textarea>
                        </div>
                    </div>
                </div>
            );
        };

        // --- コンポーネント: 注釈フォーム (追加・編集) ---
        const AnnotationForm = ({ mode, quote, parentTitle, initialData, onSave, onCancel }) => {
            const [title, setTitle] = useState(initialData?.title || '');
            const [content, setContent] = useState(initialData?.content || '');
            const [quoteText, setQuoteText] = useState(initialData?.quote || quote || '');

            return (
                <div className="flex flex-col h-full animate-slide-in-right bg-slate-50">
                    <div className="p-4 border-b border-gray-200 bg-white flex items-center justify-between shrink-0 shadow-sm z-10">
                        <div className="flex items-center gap-2">
                            <i className={`ph-fill ${mode === 'add' ? 'ph-plus-circle text-blue-500' : 'ph-pencil-simple text-orange-500'} text-xl`}></i>
                            <h3 className="font-bold text-gray-700">{mode === 'add' ? '新規注釈の追加' : '注釈の編集'}</h3>
                        </div>
                        <button onClick={onCancel} className="text-gray-400 hover:text-gray-600 transition-colors">
                            <i className="ph-bold ph-x text-lg"></i>
                        </button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 flex flex-col gap-6">
                        <div className="bg-white border border-orange-300 p-4 rounded-xl shadow-sm">
                            <p className="text-xs text-orange-600 font-bold mb-2 flex items-center gap-1 uppercase tracking-wider">
                                <i className="ph-bold ph-warning"></i> 引用テキスト (修正可能)
                            </p>
                            <textarea
                                value={quoteText}
                                onChange={(e) => setQuoteText(e.target.value)}
                                className="w-full text-sm bg-orange-50 p-3 rounded border-l-2 border-orange-400 font-mono resize-none focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none"
                                placeholder="自動抽出されたテキスト（修正可能）"
                                rows="4"
                            ></textarea>
                            <p className="text-xs text-orange-500 mt-2">💡 自動抽出が失敗した場合、ここで正しいテキストを入力してください</p>
                        </div>

                        <div>
                            <label className="block text-sm font-bold text-gray-600 mb-2">タイトル / 要約</label>
                            <input
                                type="text"
                                value={title}
                                onChange={e => setTitle(e.target.value)}
                                className="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all bg-white shadow-sm"
                                placeholder="例：この概念の具体例"
                            />
                        </div>
                        <div className="flex-1 flex flex-col">
                            <label className="block text-sm font-bold text-gray-600 mb-2 flex justify-between">
                                <span>本文</span>
                                <span className="text-xs text-gray-400 font-normal px-2 py-0.5 bg-gray-200 rounded">Markdown & LaTeX対応</span>
                            </label>
                            <textarea
                                value={content}
                                onChange={e => setContent(e.target.value)}
                                className="flex-1 w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all resize-none font-mono text-sm bg-white shadow-sm"
                                placeholder="マークダウン形式で詳細を記述できます。"
                            ></textarea>
                        </div>
                    </div>

                    <div className="p-4 border-t border-gray-200 bg-white flex justify-end gap-3 shrink-0">
                        <button onClick={onCancel} className="px-6 py-2.5 rounded-lg font-bold text-gray-600 hover:bg-gray-100 transition-colors">
                            キャンセル
                        </button>
                        <button
                            onClick={() => onSave(title, content, quoteText)}
                            disabled={!title.trim() || !content.trim() || !quoteText.trim()}
                            className="px-6 py-2.5 rounded-lg font-bold text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-50 transition-colors flex items-center gap-2 shadow-sm"
                        >
                            <i className="ph-bold ph-check"></i> 保存
                        </button>
                    </div>
                </div>
            );
        };

        // --- メインアプリコンポーネント ---
        const App = () => {
            // appMode: 'home' | 'setup' | 'workspace'
            const [appMode, setAppMode] = useState('home');
            const [projectList, setProjectList] = useState([]);
            const [currentProjectId, setCurrentProjectId] = useState(null);
            const [currentProjectName, setCurrentProjectName] = useState('');
            const [mainText, setMainText] = useState('');
            const [annotations, setAnnotations] = useState([]);

            const [panes, setPanes] = useState([{ id: 'pane-main', type: 'main', targetId: 'main' }]);

            const [selectionMenu, setSelectionMenu] = useState({ show: false, top: 0, left: 0, text: '', paneIndex: 0, targetId: 'main' });
            const [tooltip, setTooltip] = useState({ show: false, text: '', top: 0, left: 0 });
            const [annotationPicker, setAnnotationPicker] = useState({ show: false, annoIds: [], top: 0, left: 0, paneIndex: 0 });

            const scrollContainerRef = useRef(null);

            // 初期化: プロジェクト一覧を読み込み + 旧データのマイグレーション
            useEffect(() => {
                let list = Storage.getProjectList();

                // 旧形式 (v5 / v2) からのマイグレーション
                if (list.length === 0) {
                    let migratedData = null;
                    const v5Raw = localStorage.getItem('inline-annotations-data-v5');
                    if (v5Raw) {
                        try {
                            const parsed = JSON.parse(v5Raw);
                            if (parsed.mainText) {
                                migratedData = { mainText: parsed.mainText, annotations: parsed.annotations || [] };
                            }
                        } catch(e) {}
                    }
                    if (!migratedData) {
                        const v2Raw = localStorage.getItem('inline-annotations-data-v2');
                        if (v2Raw) {
                            try {
                                const parsed = JSON.parse(v2Raw);
                                if (parsed.mainText) {
                                    migratedData = {
                                        mainText: parsed.mainText,
                                        annotations: (parsed.annotations || []).map(a => ({...a, targetId: 'main'}))
                                    };
                                }
                            } catch(e) {}
                        }
                    }

                    if (migratedData) {
                        const id = generateId();
                        const now = Date.now();
                        const project = {
                            id,
                            name: '移行されたまとめ',
                            createdAt: now,
                            updatedAt: now,
                            annotationCount: migratedData.annotations.length,
                            preview: migratedData.mainText.substring(0, 100)
                        };
                        list = [project];
                        Storage.saveProjectList(list);
                        Storage.saveProjectData(id, migratedData);
                    }
                }

                setProjectList(list);
            }, []);

            // 自動保存: ワークスペース中にデータが変わったら保存
            useEffect(() => {
                if (!currentProjectId || !mainText) return;

                Storage.saveProjectData(currentProjectId, { mainText, annotations });

                setProjectList(prev => {
                    const updated = prev.map(p => p.id === currentProjectId ? {
                        ...p,
                        updatedAt: Date.now(),
                        annotationCount: annotations.length,
                        preview: mainText.substring(0, 100)
                    } : p);
                    Storage.saveProjectList(updated);
                    return updated;
                });
            }, [mainText, annotations, currentProjectId]);

            // カラムが増えたら右端へスムーズにスクロール
            useEffect(() => {
                if (scrollContainerRef.current) {
                    scrollContainerRef.current.scrollTo({
                        left: scrollContainerRef.current.scrollWidth,
                        behavior: 'smooth'
                    });
                }
            }, [panes.length]);

            // --- プロジェクト管理 ---
            const openProject = (id) => {
                const data = Storage.getProjectData(id);
                const meta = projectList.find(p => p.id === id);
                if (data && meta) {
                    setCurrentProjectId(id);
                    setCurrentProjectName(meta.name);
                    setMainText(data.mainText);
                    setAnnotations(data.annotations || []);
                    setAppMode('workspace');
                    setPanes([{ id: 'pane-main', type: 'main', targetId: 'main' }]);
                }
            };

            const createNewProject = () => {
                setCurrentProjectId(null);
                setCurrentProjectName('');
                setMainText('');
                setAnnotations([]);
                setAppMode('setup');
            };

            const deleteProject = (id) => {
                Storage.deleteProjectData(id);
                setProjectList(prev => {
                    const updated = prev.filter(p => p.id !== id);
                    Storage.saveProjectList(updated);
                    return updated;
                });
            };

            const goHome = () => {
                // 現在のプロジェクトを保存してからホームへ
                if (currentProjectId && mainText) {
                    Storage.saveProjectData(currentProjectId, { mainText, annotations });
                    const updatedList = projectList.map(p => p.id === currentProjectId ? {
                        ...p, updatedAt: Date.now(), annotationCount: annotations.length, preview: mainText.substring(0, 100)
                    } : p);
                    Storage.saveProjectList(updatedList);
                    setProjectList(updatedList);
                }
                setAppMode('home');
                setCurrentProjectId(null);
                setCurrentProjectName('');
                setMainText('');
                setAnnotations([]);
                setPanes([{ id: 'pane-main', type: 'main', targetId: 'main' }]);
                setSelectionMenu({ show: false });
                setTooltip({ show: false, text: '', top: 0, left: 0 });
            };

            // --- エクスポート / インポート ---
            const doExport = (projectIds) => {
                const exportData = {
                    type: 'annotator-export',
                    version: 1,
                    exportedAt: Date.now(),
                    projects: projectIds.map(id => {
                        const meta = projectList.find(p => p.id === id);
                        const data = Storage.getProjectData(id);
                        return {
                            name: meta?.name || '名前なし',
                            mainText: data?.mainText || '',
                            annotations: data?.annotations || [],
                            createdAt: meta?.createdAt,
                            updatedAt: meta?.updatedAt
                        };
                    })
                };
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'annotator-export-' + new Date().toISOString().slice(0, 10) + '.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const exportAllProjects = () => doExport(projectList.map(p => p.id));
            const exportSingleProject = (id) => doExport([id]);

            const importProjects = (data) => {
                if (!data || data.type !== 'annotator-export' || !Array.isArray(data.projects)) {
                    alert('無効なファイル形式です。Annotatorからエクスポートしたファイルを選択してください。');
                    return;
                }
                let count = 0;
                const newList = [...projectList];
                data.projects.forEach(proj => {
                    const id = generateId();
                    const now = Date.now();
                    newList.unshift({
                        id,
                        name: proj.name || '名前なし',
                        createdAt: proj.createdAt || now,
                        updatedAt: proj.updatedAt || now,
                        annotationCount: (proj.annotations || []).length,
                        preview: (proj.mainText || '').substring(0, 100)
                    });
                    Storage.saveProjectData(id, {
                        mainText: proj.mainText || '',
                        annotations: proj.annotations || []
                    });
                    count++;
                });
                Storage.saveProjectList(newList);
                setProjectList(newList);
                alert(count + ' 件のまとめをインポートしました。');
            };

            // --- テキスト・注釈操作 ---
            const handleSaveMainText = (name, text) => {
                let id = currentProjectId;
                const now = Date.now();
                if (!id) {
                    // 新規プロジェクト
                    id = generateId();
                    const newProject = {
                        id, name, createdAt: now, updatedAt: now,
                        annotationCount: 0, preview: text.substring(0, 100)
                    };
                    setProjectList(prev => {
                        const updated = [newProject, ...prev];
                        Storage.saveProjectList(updated);
                        return updated;
                    });
                } else {
                    // 既存プロジェクトの更新
                    setProjectList(prev => {
                        const updated = prev.map(p => p.id === id ? {
                            ...p, name, updatedAt: now, preview: text.substring(0, 100)
                        } : p);
                        Storage.saveProjectList(updated);
                        return updated;
                    });
                }
                setCurrentProjectId(id);
                setCurrentProjectName(name);
                setMainText(text);
                Storage.saveProjectData(id, { mainText: text, annotations });
                setAppMode('workspace');
                setPanes([{ id: 'pane-main', type: 'main', targetId: 'main' }]);
            };

            const handleResetAnnotations = () => {
                if (confirm('このまとめの注釈をすべて削除します。よろしいですか？（原文は残ります）')) {
                    setAnnotations([]);
                    if (currentProjectId) {
                        Storage.saveProjectData(currentProjectId, { mainText, annotations: [] });
                        setProjectList(prev => {
                            const updated = prev.map(p => p.id === currentProjectId ? { ...p, annotationCount: 0, updatedAt: Date.now() } : p);
                            Storage.saveProjectList(updated);
                            return updated;
                        });
                    }
                    setPanes([{ id: 'pane-main', type: 'main', targetId: 'main' }]);
                }
            };

            // テキスト選択時のハンドラー
            const handleMouseUp = (e, paneIndex, targetId) => {
                setTimeout(() => {
                    const selection = window.getSelection();
                    const text = selection.toString().trim();

                    console.log('[handleMouseUp] targetId:', targetId, 'mainText length:', mainText.length);

                    if (text.length >= 2 && selection.rangeCount > 0) {
                        // 選択範囲内の LaTeX を抽出
                        let enhancedText = text;
                        if (selection.rangeCount > 0) {
                            const range = selection.getRangeAt(0);
                            const tempDiv = document.createElement('div');
                            tempDiv.appendChild(range.cloneContents());
                            const mathSpans = tempDiv.querySelectorAll('[data-latex]');

                            if (mathSpans.length > 0) {
                                const mathLaTeXes = Array.from(mathSpans)
                                    .map(span => span.dataset.latex)
                                    .join(' ');
                                console.log('[Selection] Found LaTeX:', mathLaTeXes);
                                enhancedText = text + ' ' + mathLaTeXes;
                            }
                        }

                        // マークダウンテキストを取得
                        let markdownText = '';
                        if (targetId === 'main') {
                            markdownText = mainText;
                        } else {
                            // targetId が main でない場合は、すでに存在する注釈のコンテンツを使用
                            const anno = annotations.find(a => a.id === targetId);
                            if (anno?.content) {
                                markdownText = anno.content;
                            } else {
                                console.warn('[handleMouseUp] Cannot find annotation content for targetId:', targetId);
                                return;
                            }
                        }

                        // マークダウン内の位置を計算
                        const position = findSimpleTextPosition(markdownText, text);

                        console.log('[Selection] Text:', text);
                        console.log('[Selection] Enhanced text:', enhancedText);
                        console.log('[Selection] Position found:', position);

                        const range = selection.getRangeAt(0);
                        const rect = range.getBoundingClientRect();

                        setSelectionMenu({
                            show: true,
                            top: Math.max(10, rect.top - 45),
                            left: rect.left + (rect.width / 2),
                            text: text,
                            position: position,  // マークダウン位置情報を追加
                            paneIndex: paneIndex,
                            targetId: targetId
                        });
                    } else {
                        setSelectionMenu({ show: false });
                    }
                }, 10);
            };

            const handleScroll = () => {
                if (selectionMenu.show) setSelectionMenu({ show: false });
                if (tooltip.show) setTooltip({ show: false });
                if (annotationPicker.show) setAnnotationPicker(p => ({ ...p, show: false }));
            };

            const handleMultiMarkClick = (paneIndex, annoIds, rect) => {
                setAnnotationPicker({
                    show: true,
                    annoIds,
                    top: rect.bottom + 8,
                    left: rect.left + rect.width / 2,
                    paneIndex
                });
            };

            const handleMarkHover = (isHovering, text, rect) => {
                if (isHovering && rect) {
                    setTooltip({ show: true, text: text, top: rect.top - 8, left: rect.left + (rect.width / 2) });
                } else {
                    setTooltip({ show: false, text: '', top: 0, left: 0 });
                }
            };

            const openAnnotation = (paneIndex, annotationId) => {
                const anno = annotations.find(a => a.id === annotationId);
                if (!anno) return;

                setPanes(prev => {
                    const newPanes = prev.slice(0, paneIndex + 1);
                    newPanes.push({
                        id: generateId(),
                        type: 'view',
                        targetId: anno.targetId,
                        annotationId: anno.id
                    });
                    return newPanes;
                });
            };

            const startAddAnnotation = (paneIndex, targetId, quote, position) => {
                setPanes(prev => {
                    const newPanes = prev.slice(0, paneIndex + 1);
                    newPanes.push({
                        id: generateId(),
                        type: 'add',
                        targetId: targetId,
                        quote: quote || '',
                        position: position  // マークダウン位置情報を保存
                    });
                    return newPanes;
                });
            };

            const saveNewAnnotation = (paneIndex, targetId, quote, title, content, position) => {
                const newAnno = {
                    id: generateId(),
                    targetId,
                    quote: quote || '',
                    position: position,  // マークダウン位置情報を保存
                    title,
                    content,
                    timestamp: Date.now()
                };
                setAnnotations(prev => [...prev, newAnno]);

                setPanes(prev => {
                    const newPanes = [...prev];
                    newPanes[paneIndex] = {
                        id: generateId(),
                        type: 'view',
                        targetId: targetId,
                        annotationId: newAnno.id
                    };
                    return newPanes;
                });
                window.getSelection().removeAllRanges();
            };

            const updateAnnotation = (paneIndex, annotationId, title, content, quoteText, position) => {
                setAnnotations(prev => prev.map(a => a.id === annotationId ? { ...a, title, content, quote: quoteText || a.quote, position: position || a.position, timestamp: Date.now() } : a));
                setPanes(prev => {
                    const newPanes = [...prev];
                    newPanes[paneIndex] = { ...newPanes[paneIndex], type: 'view' };
                    return newPanes;
                });
            };

            const handleDeleteAnnotation = (id) => {
                const idsToDelete = new Set([id]);
                let added = true;
                while(added) {
                    added = false;
                    annotations.forEach(a => {
                        if (idsToDelete.has(a.targetId) && !idsToDelete.has(a.id)) {
                            idsToDelete.add(a.id);
                            added = true;
                        }
                    });
                }

                setAnnotations(prev => prev.filter(a => !idsToDelete.has(a.id)));

                setPanes(prev => {
                    const targetIndex = prev.findIndex(p => p.annotationId === id);
                    if (targetIndex !== -1) {
                        return prev.slice(0, targetIndex);
                    }
                    return prev;
                });
            };

            const closePane = (index) => {
                setPanes(prev => prev.slice(0, index));
            };

            // 各ペインのレンダリング
            const renderPanes = () => {
                const elements = panes.map((pane, index) => {
                    const nextPane = panes[index + 1];
                    const activeAnnoId = nextPane && (nextPane.type === 'view' || nextPane.type === 'edit') ? nextPane.annotationId : null;

                    if (pane.type === 'main') {
                        return (
                            <div key={pane.id} className="w-[90vw] md:w-[50vw] lg:w-[45vw] shrink-0 h-full bg-white border-r border-gray-200 flex flex-col relative shadow-[4px_0_24px_rgba(0,0,0,0.06)] z-0">
                                <div className="flex items-center justify-between p-4 border-b border-gray-100 bg-white shrink-0 shadow-sm z-10">
                                    <h2 className="text-[15px] font-bold text-gray-700 flex items-center gap-2 uppercase tracking-wide">
                                        <i className="ph-fill ph-book-open text-blue-500 text-lg"></i>
                                        主軸テキスト
                                    </h2>
                                    <button onClick={() => setAppMode('setup')} className="text-sm text-gray-500 hover:text-blue-600 flex items-center gap-1 font-medium bg-gray-50 hover:bg-blue-50 px-3 py-1.5 rounded-md transition-colors">
                                        <i className="ph-bold ph-pencil-simple"></i> 原文を編集
                                    </button>
                                </div>
                                <div
                                    className="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth selection:bg-blue-200 relative"
                                    onMouseUp={(e) => handleMouseUp(e, index, 'main')}
                                    onScroll={handleScroll}
                                >
                                    <div className="max-w-3xl mx-auto pb-20">
                                        <MarkdownViewer
                                            content={mainText}
                                            className="markdown-body left-pane-text"
                                            annotations={annotations.filter(a => a.targetId === 'main')}
                                            onMarkClick={(id) => openAnnotation(index, id)}
                                            onMultiMarkClick={(ids, rect) => handleMultiMarkClick(index, ids, rect)}
                                            onMarkHover={handleMarkHover}
                                            onAnnotationClick={(annoId) => openAnnotation(index, annoId)}
                                            activeAnnotationId={activeAnnoId}
                                        />
                                    </div>
                                </div>
                            </div>
                        );
                    }

                    if (pane.type === 'view') {
                        const anno = annotations.find(a => a.id === pane.annotationId);
                        if (!anno) return null;

                        return (
                            <div key={pane.id} className="w-[90vw] md:w-[50vw] lg:w-[45vw] shrink-0 h-full bg-white border-r border-gray-200 flex flex-col relative shadow-[4px_0_24px_rgba(0,0,0,0.06)] animate-slide-in-right z-0">
                                <div className="p-4 border-b border-gray-200 bg-slate-50 flex items-center justify-between shrink-0 shadow-sm z-10">
                                    <div className="flex items-center gap-2 overflow-hidden">
                                        <i className="ph-fill ph-chat-teardrop-text text-blue-500 text-xl shrink-0"></i>
                                        <h3 className="font-bold text-gray-800 text-lg truncate pr-4">{anno.title}</h3>
                                    </div>
                                    <div className="flex items-center gap-1 shrink-0">
                                        <button onClick={() => setPanes(p => { const n = [...p]; n[index] = {...pane, type: 'edit'}; return n; })} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-blue-600 hover:bg-blue-100 transition-colors" title="編集">
                                            <i className="ph ph-pencil-simple text-lg"></i>
                                        </button>
                                        <button onClick={() => { if(confirm('削除しますか？派生する注釈もすべて消えます。')) handleDeleteAnnotation(anno.id); }} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-red-600 hover:bg-red-100 transition-colors" title="削除">
                                            <i className="ph ph-trash text-lg"></i>
                                        </button>
                                        <div className="w-px h-5 bg-gray-300 mx-1"></div>
                                        <button onClick={() => closePane(index)} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-200 transition-colors" title="閉じる">
                                            <i className="ph-bold ph-x text-lg"></i>
                                        </button>
                                    </div>
                                </div>

                                <div
                                    className="flex-1 overflow-y-auto p-6 md:p-10 relative selection:bg-blue-200"
                                    onMouseUp={(e) => handleMouseUp(e, index, anno.id)}
                                    onScroll={handleScroll}
                                >
                                    <div className="max-w-3xl mx-auto pb-20">
                                        <div className="bg-yellow-50 border-l-4 border-yellow-400 p-3 mb-8 rounded-r text-sm">
                                            <p className="text-xs text-yellow-700 font-bold mb-1"><i className="ph-bold ph-quotes"></i> 対象テキスト</p>
                                            <p className="text-gray-700 italic leading-relaxed">{anno.quote}</p>
                                        </div>
                                        <MarkdownViewer
                                            content={anno.content}
                                            annotations={annotations.filter(a => a.targetId === anno.id)}
                                            onMarkClick={(id) => openAnnotation(index, id)}
                                            onMultiMarkClick={(ids, rect) => handleMultiMarkClick(index, ids, rect)}
                                            onMarkHover={handleMarkHover}
                                            onAnnotationClick={(annoId) => openAnnotation(index, annoId)}
                                            activeAnnotationId={activeAnnoId}
                                        />
                                    </div>
                                </div>
                            </div>
                        );
                    }

                    if (pane.type === 'add' || pane.type === 'edit') {
                        const isAdd = pane.type === 'add';
                        const parentTitle = pane.targetId === 'main'
                            ? '主軸テキスト'
                            : annotations.find(a => a.id === pane.targetId)?.title;

                        const initialData = isAdd ? null : annotations.find(a => a.id === pane.annotationId);
                        const quote = isAdd ? pane.quote : initialData?.quote;

                        return (
                            <div key={pane.id} className="w-[90vw] md:w-[50vw] lg:w-[45vw] shrink-0 h-full bg-slate-50 border-r border-gray-200 flex flex-col relative shadow-[4px_0_24px_rgba(0,0,0,0.06)] z-0">
                                <AnnotationForm
                                    mode={pane.type}
                                    quote={quote}
                                    parentTitle={parentTitle}
                                    initialData={initialData}
                                    onSave={(title, content, quoteText) => isAdd
                                        ? saveNewAnnotation(index, pane.targetId, quoteText || quote, title, content, pane.position)
                                        : updateAnnotation(index, pane.annotationId, title, content, quoteText, pane.position)
                                    }
                                    onCancel={() => {
                                        if (isAdd) closePane(index);
                                        else setPanes(p => { const n = [...p]; n[index] = {...pane, type: 'view'}; return n; });
                                    }}
                                />
                            </div>
                        );
                    }
                });

                if (panes.length === 1) {
                    const mainAnnotations = annotations.filter(a => a.targetId === 'main');
                    elements.push(
                        <div key="dummy-pane" className="w-[90vw] md:w-[50vw] lg:w-[45vw] shrink-0 h-full bg-slate-50 border-l border-gray-200 flex flex-col z-0">
                            <div className="p-4 border-b border-gray-200 bg-white shrink-0 shadow-sm z-10">
                                <h3 className="font-bold text-gray-700 flex items-center gap-2">
                                    <i className="ph-fill ph-list-bullets text-blue-500 text-xl"></i>
                                    注釈一覧 ({mainAnnotations.length})
                                </h3>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 md:p-6">
                                {mainAnnotations.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center h-full text-gray-400 p-8 text-center opacity-80">
                                        <div className="w-20 h-20 bg-blue-100 text-blue-300 rounded-full flex items-center justify-center mb-5 shadow-inner">
                                            <i className="ph-fill ph-text-highlighter text-4xl"></i>
                                        </div>
                                        <h3 className="text-xl font-bold text-gray-400 mb-2 tracking-wide">テキストを選択して注釈を追加</h3>
                                        <p className="text-sm text-gray-400 max-w-xs leading-relaxed">
                                            左の原文をドラッグして選択してください。作成した注釈はここに展開され、さらにその注釈の中にも注釈を作成し、無限に掘り下げていくことができます。
                                        </p>
                                    </div>
                                ) : (
                                    <div className="space-y-3 pb-6">
                                        {mainAnnotations.map((anno) => (
                                            <div
                                                key={anno.id}
                                                onClick={() => openAnnotation(0, anno.id)}
                                                className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm hover:border-blue-400 hover:shadow-md cursor-pointer transition-all relative"
                                            >
                                                <h4 className="font-bold text-gray-800 line-clamp-1 mb-2">{anno.title}</h4>
                                                <p className="text-sm text-gray-500 line-clamp-2 bg-yellow-50 p-2 rounded border-l-2 border-yellow-400 italic">
                                                    "{anno.quote}"
                                                </p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                }

                return elements;
            };

            return (
                <div className="flex flex-col h-screen w-full bg-gray-50 overflow-hidden font-sans text-gray-900">
                    {/* ヘッダー */}
                    <header className="h-14 bg-slate-900 text-white flex items-center px-6 shrink-0 z-30 shadow-md">
                        <div className="flex items-center gap-3">
                            <div
                                className="bg-blue-500 p-1.5 rounded text-white flex items-center justify-center shadow-lg shadow-blue-500/30 cursor-pointer hover:bg-blue-400 transition-colors"
                                onClick={goHome}
                                title="ホームに戻る"
                            >
                                <i className="ph-bold ph-columns text-xl"></i>
                            </div>
                            <h1 className="font-bold text-lg tracking-wide cursor-pointer hover:text-blue-300 transition-colors" onClick={goHome}>
                                Annotator
                                <span className="hidden sm:inline-block text-slate-400 font-normal text-sm ml-2">| 無限カラム階層版</span>
                            </h1>
                            {appMode !== 'home' && currentProjectName && (
                                <div className="hidden sm:flex items-center gap-2 ml-4">
                                    <i className="ph ph-caret-right text-slate-600 text-sm"></i>
                                    <span className="text-slate-300 text-sm font-medium truncate max-w-[300px]">{currentProjectName}</span>
                                </div>
                            )}
                        </div>
                        <div className="ml-auto flex items-center gap-4">
                            {appMode !== 'home' && (
                                <button onClick={goHome} className="text-slate-400 hover:text-white text-sm flex items-center gap-1.5 transition-colors font-medium">
                                    <i className="ph-bold ph-house"></i> ホーム
                                </button>
                            )}
                            {appMode === 'workspace' && (
                                <button onClick={handleResetAnnotations} className="text-slate-400 hover:text-red-400 text-sm flex items-center gap-1.5 transition-colors font-medium">
                                    <i className="ph-bold ph-trash"></i> 注釈リセット
                                </button>
                            )}
                        </div>
                    </header>

                    {/* メインエリア */}
                    {appMode === 'home' && (
                        <HomeScreen
                            projects={projectList}
                            onOpen={openProject}
                            onCreateNew={createNewProject}
                            onDelete={deleteProject}
                            onExportSingle={exportSingleProject}
                            onExportAll={exportAllProjects}
                            onImport={importProjects}
                        />
                    )}

                    {appMode === 'setup' && (
                        <SetupScreen
                            initialName={currentProjectName}
                            initialText={mainText}
                            isNew={!currentProjectId}
                            onSave={handleSaveMainText}
                            onCancel={currentProjectId ? () => setAppMode('workspace') : (projectList.length > 0 ? () => setAppMode('home') : null)}
                        />
                    )}

                    {appMode === 'workspace' && (
                        <div className="flex-1 flex overflow-hidden relative bg-gray-200">
                            {selectionMenu.show && (
                                <div
                                    className="fixed z-[100] transform -translate-x-1/2 bg-slate-800 text-white px-3 py-2 rounded-lg shadow-xl flex items-center gap-3 animate-fade-in-up border border-slate-700"
                                    style={{ top: `${selectionMenu.top}px`, left: `${selectionMenu.left}px` }}
                                >
                                    <div className="text-xs text-gray-300 max-w-[150px] truncate hidden sm:block">"{selectionMenu.text}"</div>
                                    <div className="w-px h-4 bg-slate-600 hidden sm:block"></div>
                                    <button
                                        className="text-sm font-bold text-blue-300 hover:text-blue-100 flex items-center gap-1.5 whitespace-nowrap"
                                        onMouseDown={(e) => {
                                            e.preventDefault();
                                            startAddAnnotation(selectionMenu.paneIndex, selectionMenu.targetId, selectionMenu.text, selectionMenu.position);
                                            setSelectionMenu({ show: false });
                                            window.getSelection().removeAllRanges();
                                        }}
                                    >
                                        <i className="ph-bold ph-plus-circle text-lg"></i> {selectionMenu.targetId === 'main' ? '注釈を追加' : 'この注釈をさらに深掘り'}
                                    </button>
                                </div>
                            )}

                            {tooltip.show && (
                                <div
                                    className="fixed z-[110] transform -translate-x-1/2 -translate-y-full bg-slate-800 text-white px-3 py-1.5 rounded-md text-xs font-bold shadow-lg pointer-events-none transition-opacity duration-150 ease-out max-w-[250px] break-words text-center"
                                    style={{ top: `${tooltip.top}px`, left: `${tooltip.left}px` }}
                                >
                                    {tooltip.text}
                                    <div className="absolute top-full left-1/2 transform -translate-x-1/2 border-[5px] border-transparent border-t-slate-800"></div>
                                </div>
                            )}

                            {annotationPicker.show && (
                                <React.Fragment>
                                    <div className="fixed inset-0 z-[115]" onClick={() => setAnnotationPicker(p => ({ ...p, show: false }))}></div>
                                    <div
                                        className="fixed z-[120] transform -translate-x-1/2 bg-white rounded-xl shadow-2xl border border-gray-200 animate-fade-in-up overflow-hidden min-w-[220px]"
                                        style={{ top: `${annotationPicker.top}px`, left: `${annotationPicker.left}px` }}
                                    >
                                        <div className="px-4 py-2 bg-gray-50 border-b border-gray-100">
                                            <p className="text-xs font-bold text-gray-500">複数の注釈があります</p>
                                        </div>
                                        <div className="py-1">
                                            {annotationPicker.annoIds.map(id => {
                                                const pickerAnno = annotations.find(a => a.id === id);
                                                if (!pickerAnno) return null;
                                                return (
                                                    <button
                                                        key={id}
                                                        className="w-full text-left px-4 py-2.5 hover:bg-blue-50 flex items-center gap-2 transition-colors"
                                                        onClick={() => {
                                                            openAnnotation(annotationPicker.paneIndex, id);
                                                            setAnnotationPicker(p => ({ ...p, show: false }));
                                                        }}
                                                    >
                                                        <i className="ph-fill ph-chat-teardrop-text text-blue-500 shrink-0"></i>
                                                        <span className="text-sm font-medium text-gray-700 truncate">{pickerAnno.title}</span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </React.Fragment>
                            )}

                            <div
                                className="horizontal-scroll-container scroll-smooth"
                                ref={scrollContainerRef}
                            >
                                {renderPanes()}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
